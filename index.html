z":"大使館"},{"w":"gia hạn","e":"to renew","s":"Tôi đã gia hạn hộ chiếu của mình.","se":"I renewed my passport.","pos":"verb","ety":"Sino-Vietnamese word from 加限.","ipa":"[zaː˧˧ haːn˧˨ʔ] (Hà-Nội); [jaː˧˧ haːŋ˨˩ʔ] (Huế); [jaː˧˧ haːŋ˨˩˨] (Hồ-Chí-Minh-City)","z":"延期;更新"},{"w":"Cháy!","e":"Fire!","s":"","se":"","pos":"","ety":"","ipa":"","z":"失火了!"},{"w":"Cẩn thận!","e":"Be careful!","s":"Cẩn thận.","se":"Be careful.","pos":"","ety":"","ipa":"","z":"小心!"},{"w":"bị thương","e":"to get hurt","s":"Có người đang bị thương.","se":"Someone is hurt.","pos":"","ety":"","ipa":"","z":"受傷"},{"w":"tai nạn","e":"accident","s":"Đã có một tai nạn.","se":"There has been an accident.","pos":"noun","ety":"Sino-Vietnamese word from 災難 (“calamity; disaster; misfortune; accident”).","ipa":"[taːj˧˧ naːn˧˨ʔ] (Hà-Nội); [taːj˧˧ naːŋ˨˩ʔ] (Huế); [taːj˧˧ naːŋ˨˩˨] (Hồ-Chí-Minh-City)","z":"意外;事故"},{"w":"xe cứu thương","e":"ambulance","s":"Gọi xe cứu thương!","se":"Call an ambulance!","pos":"noun","ety":"xe (“wheeled vehicle”) + cứu (“to rescue”) + thương (“injury”)","ipa":"[sɛ˧˧ kiw˧˦ tʰɨəŋ˧˧] (Hà-Nội); [sɛ˧˧ kɨw˨˩˦ tʰɨəŋ˧˧] (Huế); [sɛ˧˧ kɨw˦˥ tʰɨəŋ˧˧] (Hồ-Chí-Minh-City)","z":"救護車"},{"w":"nhanh lên","e":"hurry","s":"","se":"","pos":"verb","ety":"nhanh (“fast”) + lên (“to go up”).","ipa":"[ɲajŋ̟˧˧ len˧˧] (Hà-Nội); [ɲɛɲ˧˧ len˧˧] (Huế); [ɲan˧˧ ləːn˧˧] (Hồ-Chí-Minh-City)","z":"趕快;快點"},{"w":"cánh tay","e":"arm","s":"Cánh tay tôi bị thương. Cánh tay trái của anh ấy khỏe hơn trước đây.","se":"My arm hurts. His left arm is stronger than before.","pos":"noun","ety":"","ipa":"[kajŋ̟˧˦ taj˧˧] (Hà-Nội); [kɛɲ˦˧˥ taj˧˧] (Huế); [kan˦˥ ta(ː)j˧˧] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"手臂"},{"w":"gãy","e":"to break","s":"Cánh tay anh ấy bị gãy.","se":"His arm is broken.","pos":"adj","ety":"Compare Proto-Katuic *kas ~ *kəs (“brittle, crumble”) (whence Pacoh ticâyh).","ipa":"[ɣaj˦ˀ˥] (Hà-Nội); [ɣaj˧˨] (Huế); [ɣa(ː)j˨˩˦] (Hồ-Chí-Minh-City)","z":"骨折;弄斷"},{"w":"trình báo","e":"to report","s":"Tôi muốn trình báo về một vụ tai nạn xe hơi.","se":"I want to report a car accident.","pos":"verb","ety":"Sino-Vietnamese word from 呈報.","ipa":"[t͡ɕïŋ˨˩ ʔɓaːw˧˦] (Hà-Nội); [ʈɨn˦˩ ʔɓaːw˨˩˦] (Huế); [ʈɨn˨˩ ʔɓaːw˦˥] (Hồ-Chí-Minh-City)","z":"報案;呈報"},{"w":"nghiêm trọng","e":"to be serious","s":"Đây là một vụ tai nạn nghiêm trọng.","se":"It is a serious accident.","pos":"adj","ety":"Sino-Vietnamese word from 嚴重.","ipa":"[ŋiəm˧˧ t͡ɕawŋ͡m˧˨ʔ] (Hà-Nội); [ŋiəm˧˧ ʈawŋ͡m˨˩ʔ] (Huế); [ŋiəm˧˧ ʈɔŋ˨˩ʔ] (Huế); [ŋim˧˧ ʈawŋ͡m˨˩˨] (Hồ-Chí-Minh-City)","z":"嚴重"},{"w":"trông có vẻ","e":"to look like","s":"Trông có vẻ là một vụ tai nạn nghiêm trọng","se":"It looks like a serious accident.","pos":"","ety":"","ipa":"","z":"看起來像"},{"w":"đầu","e":"head","s":"Đầu anh ấy bị đau.","se":"His head has been hurt.","pos":"noun","ety":"Sino-Vietnamese word from 頭. Displaced inherited Vietic word trốc in most major dialects.","ipa":"[ʔɗəw˨˩] (Hà-Nội); [ʔɗəw˦˩] (Huế); [ʔɗəw˨˩] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"頭"},{"w":"đau đầu","e":"headache","s":"Tôi bị đau đầu từ tuần trước. Nếu tối qua tôi ngủ sớm hơn, bây giờ tôi đã không bị đau đầu.","se":"I have been having headaches since last week. If I had gone to sleep earlier last night, I would not have a headache now.","pos":"verb","ety":"đau + đầu.","ipa":"[ʔɗaw˧˧ ʔɗəw˨˩] (Hà-Nội); [ʔɗaw˧˧ ʔɗəw˦˩] (Huế); [ʔɗa(ː)w˧˧ ʔɗəw˨˩] (Hồ-Chí-Minh-City)","z":"頭痛"},{"w":"căng thẳng","e":"to be stressed","s":"Tôi đã bị căng thẳng.","se":"I was stressed.","pos":"adj","ety":"căng + thẳng.","ipa":"[kaŋ˧˧ tʰaŋ˧˩] (Hà-Nội); [kaŋ˧˧ tʰaŋ˧˨] (Huế); [kaŋ˧˧ tʰaŋ˨˩˦] (Hồ-Chí-Minh-City)","z":"壓力大;緊張"},{"w":"bệnh nhân","e":"patient","s":"Bệnh nhân bắt đầu bị đau đầu từ lúc 7 giờ tối qua.","se":"The patient started to have headaches at 7 pm last night.","pos":"noun","ety":"Sino-Vietnamese word from 病人.","ipa":"[ʔɓəjŋ̟˧˨ʔ ɲən˧˧] (Hà-Nội); [ʔɓen˨˩ʔ ɲəŋ˧˧] (Huế); [ʔɓəːn˨˩˨ ɲəŋ˧˧] (Hồ-Chí-Minh-City)","z":"病人;患者"},{"w":"răng","e":"tooth","s":"","se":"","pos":"noun","ety":"From Proto-Vietic *k-saŋ. Cognate with Muong thăng, Arem atʰaŋ, Thavung กะซัง. Shorto (2006) traces Viet-Muong items' etymological origins to Proto-Mon-Khmer *sra(a)ŋ, but this can be dismissed as all Vietic cognates point to *-s-.","ipa":"[zaŋ˧˧] (Hà-Nội); [ʐaŋ˧˧] (Huế); [ɹaŋ˧˧] (Hồ-Chí-Minh-City)","z":"牙齒"},{"w":"đau răng","e":"toothache","s":"Anh ấy bị đau răng từ sáng nay.","se":"He has had a toothache since this morning.","pos":"","ety":"","ipa":"","z":"牙痛"},{"w":"nướu răng","e":"gums","s":"Cô ấy bị đau nướu răng nhiều ngày rồi.","se":"She has been having gum pain for many days.","pos":"","ety":"","ipa":"","z":"牙齦"},{"w":"nha sĩ","e":"dentist","s":"Nha sĩ yêu cầu tôi nằm xuống.","se":"The dentist asks me to lie down.","pos":"noun","ety":"Sino-Vietnamese word from 牙士, composed of 牙 (“tooth”) and 士 (“specialist”).","ipa":"[ɲaː˧˧ si˦ˀ˥] (Hà-Nội); [ɲaː˧˧ ʂɪj˧˨] (Huế); [ɲaː˧˧ sɪj˧˨] (Huế); [ɲaː˧˧ ʂɪj˨˩˦] (Hồ-Chí-Minh-City); [ɲaː˧˧ sɪj˨˩˦] (Hồ-Chí-Minh-City)","z":"牙醫"},{"w":"mở miệng","e":"to open one's mouth","s":"Nha sĩ yêu cầu tôi mở miệng.","se":"The dentist asks me to open my mouth.","pos":"","ety":"","ipa":"","z":"張開嘴巴"},{"w":"kiểm tra","e":"to check","s":"Tôi yêu cầu nha sĩ kiểm tra răng của mình. Chi tiết trong thư điện tử nên được thư ký kiểm tra.","se":"I ask the dentist to check my teeth. The details of the email should be checked by the secretary.","pos":"noun","ety":"Sino-Vietnamese word from 檢查.","ipa":"[kiəm˧˩ t͡ɕaː˧˧] (Hà-Nội); [kiəm˧˨ ʈaː˧˧] (Huế); [kim˨˩˦ ʈaː˧˧] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"檢查"},{"w":"bụng","e":"stomach","s":"","se":"","pos":"noun","ety":"From Proto-Vietic *buːŋʔ, from Proto-Mon-Khmer *buŋ() ~ *buuŋʔ. Cognate with Khmer ពុង (pung), Mon ဗုၚ် (pɜ̀ŋ), Nguôn pũng, pụng, Thai พุง (pung). In Vietnamese culture, instead of \"heart\", traditionally \"belly, abdomen\" was considered to be where people harbor their feelings and emotions. See also lòng (“intestine”) and dạ (“belly, stomach”).","ipa":"[ʔɓʊwŋ͡m˧˨ʔ] (Hà-Nội); [ʔɓʊwŋ͡m˨˩ʔ] (Huế); [ʔɓʊwŋ͡m˨˩˨] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"肚子;胃"},{"w":"đau bụng","e":"stomachache","s":"Cô ấy bị đau bụng từ hôm qua. Nếu tối qua tôi ăn ít hơn, bây giờ tôi đã không bị đau bụng.","se":"She has had a stomachache since yesterday. If I had eaten less last evening, I would not have a stomachache now.","pos":"","ety":"","ipa":"","z":"肚子痛;胃痛"},{"w":"tiêu chảy","e":"diarrhea","s":"Có thể cô ấy bị tiêu chảy. Nếu bạn ăn thức ăn bẩn, bạn sẽ bị tiêu chảy.","se":"Maybe she has diarrhea. If you eat spoiled food, you will get diarrhea.","pos":"verb","ety":"","ipa":"[tiəw˧˧ t͡ɕaj˧˩] (Hà-Nội); [tiw˧˧ t͡ɕaj˧˨] (Huế); [tiw˧˧ ca(ː)j˨˩˦] (Hồ-Chí-Minh-City)","z":"腹瀉;拉肚子"},{"w":"ngộ độc thực phẩm","e":"food poisoning","s":"Có thể bạn bị ngộ độc thực phẩm.","se":"Maybe you have food poisoning.","pos":"noun","ety":"ngộ độc + thực phẩm.","ipa":"[ŋo˧˨ʔ ʔɗəwk͡p̚˧˨ʔ tʰɨk̚˧˨ʔ fəm˧˩] (Hà-Nội); [ŋow˨˩ʔ ʔɗəwk͡p̚˨˩ʔ tʰɨk̚˨˩ʔ fəm˧˨] (Huế); [ŋow˨˩˨ ʔɗəwk͡p̚˨˩˨ tʰɨk̚˨˩˨ fəm˨˩˦] (Hồ-Chí-Minh-City)","z":"食物中毒"},{"w":"thiu","e":"to be spoiled","s":"Có thể đồ ăn của bạn đã bị thiu.","se":"Maybe your food was spoiled.","pos":"adj","ety":"","ipa":"[tʰiw˧˧] (Hà-Nội); [tʰiw˧˧] (Huế); [tʰiw˧˧] (Hồ-Chí-Minh-City)","z":"餿掉;變質"},{"w":"triệu chứng","e":"symptom","s":"Những triệu chứng ngày càng tồi tệ.","se":"The symptoms are getting worse.","pos":"noun","ety":"Sino-Vietnamese word from 兆 (“omen; sign”) and 症 (“disease indication”). See also hội chứng (“syndrome”).","ipa":"[t͡ɕiəw˧˨ʔ t͡ɕɨŋ˧˦] (Hà-Nội); [ʈiw˨˩ʔ t͡ɕɨŋ˦˧˥] (Huế); [ʈiw˨˩˨ cɨŋ˦˥] (Hồ-Chí-Minh-City)","z":"症狀"},{"w":"bác sĩ","e":"doctor","s":"Anh ấy đã làm bác sĩ từ năm 2000.","se":"He has been working as a doctor since 2000.","pos":"noun","ety":"Sino-Vietnamese word from 博士, composed of 博 (“wide; vast; broad”) and 士 (“-ist”), from Japanese 博士 (hakushi, “doctor”, person who has attained a doctorate), earlier 博士 (hakase, “Japanese court academician”), from Middle Chinese 博士 (pwɑk̚ d͡ʒɨ^X, “Chinese court academician”). Also probably by analogy with European languages, such as English doctor, French docteur (“Ph.D.; M.D.; physician”).","ipa":"[ʔɓaːk̚˧˦ si˦ˀ˥] (Hà-Nội); [ʔɓaːk̚˦˧˥ ʂɪj˧˨] (Huế); [ʔɓaːk̚˦˧˥ sɪj˧˨] (Huế); [ʔɓaːk̚˦˥ ʂɪj˨˩˦] (Hồ-Chí-Minh-City); [ʔɓaːk̚˦˥ sɪj˨˩˦] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"醫生"},{"w":"gặp bác sĩ","e":"to see the doctor","s":"Tôi cần gặp bác sĩ.","se":"I need to see the doctor.","pos":"","ety":"","ipa":"","z":"看醫生"},{"w":"y tá","e":"nurse","s":"Bệnh nhân cần nói chuyện với y tá.","se":"The patient needs to speak to the nurse.","pos":"noun","ety":"Sino-Vietnamese word from 醫佐, composed of 醫 (“medicine; doctor; physician”) and 佐 (“to help; to assist”).","ipa":"[ʔi˧˧ taː˧˦] (Hà-Nội); [ʔɪj˧˧ taː˨˩˦] (Huế); [ʔɪj˧˧ taː˦˥] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"護理師;護士"},{"w":"bệnh viện","e":"hospital","s":"Tôi cần tới bệnh viện để gặp bác sĩ.","se":"I need to go to the hospital to see the doctor.","pos":"noun","ety":"Sino-Vietnamese word from 病院, composed of 病 (“illness”) and 院 (“institute”).","ipa":"[ʔɓəjŋ̟˧˨ʔ viən˧˨ʔ] (Hà-Nội); [ʔɓen˨˩ʔ viəŋ˨˩ʔ] (Huế); [ʔɓəːn˨˩˨ viəŋ˨˩˨] (Hồ-Chí-Minh-City); [ʔɓəːn˨˩˨ jiəŋ˨˩˨] (Hồ-Chí-Minh-City)","z":"醫院"},{"w":"thuốc","e":"medicine;pill","s":"Tôi cần mua thuốc. Anh ấy uống một viên thuốc vì anh ấy bị đau đầu. Tôi sẽ mua thuốc ở hiệu thuốc cho mẹ tôi.","se":"I need to buy medicine. He takes a pill because he has a headache. I will buy medicine at the pharmacy for my mother.","pos":"noun","ety":"Non-Sino-Vietnamese reading of Chinese 毒 (“poison”, SV: độc).","ipa":"[tʰuək̚˧˦] (Hà-Nội); [tʰuək̚˦˧˥] (Huế); [tʰuək̚˦˥] (Hồ-Chí-Minh-City)","z":"藥;藥丸"},{"w":"nhà thuốc","e":"pharmacy","s":"Tôi cần đi tới hiệu thuốc để mua thuốc.","se":"I need to go to the pharmacy to buy medicine.","pos":"noun","ety":"nhà + thuốc.","ipa":"[ɲaː˨˩ tʰuək̚˧˦] (Hà-Nội); [ɲaː˦˩ tʰuək̚˦˧˥] (Huế); [ɲaː˨˩ tʰuək̚˦˥] (Hồ-Chí-Minh-City)","z":"藥局"},{"w":"nâu","e":"brown","s":"Con mèo màu nâu.","se":"The cat is brown.","pos":"adj","ety":"Cognate with Tho [Cuối Thái Hoà] du³³ (Nguyễn Hữu Hoành et al., 2022). Muong Bi nu was borrowed from an earlier form of Vietnamese, as indicated by the initial ⟨n⟩ instead of regular ⟨đ⟩. See also củ nâu (“Dioscorea cirrhosa”).","ipa":"[nəw˧˧] (Hà-Nội); [nəw˧˧] (Huế); [nəw˧˧] (Hồ-Chí-Minh-City)","z":"棕色;褐色"},{"w":"mắt","e":"eyes","s":"Cô ấy có đôi mắt nâu.","se":"She has brown eyes.","pos":"noun","ety":"From Proto-Vietic *mat, from Proto-Mon-Khmer *mat. Akin to Muong Bi măt, Old Mon mɔt (modern Mon မတ်), Bahnar măt, Pacoh mát, Khasi 'mat/khmat, Khmu mat, Mang mat⁷, Car Nicobarese mat, Santali ᱢᱮᱫ (met’). Compare also Proto-Austronesian *maCa (Malay mata), Proto-Tai *p.taːᴬ (Thai ตา (dtaa)), Proto-Sino-Tibetan *s-mjak ~ s-mik (Chinese 目 (mù) (mù < OC *C.muk), Tibetan མིག (mig)).","ipa":"[mat̚˧˦] (Hà-Nội); [mak̚˦˧˥] (Huế); [mak̚˦˥] (Hồ-Chí-Minh-City); ()","z":"眼睛"},{"w":"mặt","e":"face","s":"Mặt anh ấy tròn như quả bóng.","se":"His face is round like a soccer ball.","pos":"noun","ety":"From Middle Vietnamese mặt. Originally meaning “eye” and is the regular descendant of Proto-Vietic *mat (“eye”), further from Proto-Mon-Khmer *mat (“eye”). Related to mắt (“eye”). The semantic change of “eye” > “face” can also be seen in Muong, most dialects of which use a single form, măt, to mean both “eye” and “face”.","ipa":"[mat̚˧˨ʔ] (Hà-Nội); [mak̚˨˩ʔ] (Huế); [mak̚˨˩˨] (Hồ-Chí-Minh-City); ()","z":"臉"},{"w":"tóc","e":"hair","s":"Tóc cô ấy mềm mượt như lụa.","se":"Her hair is soft like silk.","pos":"noun","ety":"From Proto-Vietic *-suk, from Proto-Mon-Khmer *suk ~ *suuk ~ *suək ~ *sək; cognate with Muong thắc, Bahnar sŏk, Khmer សក់ (sɑk) and Mon သော် (sok).","ipa":"[tawk͡p̚˧˦] (Hà-Nội); [tawk͡p̚˦˧˥] (Huế); [tawk͡p̚˦˥] (Hồ-Chí-Minh-City); [tɔk˩] (Vinh); (Hồ-Chí-Minh-City)","z":"頭髮"},{"w":"em bé","e":"baby","s":"Em bé kia có đôi mắt màu xanh nước biển.","se":"That baby has blue eyes.","pos":"noun","ety":"","ipa":"[ʔɛm˧˧ ʔɓɛ˧˦] (Hà-Nội); [ʔɛm˧˧ ʔɓɛ˨˩˦] (Huế); [ʔɛm˧˧ ʔɓɛ˦˥] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"嬰兒"},{"w":"so với","e":"to compare to","s":"So với người phụ nữ kia thì bạn rất cao.","se":"Compared to that woman, you are very tall.","pos":"","ety":"","ipa":"","z":"與...相比"},{"w":"khỏe","e":"strong","s":"So với bạn của anh ấy thì anh ấy trông rất khỏe.","se":"Compared to his friend, he looks very strong.","pos":"adj","ety":"","ipa":"","z":"強壯;健康"},{"w":"đáng yêu","e":"cute","s":"Hai con chó này đáng yêu như nhau. Cô ấy đáng yêu như búp bê.","se":"These two dogs are equally cute. She is cute like a doll.","pos":"adj","ety":"đáng (“to deserve; to be worth”) + yêu (“to love”).","ipa":"[ʔɗaːŋ˧˦ ʔiəw˧˧] (Hà-Nội); [ʔɗaːŋ˦˧˥ ʔiw˧˧] (Huế); [ʔɗaːŋ˦˥ ʔiw˧˧] (Hồ-Chí-Minh-City)","z":"可愛"},{"w":"trẻ","e":"young","s":"So với tuổi của cô ấy, cô ấy trông rất trẻ.","se":"Compared to her age, she looks very young.","pos":"adj","ety":"From Middle Vietnamese tlẻ. Attested in Phật thuyết đại báo phụ mẫu ân trọng kinh (佛說大報父母恩重經) as ⿺礼亇, composed of 亇 + 礼 (MC lejX) (modern SV: cá lễ), 礼 (MC lejX) (modern SV: lễ) and 里 (MC liX) (modern SV: lí). Sometimes connected to Chinese 稚 (MC drijH) (SV: trĩ) but this can now be rejected based on the *kl- cluster in Old Vietnamese.","ipa":"[t͡ɕɛ˧˩] (Hà-Nội); [ʈɛ˧˨] (Huế); [ʈɛ˨˩˦] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"年輕"},{"w":"cơ thể","e":"body","s":"Cô ấy đáng yêu, nhưng thân hình cô ấy rất là cơ bắp.","se":"She is cute, but her body is very muscular.","pos":"noun","ety":"Sino-Vietnamese word from 肌體.","ipa":"[kəː˧˧ tʰe˧˩] (Hà-Nội); [kəː˧˧ tʰej˧˨] (Huế); [kəː˧˧ tʰej˨˩˦] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"身體"},{"w":"cơ bắp","e":"muscle;muscular","s":"Cơ bắp của anh ấy trông to lớn hơn trước đây. Cô ấy nói cô ấy thích những người đàn ông cơ bắp.","se":"His muscles look bigger than before. She said she liked muscular men.","pos":"noun","ety":"cơ + bắp.","ipa":"[kəː˧˧ ʔɓap̚˧˦] (Hà-Nội); [kəː˧˧ ʔɓap̚˦˧˥] (Huế); [kəː˧˧ ʔɓap̚˦˥] (Hồ-Chí-Minh-City)","z":"肌肉;肌肉發達的"},{"w":"xoăn","e":"curly","s":"Tóc của cô ấy xoăn hơn trước.","se":"Her hair is curlier than before.","pos":"adj","ety":"","ipa":"[swan˧˧] (Hà-Nội); [swaŋ˧˧] (Huế); [s⁽ʷ⁾aŋ˧˧] (Hồ-Chí-Minh-City)","z":"捲(髮)"},{"w":"trái","e":"left","s":"Anh ấy thuận tay trái.","se":"He is left-handed.","pos":"adj","ety":"From Proto-Vietic *k-laːjʔ, from Proto-Mon-Khmer *klaj(ʔ) ~ *klaaj(ʔ) (“to change”), cognate with Muong tlải, Tho [Cuối Chăm] klaːj³, Khmer ក្លាយ (klaay, “to change”), Mon ကၠဲာ (klai, “to translate”). Compare also Thai กลาย (glaai), Lao ກາຍ (kāi).","ipa":"[t͡ɕaːj˧˦] (Hà-Nội); [ʈaːj˨˩˦] (Huế); [ʈaːj˦˥] (Hồ-Chí-Minh-City)","z":"左"},{"w":"sẫm màu","e":"dark","s":"Da của cô ấy sẫm màu và mềm mại hơn trước.","se":"Her skin is darker and softer than before.","pos":"","ety":"","ipa":"","z":"深色的"},{"w":"phải","e":"right","s":"Cánh tay phải của anh ấy khỏe hơn cánh tay trái.","se":"His right arm is stronger than his left arm.","pos":"adj","ety":"Non-Sino-Vietnamese reading of Chinese 被 (“to suffer; passive marker”, SV: bị) (Old Chinese: /*m-pʰ(r)ajʔ, m-pʰ(r)ajʔ-s, mə-pʰ(r)aj, pʰ(r)aj-s/ in Baxter and Sagart (2014)), along the semantic evolution of “to have to endure; to suffer” > “have to; must” > “correct” > “right (in direction)”. It may reflect an Old Chinese pronunciation /*N-pʰ(r)ajʔ-s/ with the loss of a nasal prefix as is also seen in other early loans (Sagart, per. comm.). The common Vietic word for “right” is Proto-Vietic *dam ~ *tam, whence the now-archaic đăm.","ipa":"[faːj˧˩] (Hà-Nội); [faːj˧˨] (Huế); [faːj˨˩˦] (Hồ-Chí-Minh-City); (Hà-Nội); (Hồ-Chí-Minh-City)","z":"右"},{"w":"vẻ ngoài","e":"appearance","s":"","se":"","pos":"","ety":"","ipa":"","z":"外表;外貌"},{"w":"mô tả","e":"to describe","s":"Cô ấy mô tả vẻ ngoài của anh ấy.","se":"She describes his appearance.","pos":"verb","ety":"Sino-Vietnamese word from 模寫.","ipa":"[mo˧˧ taː˧˩] (Hà-Nội); [mow˧˧ taː˧˨] (Huế); [mow˧˧ taː˨˩˦] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"描述"},{"w":"xanh","e":"blue","s":"Người đàn ông có đôi mắt màu xanh nước biển kia là bạn tôi.","se":"That man with blue eyes is my friend.","pos":"adj","ety":"Non-Sino-Vietnamese reading of Chinese 青 (“grue”, SV: thanh).","ipa":"[sajŋ̟˧˧] (Hà-Nội); [sɛɲ˧˧] (Huế); [san˧˧] (Hồ-Chí-Minh-City); (Hà-Nội); (Hồ-Chí-Minh-City)","z":"藍色"},{"w":"vui tính","e":"funny","s":"Người đàn ông có khuôn mặt tròn kia rất vui tính.","se":"That man with a round face is very funny.","pos":"adj","ety":"vui + tính.","ipa":"[vuj˧˧ tïŋ˧˦] (Hà-Nội); [vuj˧˧ tɨn˦˧˥] (Huế); [vuj˧˧ tɨn˦˥] (Hồ-Chí-Minh-City); [juj˧˧ tɨn˦˥] (Hồ-Chí-Minh-City)","z":"風趣;搞笑"},{"w":"thông minh","e":"smart","s":"Cậu bé với cánh tay trái bị gãy kia rất thông minh.","se":"That boy with a broken left arm is smart.","pos":"adj","ety":"Sino-Vietnamese word from 聰明.","ipa":"[tʰəwŋ͡m˧˧ mïŋ˧˧] (Hà-Nội); [tʰəwŋ͡m˧˧ mɨn˧˧] (Huế); [tʰəwŋ͡m˧˧ mɨn˧˧] (Hồ-Chí-Minh-City)","z":"聰明"},{"w":"quyến rũ","e":"sexy","s":"Người đàn ông với làn da ngăm và tóc xoăn dài kia rất là quyến rũ.","se":"That man who has dark skin and long curly hair is very sexy.","pos":"verb","ety":"The now obsolete form quyến dũ is quite sufficiently attested, notably in the Southern dialects that did not have the ‹r-›-‹d-› merger. The second element most likely being a non-Sino-Vietnamese reading of Chinese 誘 (SV: dụ). The form rũ might be a result of hypercorrection due to the merger ‹r-›-‹d-› in the inland Northern dialects, with the new spelling then spread and adopted in the dialects where the merger did not occur.","ipa":"[kwiən˧˦ zu˦ˀ˥] (Hà-Nội); [kwiəŋ˦˧˥ ʐʊw˧˨] (Huế); [wiəŋ˦˥ ɹʊw˨˩˦] (Hồ-Chí-Minh-City)","z":"性感;有魅力"},{"w":"thời tiết","e":"weather","s":"Thời tiết hôm nay đẹp.","se":"The weather is nice today.","pos":"noun","ety":"Sino-Vietnamese word from 時節, composed of 時 (“time, moment, season”) and 節 (“period”).","ipa":"[tʰəːj˨˩ tiət̚˧˦] (Hà-Nội); [tʰəːj˦˩ tiək̚˦˧˥] (Huế); [tʰəːj˨˩ tiək̚˦˥] (Hồ-Chí-Minh-City)","z":"天氣"},{"w":"mát","e":"cool","s":"Hôm nay trời mát.","se":"It’s cool today.","pos":"adj","ety":"From Proto-Vietic *t-maːc. The sense \"cray-cray\" is possibly also a phono-semantic matching with English mad, although the word is unlikely to be actually derived from English as it has the synonym ấm (“warm”).","ipa":"[maːt̚˧˦] (Hà-Nội); [maːk̚˦˧˥] (Huế); [maːk̚˦˥] (Hồ-Chí-Minh-City); ()","z":"涼爽"},{"w":"nắng","e":"sunny","s":"Trời nắng.","se":"It's sunny.","pos":"adj","ety":"From Proto-Vietic *ɗaŋʔ, from Proto-Mon-Khmer *p(ɗ)aŋ (“dry season”); cognate with Muong đẳng (“sunny”), Koho prang (“dry season”), Khmer ប្រាំង (prang, “dry season”).","ipa":"[naŋ˧˦] (Hà-Nội); [naŋ˦˧˥] (Huế); [naŋ˦˥] (Hồ-Chí-Minh-City)","z":"晴朗;有太陽"},{"w":"gió","e":"windy","s":"Thời tiết có gió.","se":"It's windy.","pos":"noun","ety":"From Middle Vietnamese gió, from Proto-Vietic *k-jɔːʔ ~ *kʰjɔːʔ, from Proto-Mon-Khmer *kjaal. Cognate with Muong xỏ, Arem kajɑːʔ, Pacoh cudyial, Khmer ខ្យល់ (khyɑl), Bahnar kial and Santali ᱦᱚᱭ (hôy). Attested in Phật thuyết đại báo phụ mẫu ân trọng kinh (佛說大報父母恩重經) as 𪬪, composed of 个 (MC kaH) + 愈 (MC yuX) (modern SV: cá dũ), and 愈 (MC yuX) (modern SV: dũ). Attested in the Annan Jishi (安南即事, 13th century) as 教 (MC kaewH) (compare the Sino-Korean and Sino-Japanese readings of the character). The rime of the Vietic and Munda forms (with back, rounded vowel) does not really match with the rest of Austroasiatic (which has *-aːl) and is probably one of the few identifiable Vieto-Munda isoglosses. Compare Juang kojo, Chut [Rục] kəjɔː³ vs. Old Mon kyāl, Talieng kjaːl.","ipa":"[zɔ˧˦] (Hà-Nội); [jɔ˨˩˦] (Huế); [jɔ˦˥] (Hồ-Chí-Minh-City); (); (Hồ-Chí-Minh-City)","z":"有風"},{"w":"rét đậm","e":"freezing","s":"Hôm nay sẽ rét đậm.","se":"It will be freezing today.","pos":"","ety":"","ipa":"","z":"嚴寒;極冷"},{"w":"mưa","e":"to rain","s":"Trời mưa.","se":"It rains.","pos":"noun","ety":"From Proto-Vietic *k-maː, from Proto-Mon-Khmer *gmaʔ; cognate with Muong mưa, Chut [Rục] kumᵊaː², Khmu kmaʔ and Mang maː² and probably Central Nicobarese [Nancowry] amiṅh. Munda cognates include Mundari gama.","ipa":"[mɨə˧˧] (Hà-Nội); [mɨə˧˧] (Huế); [mɨə˧˧] (Hồ-Chí-Minh-City); (Hà-Nội); (Hồ-Chí-Minh-City)","z":"下雨"},{"w":"cơn mưa","e":"the rain","s":"Trời sẽ mưa.","se":"It's going to rain.","pos":"","ety":"","ipa":"","z":"雨"},{"w":"tuyết rơi","e":"to snow","s":"Sẽ có tuyết rơi.","se":"It's going to snow.","pos":"","ety":"","ipa":"","z":"下雪"},{"w":"tạnh","e":"to stop","s":"Mưa sẽ mau tạnh. Tôi ước trời sẽ tạnh mưa.","se":"The rain is going to stop soon. I wish it would stop raining.","pos":"verb","ety":"Unclear. Either: * Non-Sino-Vietnamese reading of Chinese 晴 (“clear (of weather)”, SV: tình); if true, then it was probably a rather late loan from a regional Sinitic lect; the tonal correspondence is irregular for an early loan; or, * Non-Sino-Vietnamese reading of Chinese 靜 (“to be still”, SV: tĩnh, tịnh) or non-Sino-Vietnamese reading of Chinese 靖 (“\"to be still\" > \"to still\"”, SV: tĩnh, tịnh); if true, that the tonal, register, and rhyme correspondences are still typical for an early loan.","ipa":"[tajŋ̟˧˨ʔ] (Hà-Nội); [tɛɲ˨˩ʔ] (Huế); [tan˨˩˨] (Hồ-Chí-Minh-City)","z":"(雨雪)停了"},{"w":"tuyết","e":"the snow","s":"Tuyết đã ngừng rơi.","se":"The snow has stopped.","pos":"noun","ety":"Sino-Vietnamese word from 雪. Doublet of toát (as in trắng toát).","ipa":"[twiət̚˧˦] (Hà-Nội); [twiək̚˦˧˥] (Huế); [t⁽ʷ⁾iək̚˦˥] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"雪"},{"w":"bão nhiệt đới","e":"Typhoon;hurricane","s":"Có vẻ cơn bão nhiệt đới đang tới. Bão nhiệt đới thường xảy ra vào tháng sáu.","se":"It looks like a typhoon is coming. Hurricanes usually occur in June.","pos":"","ety":"","ipa":"","z":"颱風;颶風"},{"w":"cơn bão","e":"storm","s":"Có vẻ cơn bão đang tới.","se":"It looks like a storm is coming.","pos":"","ety":"","ipa":"","z":"暴風雨"},{"w":"nhiệt độ","e":"temperature","s":"","se":"","pos":"noun","ety":"Sino-Vietnamese word from 熱度, composed of 熱 (“heat”) and 度 (“degree”), literally \"degree of hotness\", especially high temperature. The usual word for \"temperature\" in other Sinospheric languages literally means \"degree of warmth\"; see Chinese 溫度／温度 (wēn dù), Japanese 温度 (ondo) and Korean 온도 (ondo).","ipa":"[ɲiət̚˧˨ʔ ʔɗo˧˨ʔ] (Hà-Nội); [ɲiək̚˨˩ʔ ʔɗow˨˩ʔ] (Huế); [ɲiək̚˨˩˨ ʔɗow˨˩˨] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"溫度;氣溫"},{"w":"tăng lên","e":"to rise","s":"Có vẻ nhiệt độ đang tăng lên.","se":"It looks like the temperature is rising.","pos":"","ety":"","ipa":"","z":"上升"},{"w":"nặng hạt","e":"heavily","s":"Trời có thể mưa nặng hạt tối nay.","se":"It might rain heavily tonight.","pos":"","ety":"","ipa":"","z":"(雨下得)很大"},{"w":"dự báo","e":"to forecast","s":"Dự báo trời sẽ mưa.","se":"It's forecast to rain.","pos":"verb","ety":"Sino-Vietnamese word from 預報.","ipa":"[zɨ˧˨ʔ ʔɓaːw˧˦] (Hà-Nội); [jɨ˨˩ʔ ʔɓaːw˨˩˦] (Huế); [jɨ˨˩˨ ʔɓaːw˦˥] (Hồ-Chí-Minh-City)","z":"預報"},{"w":"sương mù","e":"to be foggy","s":"Có thể có sương mù vào sáng sớm.","se":"It may be foggy in the early morning.","pos":"noun","ety":"sương + mù.","ipa":"[sɨəŋ˧˧ mu˨˩] (Hà-Nội); [ʂɨəŋ˧˧ mʊw˦˩] (Huế); [sɨəŋ˧˧ mʊw˦˩] (Huế); [ʂɨəŋ˧˧ mʊw˨˩] (Hồ-Chí-Minh-City); [sɨəŋ˧˧ mʊw˨˩] (Hồ-Chí-Minh-City)","z":"起霧"},{"w":"bão tuyết","e":"snowstorm","s":"Có thể có bão tuyết vào ngày mai.","se":"There may be a snowstorm tomorrow.","pos":"noun","ety":"","ipa":"[ʔɓaːw˦ˀ˥ twiət̚˧˦] (Hà-Nội); [ʔɓaːw˧˨ twiək̚˦˧˥] (Huế); [ʔɓaːw˨˩˦ t⁽ʷ⁾iək̚˦˥] (Hồ-Chí-Minh-City)","z":"暴風雪"},{"w":"nhiều mây","e":"to be cloudy","s":"Dự báo trời nhiều mây cả ngày.","se":"It's forecast to be cloudy all day.","pos":"","ety":"","ipa":"","z":"多雲"},{"w":"bệnh","e":"sick","s":"Cô ấy tới gặp bác sĩ vì cô ấy bị bệnh.","se":"She goes to see a doctor because she is sick.","pos":"noun","ety":"Sino-Vietnamese word from 病.","ipa":"[ʔɓəjŋ̟˧˨ʔ] (Hà-Nội); [ʔɓen˨˩ʔ] (Huế); [ʔɓəːn˨˩˨] (Hồ-Chí-Minh-City)","z":"生病"},{"w":"mệt","e":"tired","s":"Bố tôi đi ngủ sớm vì ông ấy mệt. Tôi thực sự mệt mỏi.","se":"My father goes to bed early because he is tired. I am really tired.","pos":"adj","ety":"","ipa":"[met̚˧˨ʔ] (Hà-Nội); [met̚˨˩ʔ] (Huế); [məːt̚˨˩˨] (Hồ-Chí-Minh-City)","z":"累;疲倦"},{"w":"khát","e":"thirsty","s":"Anh ấy uống hai oner","s":"Trời nóng nên chúng tôi đã bật điều hòa.","se":"It is hot, so we turned on the air-conditioner.","pos":"adj","ety":"","ipa":"","z":"冷氣;空調"},{"w":"máy sưởi","e":"heater","s":"Trời lạnh nên chúng tôi đã bật máy sưởi.","se":"It is cold, so I turn on the heater.","pos":"noun","ety":"máy + sưởi.","ipa":"[maj˧˦ sɨəj˧˩] (Hà-Nội); [maj˨˩˦ ʂɨj˧˨] (Huế); [maj˨˩˦ sɨj˧˨] (Huế); [ma(ː)j˦˥ ʂɨj˨˩˦] (Hồ-Chí-Minh-City); [ma(ː)j˦˥ sɨj˨˩˦] (Hồ-Chí-Minh-City)","z":"暖氣"},{"w":"cửa sổ","e":"window","s":"Trời có gió nên tôi đóng cửa sổ. Anh ấy vừa mới giúp tôi lau các cửa sổ.","se":"It is windy, so I close the window. He just helped me clean the windows.","pos":"noun","ety":"cửa (“door”) + sổ (“to escape, to slip away”).","ipa":"[kɨə˧˩ so˧˩] (Hà-Nội); [kɨə˧˨ ʂow˧˨] (Huế); [kɨə˧˨ sow˧˨] (Huế); [kɨə˨˩˦ ʂow˨˩˦] (Hồ-Chí-Minh-City); [kɨə˨˩˦ sow˨˩˦] (Hồ-Chí-Minh-City); ()","z":"窗戶"},{"w":"đau","e":"pain","s":"Anh ấy bị đau lưng nên anh ấy không đi làm.","se":"He had back pain so he did not go to work.","pos":"verb","ety":"Cognate with Muong tau and Thavung ตู. See also nau (“pain, birth pangs”), related through an infixed form.","ipa":"[ʔɗaw˧˧] (Hà-Nội); [ʔɗaw˧˧] (Huế); [ʔɗa(ː)w˧˧] (Hồ-Chí-Minh-City)","z":"疼痛"},{"w":"muộn","e":"late","s":"Anh ấy đã thức dậy muộn nên nhỡ xe buýt. Anh ấy bị sa thải bởi vì anh ấy luôn đi làm trễ.","se":"He woke up so late that he missed the bus. He was fired because he always comes to work late.","pos":"adj","ety":"From Old Chinese 晚 (OC *m[o][r]ʔ) (B-S) (SV: vãn).","ipa":"[muən˧˨ʔ] (Hà-Nội); [muəŋ˨˩ʔ] (Huế); [muəŋ˨˩˨] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"遲到;晚"},{"w":"hủy","e":"to cancel","s":"Trời mưa to đến nỗi tôi phải hủy cuộc hẹn với bạn của mình.","se":"It was raining heavily that I canceled my appointment with my friend.","pos":"verb","ety":"","ipa":"","z":"取消"},{"w":"tham gia","e":"to join","s":"Bạn có muốn tham gia không?","se":"Would you like to join?","pos":"verb","ety":"Sino-Vietnamese word from 參加 (“to participate, to take part”).", í-Minh-City)","z":"微笑;笑"},{"w":"đỏ mặt","e":"to blush","s":"Nụ cười của bạn khiến tôi đỏ mặt.","se":"Your smile makes me blush.","pos":"verb","ety":"đỏ (“red”) + mặt (“face”), literally “(of face) to redden”.","ipa":"[ʔɗɔ˧˩ mat̚˧˨ʔ] (Hà-Nội); [ʔɗɔ˧˨ mak̚˨˩ʔ] (Huế); [ʔɗɔ˨˩˦ mak̚˨˩˨] (Hồ-Chí-Minh-City)","z":"臉紅"},{"w":"ngại ngùng","e":"shy","s":"Anh làm em ngại ngùng.","se":"You make me shy.","pos":"verb","ety":"-ung reduplication (A tone) of ngại.","ipa":"[ŋaːj˧˨ʔ ŋʊwŋ͡m˨˩] (Hà-Nội); [ŋaːj˨˩ʔ ŋʊwŋ͡m˦˩] (Huế); [ŋaːj˨˩˨ ŋʊwŋ͡m˨˩] (Hồ-Chí-Minh-City)","z":"害羞"},{"w":"điên","e":"crazy","s":"Anh khiến em phát điên.","se":"You make me crazy.","pos":"adj","ety":"Sino-Vietnamese word from 癲.","ipa":"[ʔɗiən˧˧] (Hà-Nội); [ʔɗiəŋ˧˧] (Huế); [ʔɗiəŋ˧˧] (Hồ-Chí-Minh-City)","z":"瘋狂"},{"w":"yêu","e":"to love","s":"Tôi yêu bạn. Tôi ước anh ấy sẽ yêu tôi một ngày nào đó.","se":"I love you. I wish he would love me one day.","pos":"verb","ety":"There are cognates in Tho lects, e.g. Cuối Tân Hợp Ɂiew³⁵ (Nguyễn Hữu Hoành et al., 2022), with the meaning of \"beautiful, pretty\". Considering the semantics, the Vietnamese verb is probably an extension of the Sino-Vietnamese word from 妖, as seen in yêu kiều (“charming, graceful”).","ipa":"[ʔiəw˧˧] (Hà-Nội); [ʔiw˧˧] (Huế); [ʔiw˧˧] (Hồ-Chí-Minh-City)","z":"愛"},{"w":"phải lòng","e":"to have a crush on","s":"Tớ có cảm tình với cậu.","se":"I have a crush on you.","pos":"verb","ety":"phải + lòng.","ipa":"[faːj˧˩ lawŋ͡m˨˩] (Hà-Nội); [faːj˧˨ lawŋ͡m˦˩] (Huế); [faːj˧˨ lɔŋ˦˩] (Huế); [faːj˨˩˦ lawŋ͡m˨˩] (Hồ-Chí-Minh-City)","z":"暗戀;迷戀"},{"w":"nhớ","e":"to miss;to remember","s":"Tớ nhớ cậu thật nhiều. Tôi ước anh ấy sẽ nhớ ra cô ấy.","se":"I miss you so much. I wish he would remember her.","pos":"verb","ety":"From Proto-Vietic *k-ɲǝːʔ. Cognate with Muong nhở, Arem ɲʌːˀ and Chut [Rục] kəɲəː³. Attested in Phật thuyết đại báo phụ mẫu ân trọng kinh (佛說大報父母恩重經) as 可汝 (MC khaX nyoX) (modern SV: khả nhữ).","ipa":"[ɲəː˧˦] (Hà-Nội); [ɲəː˨˩˦] (Huế); [ɲəː˦˥] (Hồ-Chí-Minh "[liən˧˧ laːk̚˧˨ʔ] (Hà-Nội); [liəŋ˧˧ laːk̚˨˩ʔ] (Huế); [liəŋ˧˧ laːk̚˨˩˨] (Hồ-Chí-Minh-City)","z":"聯絡;聯繫"},{"w":"gửi tin nhắn","e":"to send a message","s":"Tôi sẽ gửi tin nhắn cho bạn sau khi tôi về tới nhà.","se":"I will send you a message after I get home.","pos":"","ety":"","ipa":"","z":"傳訊息"},{"w":"trả lời","e":"to reply;to answer","s":"Tôi sẽ trả lời cô ấy khi tôi không bận. Chúng ta cần trả lời những câu hỏi này.","se":"I will reply to her when I am not busy. We shall try to answer these questions.","pos":"verb","ety":"trả (“to return”) + lời (“word”).","ipa":"[t͡ɕaː˧˩ ləːj˨˩] (Hà-Nội); [ʈaː˧˨ ləːj˦˩] (Huế); [ʈaː˨˩˦ ləːj˨˩] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"回覆;回答"},{"w":"tin nhắn","e":"message","s":"Tôi sẽ đọc tin nhắn của anh ấy sau khi tôi làm xong bài tập về nhà của mình.","se":"I will read his message after I finish my homework.","pos":"noun","ety":"tin + nhắn.","ipa":"[tin˧˧ ɲan˧˦] (Hà-Nội); [tin˧˧ ɲaŋ˦˧˥] (Huế); [tɨn˧˧ ɲaŋ˦˥] (Hồ-Chí-Minh-City)","z":"訊息"},{"w":"tán gẫu","e":"to chat","s":"Tôi sẽ tán gẫu với cô ấy sau khi tôi làm xong việc của mình.","se":"I will chat with her after I finish my work.","pos":"verb","ety":"tán + gẫu.","ipa":"[taːn˧˦ ɣəw˦ˀ˥] (Hà-Nội); [taːŋ˦˧˥ ɣəw˧˨] (Huế); [taːŋ˦˥ ɣəw˨˩˦] (Hồ-Chí-Minh-City)","z":"聊天;閒聊"},{"w":"gõ","e":"to type","s":"Tôi sẽ gõ tin nhắn sau khi tôi đọc xong quyển sách.","se":"I will type a message after I read the book.","pos":"verb","ety":"From Proto-Mon-Khmer *g(uə)h (“to knock”); cognates with Khmer គោះ (kŭəh) and Chrau gŏh.","ipa":"[ɣɔ˦ˀ˥] (Hà-Nội); [ɣɔ˧˨] (Huế); [ɣɔ˨˩˦] (Hồ-Chí-Minh-City)","z":"打字"},{"w":"vàng hoe","e":"blonde","s":"Anh ấy nói anh ấy thích một cô gái có mái tóc vàng hoe.","se":"He said he liked a girl who has blonde hair.","pos":"adj","ety":"","ipa":"[vaːŋ˨˩ hwɛ˧˧] (Hà-Nội); [vaːŋ˦˩ hwɛ˧˧] (Huế); [vaːŋ˨˩ wɛ˧˧] (Hồ-Chí-Minh-City); [jaːŋ˨˩ wɛ˧˧] (Hồ-Chí-Minh-City)","z":"金髮的"},{"w":"thẳng","e":"straight","s":"Bạn tôi nói cô ấy thích mái tóc thẳng.","se":"My friend said she liked straight hair.","pos":"adj","ety":"Most likely a loanword. Its source is unclear; compare Middle Chinese 侹 (MC thengH) \"long, level, straight (obsolete)\" > Sino-Vietnamese thính. The native Vietic word for \"straight\" is ngay, which also has Khmuic cognates.","ipa":"[tʰaŋ˧˩] (Hà-Nội); [tʰaŋ˧˨] (Huế); [tʰaŋ˨˩˦] (Hồ-Chí-Minh-City)","z":"直(髮);直的"},{"w":"hoàn hảo","e":"perfect","s":"Anh ấy nói anh ấy sẽ tìm được một người phụ nữ hoàn hảo một ngày nào đó.","se":"He said he would find a perfect woman one day.","pos":"adj","ety":"Sino-Vietnamese word from 完好 (“in perfect condition”).","ipa":"[hwaːn˨˩ haːw˧˩] (Hà-Nội); [hwaːŋ˦˩ haːw˧˨] (Huế); [waːŋ˨˩ haːw˨˩˦] (Hồ-Chí-Minh-City)","z":"完美"},{"w":"kì lạ","e":"strange","s":"Cô ấy nói rằng anh chàng kia thật kì lạ.","se":"She said that guy was strange.","pos":"adj","ety":"kì + lạ.","ipa":"[ki˨˩ laː˧˨ʔ] (Hà-Nội); [kɪj˦˩ laː˨˩ʔ] (Huế); [kɪj˨˩ laː˨˩˨] (Hồ-Chí-Minh-City)","z":"奇怪"},{"w":"mùa hè","e":"summer","s":"Hôm qua họ nói với chúng tôi rằng họ đã gặp nhau mùa hè năm ngoái.","se":"They told us yesterday that they met each other last summer.","pos":"noun","ety":"mùa + hè.","ipa":"[muə˨˩ hɛ˨˩] (Hà-Nội); [muə˦˩ hɛ˦˩] (Huế); [muə˨˩ hɛ˨˩] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"夏天"},{"w":"mùa đông","e":"winter","s":"Anh ấy nói với tôi rằng anh ấy đã chia tay bạn gái của mình mùa đông năm ngoái.","se":"He told me that he broke up with his girlfriend last winter.","pos":"noun","ety":"mùa + đông.","ipa":"[muə˨˩ ʔɗəwŋ͡m˧˧] (Hà-Nội); [muə˦˩ ʔɗəwŋ͡m˧˧] (Huế); [muə˨˩ ʔɗəwŋ͡m˧˧] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"冬天"},{"w":"tán tỉnh","e":"to flirt","s":"Cô ấy nói với tôi sáng nay rằng một người đàn ông đã tán tỉnh cô ấy trong bữa tiệc tối qua.","se":"She told me this morning that a man flirted with her at the party last night.","pos":"verb","ety":"-inh reduplicative of tán.","ipa":"[taːn˧˦ tïŋ˧˩] (Hà-Nội); [taːŋ˦˧˥ tɨn˧˨] (Huế); [taːŋ˦˥ tɨn˨˩˦] (Hồ-Chí-Minh-City)","z":"調情;搭訕"},{"w":"ngoại tình","e":"affair","s":"Đừng ngoại tình.","se":"Don't have an affair.","pos":"noun","ety":"Sino-Vietnamese word from 外情.","ipa":"[ŋwaːj˧˨ʔ tïŋ˨˩] (Hà-Nội); [ŋwaːj˨˩ʔ tɨn˦˩] (Huế); [ŋwaːj˨˩˨ tɨn˨˩] (Hồ-Chí-Minh-City)","z":"外遇;婚外情"},{"w":"ngắt lời","e":"to interrupt","s":"Đừng ngắt lời chúng tôi.","se":"Don't interrupt us.","pos":"verb","ety":"ngắt + lời.","ipa":"[ŋat̚˧˦ ləːj˨˩] (Hà-Nội); [ŋak̚˦˧˥ ləːj˦˩] (Huế); [ŋak̚˦˥ ləːj˨˩] (Hồ-Chí-Minh-City)","z":"插嘴;打斷"},{"w":"nắm tay","e":"to hold hands","s":"Cô ấy bảo anh ấy nắm tay.","se":"She told him to hold hands.","pos":"","ety":"","ipa":"","z":"牽手"},{"w":"thú nhận","e":"to confess","s":"Cô ấy đã bảo anh ấy thú nhận rằng anh ấy đã ngoại tình. Bị cáo đã thú nhận rằng anh ta trộm tiền từ nạn nhân.","se":"She told him to confess that he had an affair. The defendant confessed that he stole money from the victim.","pos":"verb","ety":"Sino-Vietnamese word from 首 (“to confess”) and 認 (“to acknowledge”).","ipa":"[tʰu˧˦ ɲən˧˨ʔ] (Hà-Nội); [tʰʊw˨˩˦ ɲəŋ˨˩ʔ] (Huế); [tʰʊw˦˥ ɲəŋ˨˩˨] (Hồ-Chí-Minh-City)","z":"坦白;告白"},{"w":"tên","e":"name","s":"Tối qua anh ấy hỏi tôi tên của cô ấy là gì.","se":"He asked me last night what her name is.","pos":"noun","ety":"","ipa":"[ten˧˧] (Hà-Nội); [ten˧˧] (Huế); [təːn˧˧] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"名字"},{"w":"họ","e":"surname","s":"Bác sĩ hỏi bệnh nhân họ của bệnh nhân là gì.","se":"The doctor asked the patient what his surname is.","pos":"noun","ety":"Non-Sino-Vietnamese reading of Chinese 戶 (“family”, SV: hộ). Doublet of cửa and hộ.","ipa":"[hɔ˧˨ʔ] (Hà-Nội); [hɔ˨˩ʔ] (Huế); [hɔ˨˩˨] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"姓氏"},{"w":"quê quán","e":"hometown","s":"Tuần trước , cô ấy đã hỏi anh ấy quê quán của anh ấy ở đâu.","se":"She asked him last week where his hometown was.","pos":"noun","ety":"quê + quán (貫).","ipa":"[kwe˧˧ kwaːn˧˦] (Hà-Nội); [kwej˧˧ kwaːŋ˦˧˥] (Huế); [wej˧˧ waːŋ˦˥] (Hồ-Chí-Minh-City)","z":"家鄉;籍貫"},{"w":"liệu","e":"if","s":"Hôm qua, anh ấy hỏi tôi liệu tôi có yêu anh ấy không.","se":"He asked me yesterday if I love him.","pos":"verb","ety":"Sino-Vietnamese word from 料.","ipa":"[liəw˧˨ʔ] (Hà-Nội); [liw˨˩ʔ] (Huế); [liw˨˩˨] (Hồ-Chí-Minh-City)","z":"是否"},{"w":"dao","e":"knife","s":"Cắt bằng một con dao.","se":"Cut with a knife.","pos":"noun","ety":"From Proto-Vietic *-taːw, from Old Chinese 刀 (OC *C.tˤaw) (B-S) (SV: đao). Compare North Central Vietnamese đao (“knife”). This word was borrowed at a stage when the Sinitic word still retained the preinitial, thus causing lenition: *-t- > Middle Vietnamese dĕao [ðj-] > modern [z- ~ j-]. The Sino-Vietnamese reading đao, on the other hand, derived from Middle Chinese 刀 (MC taw) when the onset already simplified and resulted in a stop. The North Central đao, although formally identical to the more recent Sino-Vietnamese reading, belongs to the same stratum as dao, as indicated by the meaning \"knife\", due to the fact that these dialects did not undergo lenition to as large an extent.","ipa":"[zaːw˧˧] (Hà-Nội); [jaːw˧˧] (Huế); [jaːw˧˧] (Hồ-Chí-Minh-City); (); ()","z":"刀子"},{"w":"dĩa","e":"fork","s":"Ăn bằng cái nĩa.","se":"Eat with a fork.","pos":"noun","ety":"Non-Sino-Vietnamese reading of Chinese 碟 (“plate; dish; saucer; disc”, SV: điệp). Doublet of đĩa.","ipa":"[ziə˦ˀ˥] (Hà-Nội); [jiə˧˨] (Huế); [jiə˨˩˦] (Hồ-Chí-Minh-City)","z":"叉子"},{"w":"thìa","e":"spoon","s":"Ăn súp bằng cái thìa.","se":"Eat soup with a spoon","pos":"noun","ety":"Non-Sino-Vietnamese reading of Chinese 匙 (“spoon”, SV: thi). Compare chìa.","ipa":"[tʰiə˨˩] (Hà-Nội); [tʰiə˦˩] (Huế); [tʰiə˨˩] (Hồ-Chí-Minh-City)","z":"湯匙"},{"w":"chiên","e":"to fry","s":"Chiên gà trong một phút.","se":"Fry the chicken for a minute.","pos":"verb","ety":"Non-Sino-Vietnamese reading of Chinese 煎 (“to pan-fry”, SV: tiên), (possibly Teochew). Compare Khmer ជៀន (ciən), ចៀន (ciən).","ipa":"[t͡ɕiən˧˧] (Hà-Nội); [t͡ɕiəŋ˧˧] (Huế); [ciəŋ˧˧] (Hồ-Chí-Minh-City)","z":"炸;煎"},{"w":"hấp","e":"to steam","s":"Hấp cá trong khoảng một giờ.","se":"Steam the fish for about an hour.","pos":"verb","ety":"","ipa":"[həp̚˧˦] (Hà-Nội); [həp̚˦˧˥] (Huế); [həp̚˦˥] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"蒸"},{"w":"rửa","e":"to wash","s":"Rửa rau.","se":"Wash the vegetables.","pos":"verb","ety":"From Proto-Mon-Khmer *raawh; cognate with Pacoh rao, Koho rao and Chut [Rục] rᵊàːw.","ipa":"[zɨə˧˩] (Hà-Nội); [ʐɨə˧˨] (Huế); [ɹɨə˨˩˦] (Hồ-Chí-Minh-City)","z":"洗"},{"w":"gọt vỏ","e":"to peel","s":"Trước tiên, gọt vỏ khoai tây.","se":"First, peel the potatoes.","pos":"","ety":"","ipa":"","z":"削皮"},{"w":"cắt","e":"to cut","s":"Tiếp theo, cắt làm đôi.","se":"Next, cut it in half.","pos":"verb","ety":"From Proto-Vietic *kac, from Proto-Mon-Khmer *kac. Cognate with Muong Bi cách, Pacoh kéiq (“to pick, to pluck”), Ngeq kɛc, Khmer កាច់ (kac, “to break, to snap”), Bahnar kĕch (“to harvest”), Pnar khait (“to pick”), Kensiu kec. Related to gặt (“to harvest”). Unrelated to Chinese 割 (OC *Cə-kˤat) (SV: cát), although the two are sometimes (incorrectly) considered connected. The Austroasiatic root *kac originally referred to the action of \"plucking\" and \"breaking\", with \"cutting\" being secondary. Not to be confused with the similar-looking root *kat ~ *kaat (“to cut”), which gave rise to Khmer កាត់ (kat) and Korwa geɖ.","ipa":"[kat̚˧˦] (Hà-Nội); [kak̚˦˧˥] (Huế); [kak̚˦˥] (Hồ-Chí-Minh-City)","z":"切"},{"w":"cắt (chặt)","e":"to chop","s":"Sau đó, cắt một vài lá bạc hà.","se":"Then, chop some mint leaves.","pos":"","ety":"","ipa":"","z":"剁;砍"},{"w":"xào","e":"to stir fry","s":"Tiếp theo, xào tất cả rau trong năm phút.","se":"Next, stir-fry all the vegetables for five minutes.","pos":"verb","ety":"Non-Sino-Vietnamese reading of Chinese 炒 (“stir fry”, SV: sao).","ipa":"[saːw˨˩] (Hà-Nội); [saːw˦˩] (Huế); [saːw˨˩] (Hồ-Chí-Minh-City)","z":"炒"},{"w":"trộn","e":"to mix","s":"Cuối cùng, trộn tất cả lại với nhau.","se":"Finally, mix them all together.","pos":"verb","ety":"Related to lộn. See also Zhuang gyonj (“to merge together”), which points to a complex onset consisted of a velar and a liquid in the proto-form. Compare the correspondence between Zhuang gyong and Vietnamese trống.","ipa":"[t͡ɕon˧˨ʔ] (Hà-Nội); [ʈoŋ˨˩ʔ] (Huế); [ʈoŋ˨˩˨] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"攪拌;混合"},{"w":"thơm","e":"fragrant","s":"Tiếp tục phi tỏi trong chảo cho tới khi thơm.","se":"Keep frying the garlic in a pan until fragrant.","pos":"adj","ety":"From Proto-Vietic *tʰəːm (“fragrant”), perhaps from Proto-Mon-Khmer *dhum ~ *dhuum (“fragrant; to scent”); compare Khmer ធុំ (thum, “fragrant”) and Proto-Katuic *pahuum ~ *tahuum (whence Pacoh thum (“fragrant”)).","ipa":"[tʰəːm˧˧] (Hà-Nội); [tʰəːm˧˧] (Huế); [tʰəːm˧˧] (Hồ-Chí-Minh-City)","z":"香;芳香"},{"w":"chảo","e":"pan","s":"Chiên trứng trong một cái chảo.","se":"Fry the egg in a pan.","pos":"noun","ety":"","ipa":"[t͡ɕaːw˧˩] (Hà-Nội); [t͡ɕaːw˧˨] (Huế); [caːw˨˩˦] (Hồ-Chí-Minh-City)","z":"平底鍋"},{"w":"luộc","e":"to boil","s":"Luộc 5 quả trứng trong 6 phút hoặc tới khi trứng chín.","se":"Boil five eggs for six minutes or until they are ready.","pos":"verb","ety":"From a Tai language; compare Proto-Tai *luəkᴰ (“to scald”) (whence Thai ลวก (lûuak)). Compare also Cantonese 淥／渌 (luk6, “to boil; to scald”), which represents a Tai substrate.","ipa":"[luək̚˧˨ʔ] (Hà-Nội); [luək̚˨˩ʔ] (Huế); [luək̚˨˩˨] (Hồ-Chí-Minh-City)","z":"水煮;燙"},{"w":"nồi","e":"pot","s":"Trộn tất cả rau trong nồi.","se":"Mix all the vegetables together in the pot.","pos":"noun","ety":"From Proto-Vietic *noːl.","ipa":"[noj˨˩] (Hà-Nội); [noj˦˩] (Huế); [noj˨˩] (Hồ-Chí-Minh-City)","z":"鍋子"},{"w":"nướng (than)","e":"to grill","s":"Tiếp tục nướng bít tết cho đến khi sẵn sàng.","se":"Continue grilling the steak until it is ready.","pos":"","ety":"","ipa":"","z":"烤(炭火)"},{"w":"nướng (lò)","e":"to bake","s":"Nướng bánh trong bốn mươi phút cho đến khi có mùi thơm.","se":"Bake the cakes for forty minutes until fragrant.","pos":"","ety":"","ipa":"","z":"烘烤(烤箱)"},{"w":"làm nóng","e":"to heat","s":"Làm nóng súp trong nồi.","se":"Heat the soup in the pot.","pos":"","ety":"","ipa":"","z":"加熱"},{"w":"lò vi sóng","e":"microwave","s":"Làm nóng cơm trong lò vi sóng.","se":"Heat the rice in the microwave.","pos":"noun","ety":"lò (“oven”) + vi sóng (“microwave”).","ipa":"[lɔ˨˩ vi˧˧ sawŋ͡m˧˦] (Hà-Nội); [lɔ˦˩ vɪj˧˧ ʂawŋ͡m˦˧˥] (Huế); [lɔ˦˩ vɪj˧˧ sɔŋ˦˧˥] (Huế); [lɔ˨˩ vɪj˧˧ ʂawŋ͡m˦˥] (Hồ-Chí-Minh-City); [lɔ˨˩ jɪj˧˧ sawŋ͡m˦˥] (Hồ-Chí-Minh-City)","z":"微波爐"},{"w":"pizza","e":"pizza","s":"Làm nóng pizza trong lò vi sóng.","se":"Heat the pizza in the microwave.","pos":"","ety":"","ipa":"","z":"披薩"},{"w":"lò","e":"oven","s":"Cuối cùng, nướng pizza trong lò.","se":"Finally, bake the pizza in the oven.","pos":"noun","ety":"Non-Sino-Vietnamese reading of Chinese 爐 (SV: lô). Doublet of lẩu.","ipa":"[lɔ˨˩] (Hà-Nội); [lɔ˦˩] (Huế); [lɔ˨˩] (Hồ-Chí-Minh-City)","z":"烤箱"},{"w":"tủ lạnh","e":"fridge","s":"Để sữa trong tủ lạnh.","se":"Put the milk in the fridge.","pos":"noun","ety":"tủ (“cabinet”) + lạnh (冷, “cold”).","ipa":"[tu˧˩ lajŋ̟˧˨ʔ] (Hà-Nội); [tʊw˧˨ lɛɲ˨˩ʔ] (Huế); [tʊw˨˩˦ lan˨˩˨] (Hồ-Chí-Minh-City)","z":"冰箱"},{"w":"người ngoài hành tinh","e":"alien","s":"Chúng tôi đã xem một bộ phim về người ngoài hành tinh ngày hôm qua.","se":"We watched a movie about aliens yesterday.","pos":"noun","ety":"Literally “person from outside the planet”, erroneous calque of Chinese 外星人 (ngoại tinh nhân, literally “person from an ‘outside’ (another) planet”)","ipa":"[ŋɨəj˨˩ ŋwaːj˨˩ hajŋ̟˨˩ tïŋ˧˧] (Hà-Nội); [ŋɨj˦˩ ŋwaːj˦˩ hɛɲ˦˩ tɨn˧˧] (Huế); [ŋɨj˨˩ ŋwaːj˨˩ han˨˩ tɨn˧˧] (Hồ-Chí-Minh-City)","z":"外星人"},{"w":"tin tức","e":"news","s":"Tin tức sáng nay là về một ca sỹ nổi tiếng.","se":"This morning's news was about a famous singer.","pos":"noun","ety":"Non-Sino-Vietnamese reading of Chinese 信息 (“information”, SV: tín tức).","ipa":"[tin˧˧ tɨk̚˧˦] (Hà-Nội); [tin˧˧ tɨk̚˦˧˥] (Huế); [tɨn˧˧ tɨk̚˦˥] (Hồ-Chí-Minh-City)","z":"新聞"},{"w":"vụ giết người","e":"murder","s":"Có một vụ giết người tối qua.","se":"There was a murder last night.","pos":"","ety":"","ipa":"","z":"謀殺案"},{"w":"kịch tính","e":"drama","s":"Câu chuyện này là về một vụ án mạng.","se":"This drama story was about a murder.","pos":"adj","ety":"Sino-Vietnamese word from 劇 and 性.","ipa":"[kïk̟̚˧˨ʔ tïŋ˧˦] (Hà-Nội); [kɨt̚˨˩ʔ tɨn˦˧˥] (Huế); [kɨt̚˨˩˨ tɨn˦˥] (Hồ-Chí-Minh-City)","z":"戲劇"},{"w":"tiểu thuyết","e":"novel","s":"Tiểu thuyết này là về tình yêu.","se":"That novel was about love.","pos":"noun","ety":"Sino-Vietnamese word from 小說 (“novel”).","ipa":"[tiəw˧˩ tʰwiət̚˧˦] (Hà-Nội); [tiw˧˨ tʰwiək̚˦˧˥] (Huế); [tiw˨˩˦ tʰ⁽ʷ⁾iək̚˦˥] (Hồ-Chí-Minh-City)","z":"小說"},{"w":"giết","e":"to kill","s":"Trong bộ phim đó, người ngoài hành tinh giết hết tất cả nhân loại.","se":"In that movie, the aliens killed all the humans.","pos":"verb","ety":"From Proto-Vietic *k-ə-ceːt (surface form of morphologically *k-pr-ceːt, with *-pr- reduced to *-r- then to a vocalic element), the causative form of *k-ceːt (“to die”) (whence chết). Cognate with Chut [Rục] kuciːt⁷ (\"to kill\"), Proto-Monic *k-r-cət (“to kill”) (whence Mon ဂစိုတ်).","ipa":"[ziət̚˧˦] (Hà-Nội); [jiək̚˦˧˥] (Huế); [jiək̚˦˥] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"殺"},{"w":"ma","e":"ghost","s":"Mặc dù tôi chưa thấy ma bao giờ, nhưng tôi vẫn sợ chúng.","se":"Although I have never seen a ghost, I'm still afraid of them.","pos":"noun","ety":"Sino-Vietnamese word from 魔. The modern Vietnamese usage of ma (“ghost”) and quỷ (“demon; ogre”) is contrary to that of Mandarin 魔 (mó, “demon”) and 鬼 (guǐ, “ghost”).","ipa":"[maː˧˧] (Hà-Nội); [maː˧˧] (Huế); [maː˧˧] (Hồ-Chí-Minh-City)","z":"鬼"},{"w":"kinh dị","e":"horror","s":"Tôi nghe nói quyển sách kinh dị này là về một hồn ma.","se":"I heard that this horror book is about a ghost.","pos":"adj","ety":"Sino-Vietnamese word from 驚異, composed of 驚 (“frighten”) and 異 (“different”).","ipa":"[kïŋ˧˧ zi˧˨ʔ] (Hà-Nội); [kɨn˧˧ jɪj˨˩ʔ] (Huế); [kɨn˧˧ jɪj˨˩˨] (Hồ-Chí-Minh-City)","z":"恐怖"},{"w":"thám hiểm","e":"adventure","s":"Tôi nghe nói bộ phim thám hiểm này rất hay.","se":"I heard that this adventure film is very good.","pos":"verb","ety":"Sino-Vietnamese word from 探險.","ipa":"[tʰaːm˧˦ hiəm˧˩] (Hà-Nội); [tʰaːm˦˧˥ hiəm˧˨] (Huế); [tʰaːm˦˥ him˨˩˦] (Hồ-Chí-Minh-City)","z":"冒險"},{"w":"lãng mạn","e":"romantic","s":"Cô ấy nghe nói rằng câu chuyện kịch tính này rất lãng mạn.","se":"She heard that this drama story is romantic.","pos":"adj","ety":"Sino-Vietnamese word from 浪漫, composed of 浪 (“indulgent”) and 漫 (“indulgent”). Originally a parallelistic Literary Chinese word meaning \"self-indulgent.\" The \"romantic\" meaning must have come from Japanese 浪漫 (rōman, roman), given that its modern Japanese pronunciation is the only plausible reflex that sounds similar to its European etymon. Other reflexes such as Mandarin làngmàn, Cantonese long6 maan6, or Korean 낭만 (nangman), all with the additional consonant /ŋ/, cannot sufficiently explain 浪漫 as a supposed phonetic transcription of a European etymon (such as English Roman, romance, Romanic, romantic, etc.) where no such consonant occurs. It has been claimed that Natsume Sōseki was the first one to repurpose Literary Chinese 浪漫 as a phonetic transcription into Japanese, particularly in 浪漫主義 (rōman-shugi, “romanticism”).","ipa":"[laːŋ˦ˀ˥ maːn˧˨ʔ] (Hà-Nội); [laːŋ˧˨ maːŋ˨˩ʔ] (Huế); [laːŋ˨˩˦ maːŋ˨˩˨] (Hồ-Chí-Minh-City)","z":"浪漫"},{"w":"hài","e":"comedy","s":"Chúng tôi đã xem một bộ phim hài ở rạp chiếu phim.","se":"We watched a comedy movie at the cinema.","pos":"adj","ety":"Sino-Vietnamese word from 諧.","ipa":"[haːj˨˩] (Hà-Nội); [haːj˦˩] (Huế); [haːj˨˩] (Hồ-Chí-Minh-City)","z":"喜劇"},{"w":"chuyện","e":"story","s":"Tôi nghe nói rằng câu chuyện này là về hai người yêu nhau.","se":"I heard that this story is about two people who fall in love.","pos":"noun","ety":"Non-Sino-Vietnamese reading of Chinese 傳 (SV: truyện). Doublet of truyện, truyền, chuyền, and đồn. The initial ‹ch-› here and in chuyền possibly results from a sound change insides Vietnamese, different from, and later than the one which yields ‹ch-› in chạp, chàng, & possibly also chuồng.","ipa":"[t͡ɕwiən˧˨ʔ] (Hà-Nội); [t͡ɕwiəŋ˨˩ʔ] (Huế); [c⁽ʷ⁾iəŋ˨˩˨] (Hồ-Chí-Minh-City)","z":"故事;事情"},{"w":"thấy","e":"to find","s":"Tôi thấy câu chuyện này rất lãng mạn.","se":"I find this story very romantic.","pos":"verb","ety":"Non-Sino-Vietnamese reading of Chinese 視 (SV: thị). Compare Cantonese 睇 (tai2, “to see”) and Teochew 睇 (toin2, “to see”).","ipa":"[tʰəj˧˦] (Hà-Nội); [tʰəj˨˩˦] (Huế); [tʰəj˦˥] (Hồ-Chí-Minh-City)","z":"覺得;發現"},{"w":"hài hước","e":"funny","s":"Tôi thấy câu chuyện này rất hài hước.","se":"I found this story very funny.","pos":"adj","ety":"Sino-Vietnamese word from 諧謔.","ipa":"[haːj˨˩ hɨək̚˧˦] (Hà-Nội); [haːj˦˩ hɨək̚˦˧˥] (Huế); [haːj˨˩ hɨək̚˦˥] (Hồ-Chí-Minh-City)","z":"好笑;有趣"},{"w":"thú vị","e":"interesting","s":"Tôi nghĩ việc này rất thú vị.","se":"I think this is interesting.","pos":"adj","ety":"Sino-Vietnamese word from 趣味 (“interest”).","ipa":"[tʰu˧˦ vi˧˨ʔ] (Hà-Nội); [tʰʊw˨˩˦ vɪj˨˩ʔ] (Huế); [tʰʊw˦˥ vɪj˨˩˨] (Hồ-Chí-Minh-City); [tʰʊw˦˥ jɪj˨˩˨] (Hồ-Chí-Minh-City)","z":"有趣;有意思"},{"w":"chiến tranh","e":"war","s":"Tôi thấy bộ phim về chiến tranh đó rất buồn.","se":"I find war movies to be so sad.","pos":"noun","ety":"Sino-Vietnamese word from 戰爭 (“war”).","ipa":"[t͡ɕiən˧˦ t͡ɕajŋ̟˧˧] (Hà-Nội); [t͡ɕiəŋ˦˧˥ ʈɛɲ˧˧] (Huế); [ciəŋ˦˥ ʈan˧˧] (Hồ-Chí-Minh-City)","z":"戰爭"},{"w":"quan điểm","e":"opinion","s":"Anh ấy chỉ đưa ra hai quan điểm về bộ phim.","se":"He gave only two opinions about the movie.","pos":"noun","ety":"Sino-Vietnamese word from 觀點 (“point of view”).","ipa":"[kwaːn˧˧ ʔɗiəm˧˩] (Hà-Nội); [kwaːŋ˧˧ ʔɗiəm˧˨] (Huế); [waːŋ˧˧ ʔɗim˨˩˦] (Hồ-Chí-Minh-City)","z":"觀點;看法"},{"w":"ý tưởng","e":"idea","s":"Tôi chỉ có một ý tưởng ngay bây giờ.","se":"I only have one idea right now.","pos":"noun","ety":"Sino-Vietnamese word from 意想.","ipa":"[ʔi˧˦ tɨəŋ˧˩] (Hà-Nội); [ʔɪj˨˩˦ tɨəŋ˧˨] (Huế); [ʔɪj˦˥ tɨəŋ˨˩˦] (Hồ-Chí-Minh-City)","z":"想法;點子"},{"w":"bày tỏ","e":"to express","s":"Cô ấy chỉ bày tỏ ý kiến của mình.","se":"She just expressed her opinion.","pos":"verb","ety":"bày + tỏ.","ipa":"[ʔɓaj˨˩ tɔ˧˩] y.","pos":"","ety":"","ipa":"","z":"星星"},{"w":"sáng","e":"bright","s":"Những ngôi sao hôm nay sáng hơn hôm qua.","se":"The stars are brighter today than yesterday.","pos":"noun","ety":"From Proto-Vietic *p-laːŋʔ (“bright”) (in which *pl- had changed to *pʰr- and from there developed to its current form), from Proto-Mon-Khmer *plaaŋʔ. Cognates with láng (in sáng láng), Khasi phalang, Tho [Cuối Chăm] blaːŋ³. Compare also Thai ปลั่ง (bplàng).","ipa":"[saːŋ˧˦] (Hà-Nội); [ʂaːŋ˦˧˥] (Huế); [saːŋ˦˧˥] (Huế); [ʂaːŋ˦˥] (Hồ-Chí-Minh-City); [saːŋ˦˥] (Hồ-Chí-Minh-City); (Hà-Nội); (Hồ-Chí-Minh-City)","z":"明亮"},{"w":"vườn","e":"garden","s":"Vườn của tôi rộng hơn vườn của anh ấy.","se":"My garden is bigger than his garden.","pos":"noun","ety":"Non-Sino-Vietnamese reading of Chinese 園 (“garden”, SV: viên).","ipa":"[vɨən˨˩] (Hà-Nội); [vɨəŋ˦˩] (Huế); [vɨəŋ˨˩] (Hồ-Chí-Minh-City); [jɨəŋ˨˩] (Hồ-Chí-Minh-City); (); (); (Hồ-Chí-Minh-City)","z":"花園"},{"w":"hoa","e":"flower","s":"Vườn của tôi có nhiều hoa hơn vườn của anh ấy.","se":"My garden has more flowers than his garden.","pos":"noun","ety":"Sino-Vietnamese word from 花. The \"capital\" sense probably comes from the flourishes of the cursive capital letters that are commonly taught in elementary schools; even cursive lower-case letters don't have as many flourishes, which explains the distinction. The form ba is attested in some Central dialects, most notably from the placename Đông Ba.","ipa":"[hwaː˧˧] (Hà-Nội); [hwaː˧˧] (Huế); [waː˧˧] (Hồ-Chí-Minh-City)","z":"花"},{"w":"cây cối","e":"tree","s":"Tôi thích hoa hơn cây cối.","se":"I prefer flowers to trees.","pos":"noun","ety":"From cây (“tree; plant”) + cối (from Proto-Vietic *koːjʔ (“plant; vegetation”)).","ipa":"[kəj˧˧ koj˧˦] (Hà-Nội); [kəj˧˧ koj˨˩˦] (Huế); [kəj˧˧ koj˦˥] (Hồ-Chí-Minh-City)","z":"樹木"},{"w":"con ong","e":"bee","s":"Khu vườn này có nhiều ong hơn khu vườn kia vì nó có nhiều hoa hơn.","se":"This garden has more bees than that garden because it has more flowers.","pos":"","ety":"","ipa":"","z":"蜜蜂"},{"w":"như nhau","e":"equal","s":"Vườn của chúng tôi đẹp như nhau.","se":"Our gardens are equally beautiful.","pos":"verb","ety":"như + nhau.","ipa":"[ɲɨ˧˧ ɲaw˧˧] (Hà-Nội); [ɲɨ˧˧ ɲaw˧˧] (Huế); [ɲɨ˧˧ ɲa(ː)w˧˧] (Hồ-Chí-Minh-City)","z":"相等;一樣"},{"w":"động vật","e":"animal","s":"Tôi không thích để động vật vào vườn của mình.","se":"I don't like to let animals enter my garden.","pos":"noun","ety":"Sino-Vietnamese word from 動物, composed of 動 (“moving”) and 物 (“thing”).","ipa":"[ʔɗəwŋ͡m˧˨ʔ vət̚˧˨ʔ] (Hà-Nội); [ʔɗəwŋ͡m˨˩ʔ vək̚˨˩ʔ] (Huế); [ʔɗəwŋ͡m˨˩˨ vək̚˨˩˨] (Hồ-Chí-Minh-City); [ʔɗəwŋ͡m˨˩˨ jək̚˨˩˨] (Hồ-Chí-Minh-City); (); (Hà-Nội)","z":"動物"},{"w":"sa mạc","e":"desert","s":"Sa mạc lớn nhất ở châu Nam Cực.","se":"The largest desert is in Antarctica.","pos":"noun","ety":"Sino-Vietnamese word from 沙漠 (“desert”).","ipa":"[saː˧˧ maːk̚˧˨ʔ] (Hà-Nội); [ʂaː˧˧ maːk̚˨˩ʔ] (Huế); [saː˧˧ maːk̚˨˩ʔ] (Huế); [ʂaː˧˧ maːk̚˨˩˨] (Hồ-Chí-Minh-City); [saː˧˧ maːk̚˨˩˨] (Hồ-Chí-Minh-City)","z":"沙漠"},{"w":"thế giới","e":"world","s":"Động vật lớn nhất trên thế giới là cá voi xanh.","se":"The biggest animal in the world is the blue whale.","pos":"noun","ety":"Sino-Vietnamese word from 世界, composed of 世 (“lifetime; time”) and 界 (“boundary; space”), from Buddhist Literary Chinese 世界 (shìjiè, “realm; domain; universe; reality”, literally “time and space”). Compare thế gian, thời gian and vũ trụ.","ipa":"[tʰe˧˦ zəːj˧˦] (Hà-Nội); [tʰej˨˩˦ jəːj˨˩˦] (Huế); [tʰej˦˥ jəːj˦˥] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"世界"},{"w":"đại dương","e":"ocean","s":"Đại dương lớn nhất trên thế giới là Thái Bình Dương","se":"The biggest ocean in the world is the Pacific Ocean.","pos":"noun","ety":"Sino-Vietnamese word from 大洋, composed of 大 (“great”) and 洋 (“ocean”).","ipa":"[ʔɗaːj˧˨ʔ zɨəŋ˧˧] (Hà-Nội); [ʔɗaːj˨˩ʔ jɨəŋ˧˧] (Huế); [ʔɗaːj˨˩˨ jɨəŋ˧˧] (Hồ-Chí-Minh-City)","z":"海洋"},{"w":"núi","e":"mountain","s":"Ngọn núi cao nhất trên thế giới là Đỉnh Everest","se":"The highest mountain in the world is Mount Everest."," 閃電;雷電"},{"w":"cháy rừng","e":"forest fire","s":"Cháy rừng thường xảy ra vào mùa Hè.","se":"Forest fires usually occur in summer.","pos":"","ety":"","ipa":"","z":"森林大火"},{"w":"làm hư hại","e":"to damage","s":"Động đất có thể làm hư hại mọi thứ.","se":"Earthquakes can damage everything.","pos":"","ety":"","ipa":"","z":"損壞;破壞"},{"w":"phá hủy","e":"to destroy","s":"Sóng thần có thể phá hủy một con tàu lớn.","se":"A tsunami can destroy a big ship.","pos":"verb","ety":"","ipa":"","z":"摧毀"},{"w":"di cư","e":"to uproot","s":"Cháy rừng có thể khiến tất cả động vật trong rừng di cư đi nơi khác.","se":"A forest fire can uproot all animals in the forest.","pos":"verb","ety":"Sino-Vietnamese word from 移居.","ipa":"[zi˧˧ kɨ˧˧] (Hà-Nội); [jɪj˧˧ kɨ˧˧] (Huế); [jɪj˧˧ kɨ˧˧] (Hồ-Chí-Minh-City)","z":"流離失所;遷移"},{"w":"hủy hoại","e":"to ruin","s":"Một trận động đất có thể phá hủy toàn thành phố.","se":"An earthquake can ruin a whole city.","pos":"verb","ety":"","ipa":"","z":"毀壞;糟蹋"},{"w":"gây ra","e":"to cause","s":"Trận mưa lớn đã gây ra lũ lụt.","se":"The heavy rain caused a flood.","pos":"","ety":"","ipa":"","z":"造成;引起"},{"w":"núi lửa","e":"volcano","s":"Núi lửa phun trào gây ra động đất.","se":"A volcanic eruption causes earthquakes.","pos":"noun","ety":"núi (“mountain”) + lửa (“fire”), calque of Chinese 火焰山 (hoả diệm/diễm sơn). Texts from the early 20th-century show very limited attestation of hoả sơn 火山 (huǒshān), the usual term for \"volcano\" in Chinese and other Sino-Xenic languages, much more common in Vietnamese was hoả diệm sơn, attested in Đại Nam Quấc âm tự vị (1895) and hoả diễm sơn, attested in Cách trí giáo khoa thư (latter half of the 1920s); in both instances núi lửa is also attested in the vicinity. See also Satō (2015).","ipa":"[nuj˧˦ lɨə˧˩] (Hà-Nội); [nuj˨˩˦ lɨə˧˨] (Huế); [nuj˦˥ lɨə˨˩˦] (Hồ-Chí-Minh-City)","z":"火山"},{"w":"hoảng loạn","e":"panic","s":"Cháy gây ra hoảng loạn.","se":"Fire causes panic.","pos":"verb","ety":"Sino-Vietnamese word from 慌亂.","ipa":"[hwaːŋ˧˩ lwaːn˧˨ʔ] (Hà-Nội); [hwaːŋ˧˨ lwaːŋ˨˩ʔ] (Huế); [waːŋ˨˩˦ l⁽ʷ⁾aːŋ˨˩˨] (Hồ-Chí-Minh-City)","z":"恐慌"},{"w":"chết","e":"to die","s":"Cháy rừng khiến nhiều loài động vật bị chết.","se":"Forest fires cause animals to die.","pos":"verb","ety":"From Proto-Vietic *k-ceːt, from Proto-Mon-Khmer *kc(ə)t (“to die”). Related to giết (“to kill”).","ipa":"[t͡ɕet̚˧˦] (Hà-Nội); [t͡ɕet̚˦˧˥] (Huế); [cəːt̚˦˥] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"死;死亡"},{"w":"thiên nhiên","e":"nature","s":"Những trận lũ thường xảy ra do con người phá hoại thiên nhiên.","se":"Floods often occur because humans destroy nature.","pos":"noun","ety":"Sino-Vietnamese word from 天然.","ipa":"[tʰiən˧˧ ɲiən˧˧] (Hà-Nội); [tʰiəŋ˧˧ ɲiəŋ˧˧] (Huế); [tʰiəŋ˧˧ ɲiəŋ˧˧] (Hồ-Chí-Minh-City)","z":"大自然"},{"w":"tên lửa","e":"rocket","s":"Anh ấy thích đọc về tên lửa.","se":"He likes to read about rockets.","pos":"noun","ety":"tên (“arrow”) + lửa (“fire”), calque of Chinese 火箭 (hoả tiễn).","ipa":"[ten˧˧ lɨə˧˩] (Hà-Nội); [ten˧˧ lɨə˧˨] (Huế); [təːn˧˧ lɨə˨˩˦] (Hồ-Chí-Minh-City)","z":"火箭"},{"w":"ngắm sao","e":"to stargaze","s":"Cô ấy không thích ngắm sao.","se":"She does not like to stargaze.","pos":"","ety":"","ipa":"","z":"觀星"},{"w":"kính thiên văn","e":"telescope","s":"Cô ấy thích dùng kính thiên văn để nhìn bầu trời.","se":"She likes to look at the sky using a telescope.","pos":"","ety":"","ipa":"","z":"天文望遠鏡"},{"w":"hành tinh","e":"planet","s":"Cô ấy thích quan sát các hành tinh vào ban đêm qua kính thiên văn.","se":"She likes to look at the planets at night through a telescope.","pos":"noun","ety":"Sino-Vietnamese word from 行星, composed of 行 (“to go”) and 星 (“star”). Compare European words for planet which originate from the Greek root meaning \"wandering star\".","ipa":"[hajŋ̟˨˩ tïŋ˧˧] (Hà-Nội); [hɛɲ˦˩ tɨn˧˧] (Huế); [han˨˩ tɨn˧˧] (Hồ-Chí-Minh-City)","z":"行星"},{"w":"phi hành gia","e":"astronaut","s":"Tôi nghĩ phi hành gia là một công việc thú vị.","se":"I think being an astronaut is an interesting job.","pos":"noun","ety":"Sino-Vietnamese word from 飛行家, composed of 飛行 and 家.","ipa":"[fi˧˧ hajŋ̟˨˩ zaː˧˧] (Hà-Nội); [fɪj˧˧ hɛɲ˦˩ jaː˧˧] (Huế); [fɪj˧˧ han˨˩ jaː˧˧] (Hồ-Chí-Minh-City)","z":"太空人"},{"w":"Sao Thổ","e":"Saturn","s":"Tôi không chắc rằng con người có thể sống trên Sao Thổ.","se":"I doubt that humans can live on Saturn.","pos":"","ety":"","ipa":"","z":"土星"},{"w":"Nguyệt thực","e":"lunar eclipse","s":"Tôi không chắc rằng chúng ta có thể thấy nguyệt thực tối nay.","se":"I doubt that we can see the lunar eclipse tonight.","pos":"","ety":"","ipa":"","z":"月食"},{"w":"trăng tròn","e":"full moon","s":"Cô ấy tin rằng cô ấy có thể nói chuyện với ma vào ngày trăng tròn.","se":"She believes that she can talk to ghosts on a full moon.","pos":"noun","ety":"trăng + tròn.","ipa":"[t͡ɕaŋ˧˧ t͡ɕɔn˨˩] (Hà-Nội); [ʈaŋ˧˧ ʈɔŋ˦˩] (Huế); [ʈaŋ˧˧ ʈɔŋ˨˩] (Hồ-Chí-Minh-City)","z":"滿月"},{"w":"khí quyển","e":"atmosphere","s":"Phi hành gia tin rằng mặt trăng không có khí quyển.","se":"The astronaut believes that the moon does not have an atmosphere.","pos":"noun","ety":"Sino-Vietnamese word from 氣圈.","ipa":"[xi˧˦ kwiən˧˩] (Hà-Nội); [kʰɪj˨˩˦ kwiəŋ˧˨] (Huế); [xɪj˨˩˦ kwiəŋ˧˨] (Huế); [kʰɪj˦˥ wiəŋ˨˩˦] (Hồ-Chí-Minh-City); [xɪj˦˥ wiəŋ˨˩˦] (Hồ-Chí-Minh-City)","z":"大氣層"},{"w":"đường kính","e":"diameter","s":"Tôi không chắc rằng đường kính của trái đất lớn hơn Sao Thổ.","se":"I doubt that the diameter of the Earth is bigger than Saturn's.","pos":"noun","ety":"đường (“sugar”) + kính (“glass; clear”, 鏡).","ipa":"[ʔɗɨəŋ˨˩ kïŋ˧˦] (Hà-Nội); [ʔɗɨəŋ˦˩ kɨn˦˧˥] (Huế); [ʔɗɨəŋ˨˩ kɨn˦˥] (Hồ-Chí-Minh-City)","z":"直徑"},{"w":"tưởng tượng","e":"to imagine","s":"Tôi hình dung có thể có người ngoài hành tinh.","se":"I imagine there could be aliens.","pos":"verb","ety":"Sino-Vietnamese word from 想像 (“to imagine”).","ipa":"[tɨəŋ˧˩ tɨəŋ˧˨ʔ] (Hà-Nội); [tɨəŋ˧˨ tɨəŋ˨˩ʔ] (Huế); [tɨəŋ˨˩˦ tɨəŋ˨˩˨] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"想像"},{"w":"Nhật thực","e":"solar eclipse","s":"Tôi không thể tưởng tượng ra nhật thực có thể phá hủy thế giới như t at eaves form an enclosure, a \"space\"; while beams are more linear and representative of time, although Literary Chinese 宙 (zhòu) was also used for \"heaven\" which is more \"space\" than \"time\". Compare thế giới.","ipa":"[vu˦ˀ˥ t͡ɕu˧˨ʔ] (Hà-Nội); [vʊw˧˨ ʈʊw˨˩ʔ] (Huế); [vʊw˨˩˦ ʈʊw˨˩˨] (Hồ-Chí-Minh-City); [jʊw˨˩˦ ʈʊw˨˩˨] (Hồ-Chí-Minh-City)","z":"宇宙"},{"w":"quỹ đạo","e":"orbit","s":"Tôi vừa nhận ra quỹ đạo của Trái đất không phải hình tròn.","se":"I just realized the Earth's orbit is not a circle.","pos":"noun","ety":"Sino-Vietnamese word from 軌道.","ipa":"[kwi˦ˀ˥ ʔɗaːw˧˨ʔ] (Hà-Nội); [kwɪj˧˨ ʔɗaːw˨˩ʔ] (Huế); [wɪj˨˩˦ ʔɗaːw˨˩˨] (Hồ-Chí-Minh-City)","z":"軌道"},{"w":"cửa","e":"door","s":"Tôi nhờ chồng tôi sửa cái cửa.","se":"I had my husband fix the door.","pos":"noun","ety":"From a Sino-Tibetan language. Compare Phuza ʑɛ³¹ ka³¹ (\"door\"), Nuosu ꀃꈈ (ip ko, “door”), Naxi ku (“door”). Cognate with Muong cứa. Related to Chinese 戶 (OC *m-qˤaʔ) (B-S) (SV: hộ) through the Sino-Tibetan root, but unlikely to be derived from it since correspondences are irregular. Doublet of hộ and họ.","ipa":"[kɨə˧˩] (Hà-Nội); [kɨə˧˨] (Huế); [kɨə˨˩˦] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"門"},{"w":"sơn","e":"to paint","s":"Tôi nhờ anh ấy sơn màu đỏ cho cánh cửa.","se":"I had him paint the door red.","pos":"noun","ety":"From Proto-Vietic *k-rəːn (“black varnish tree”). Cognate with Tho [Cuối Chăm] kʰrəːn¹.","ipa":"[səːn˧˧] (Hà-Nội); [ʂəːŋ˧˧] (Huế); [səːŋ˧˧] (Huế); [ʂəːŋ˧˧] (Hồ-Chí-Minh-City); [səːŋ˧˧] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"油漆;粉刷"},{"w":"mái nhà","e":"roof","s":"Tôi nhờ anh ấy sửa mái nhà.","se":"I had him fix the roof.","pos":"","ety":"","ipa":"","z":"屋頂"},{"w":"phòng khách","e":"living room","s":"Cô ấy nhờ anh ấy sơn phòng khách màu xanh nước biển.","se":"She had him paint the living room blue.","pos":"noun","ety":"phòng (“room”) + khách (“guest”), i.e. \"room for guests\".","ipa":"[fawŋ͡m˨˩ xajk̟̚˧˦] (Hà-Nội); [fawŋ͡m˦˩ kʰat̚˦˧˥] (Huế); [fɔŋ˦˩ xat̚˦˧˥] (Huế); [fawŋ͡m˨˩ kʰat̚ ours a day.","pos":"verb","ety":"Non-Sino-Vietnamese reading of Chinese 勸 (“to advise”, SV: khuyến).","ipa":"[xwiən˧˧] (Hà-Nội); [kʰwiəŋ˧˧] (Huế); [xwiəŋ˧˧] (Huế); [kʰwiəŋ˧˧] (Hồ-Chí-Minh-City); [xwiəŋ˧˧] (Hồ-Chí-Minh-City)","z":"勸告;建議"},{"w":"gối","e":"pillow","s":"Bác sĩ đã khuyên tôi ngủ với gối.","se":"The doctor advised me to sleep with a pillow.","pos":"noun","ety":"From Proto-Vietic *-koːlʔ, perhaps from Proto-Mon-Khmer *kulʔ, a variant of *kəl( ) ~ *kəəlʔ (“to support; to help”). Compare Khmer កល់ (kɑl, “to support from below”), ខ្នល់ (khnɑl, “prop; cushion”).","ipa":"[ɣoj˧˦] (Hà-Nội); [ɣoj˨˩˦] (Huế); [ɣoj˦˥] (Hồ-Chí-Minh-City)","z":"枕頭"},{"w":"chăn","e":"blanket","s":"Tôi bảo anh ấy cất chăn trong phòng ngủ.","se":"I told him to keep the blanket in the bedroom.","pos":"verb","ety":"","ipa":"[t͡ɕan˧˧] (Hà-Nội); [t͡ɕaŋ˧˧] (Huế); [caŋ˧˧] (Hồ-Chí-Minh-City)","z":"棉被;毯子"},{"w":"giá sách","e":"bookshelf","s":"Tôi vừa mới giúp cô ấy đặt sách của cô ấy lên giá sách.","se":"I just helped her put her books on the bookshelf.","pos":"","ety":"","ipa":"","z":"書架"},{"w":"trang trí","e":"to decorate","s":"Cô ấy giúp anh ấy trang trí phòng ngủ.","se":"She helped him decorate his bedroom.","pos":"verb","ety":"Sino-Vietnamese word from 裝置 (“to equip; to fit; device”).","ipa":"[t͡ɕaːŋ˧˧ t͡ɕi˧˦] (Hà-Nội); [ʈaːŋ˧˧ ʈɪj˨˩˦] (Huế); [ʈaːŋ˧˧ ʈɪj˦˥] (Hồ-Chí-Minh-City)","z":"裝飾;佈置"},{"w":"cải tạo","e":"to renovate","s":"Tôi đã giúp anh ấy cải tạo nhà của anh ấy.","se":"I helped him renovate his house.","pos":"verb","ety":"Sino-Vietnamese word from 改造.","ipa":"[kaːj˧˩ taːw˧˨ʔ] (Hà-Nội); [kaːj˧˨ taːw˨˩ʔ] (Huế); [kaːj˨˩˦ taːw˨˩˨] (Hồ-Chí-Minh-City)","z":"改建;翻修"},{"w":"xây dựng","e":"to build","s":"Anh ấy đã giúp bố của mình xây một nhà bếp mới.","se":"He helped his father build a new kitchen.","pos":"verb","ety":"xây + dựng.","ipa":"[səj˧˧ zɨŋ˧˨ʔ] (Hà-Nội); [səj˧˧ jɨŋ˨˩ʔ] (Huế); [səj˧˧ jɨŋ˨˩˨] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"建造"},{"w":"thay mới","e":"to replace","s":"Anh ấy a vụ án hình sự.","se":"He is a defendant in the crime.","pos":"","ety":"","ipa":"","z":"被告"},{"w":"tòa án","e":"court","s":"Bị cáo đã xuất hiện ở tòa án.","se":"The defendant appeared in court.","pos":"noun","ety":"","ipa":"","z":"法院"},{"w":"có tội","e":"guilty","s":"Tòa án đã phát hiện anh ta có tội.","se":"The court found him guilty.","pos":"","ety":"","ipa":"","z":"有罪"},{"w":"xin lỗi","e":"to apologize","s":"Bị cáo chưa từng xin lỗi.","se":"The defendant has never apologized.","pos":"verb","ety":"xin (“to beg”) + lỗi (“mistake”). The literal meaning of these two words is \"to beg for someone's mistake\", which some people might consider strange. It's possibly a shortened form of the more outdated literary form xin thứ lỗi/xin tha lỗi.","ipa":"[sin˧˧ loj˦ˀ˥] (Hà-Nội); [sin˧˧ loj˧˨] (Huế); [sɨn˧˧ loj˨˩˦] (Hồ-Chí-Minh-City)","z":"道歉"},{"w":"nạn nhân","e":"victim","s":"Nạn nhân chưa từng nhận được một lời xin lỗi.","se":"The victim has never received an apology.","pos":"noun","ety":"Sino-Vietnamese word from 難人, composed of 難 (“disaster”) and 人 (“person”).","ipa":"[naːn˧˨ʔ ɲən˧˧] (Hà-Nội); [naːŋ˨˩ʔ ɲəŋ˧˧] (Huế); [naːŋ˨˩˨ ɲəŋ˧˧] (Hồ-Chí-Minh-City)","z":"受害者"},{"w":"nhân chứng","e":"witness","s":"Nhân chứng chưa bao giờ tới tòa án.","se":"The witness has never been to court.","pos":"noun","ety":"Sino-Vietnamese word from 人證 (“witness testimony”).","ipa":"[ɲən˧˧ t͡ɕɨŋ˧˦] (Hà-Nội); [ɲəŋ˧˧ t͡ɕɨŋ˦˧˥] (Huế); [ɲəŋ˧˧ cɨŋ˦˥] (Hồ-Chí-Minh-City)","z":"證人"},{"w":"thẩm phán","e":"judge","s":"Thẩm phán chưa bao giờ thấy một tội ác như vậy.","se":"The judge has never seen such a crime.","pos":"noun","ety":"Sino-Vietnamese word from 審判 (“trial”).","ipa":"[tʰəm˧˩ faːn˧˦] (Hà-Nội); [tʰəm˧˨ faːŋ˦˧˥] (Huế); [tʰəm˨˩˦ faːŋ˦˥] (Hồ-Chí-Minh-City)","z":"法官"},{"w":"nghi can","e":"suspect","s":"Nghi can chưa từng thấy nhân chứng trước đây.","se":"The suspect has never seen the witness before.","pos":"","ety":"","ipa":"","z":"嫌疑犯"},{"w":"vô tội","e":"innocent","s":"Nghi can là vô tội.","se":"The suspect is innocent.","pos":"adj","ety":"Sino-Vietnamese word from 無罪, composed of 無 (“-less”) and 罪 (“crime”).","ipa":"[vo˧˧ toj˧˨ʔ] (Hà-Nội); [vow˧˧ toj˨˩ʔ] (Huế); [vow˧˧ toj˨˩˨] (Hồ-Chí-Minh-City); [jow˧˧ toj˨˩˨] (Hồ-Chí-Minh-City)","z":"無罪;清白"},{"w":"tự tử","e":"to commit suicide","s":"Nạn nhân đã có ý định tự tử.","se":"The victim planned to commit suicide.","pos":"verb","ety":"Sino-Vietnamese word from 自死, composed of 自 (“self”) and 死 (“death”).","ipa":"[tɨ˧˨ʔ tɨ˧˩] (Hà-Nội); [tɨ˨˩ʔ tɨ˧˨] (Huế); [tɨ˨˩˨ tɨ˨˩˦] (Hồ-Chí-Minh-City)","z":"自殺"},{"w":"phủ nhận","e":"to deny","s":"Nghi can đã phủ nhận phạm tội.","se":"The suspect denied committing the crime.","pos":"verb","ety":"Sino-Vietnamese word from 否認 (“to deny, to negate”).","ipa":"[fu˧˩ ɲən˧˨ʔ] (Hà-Nội); [fʊw˧˨ ɲəŋ˨˩ʔ] (Huế); [fʊw˨˩˦ ɲəŋ˨˩˨] (Hồ-Chí-Minh-City)","z":"否認"},{"w":"thừa nhận","e":"to admit","s":"Bị cáo đã thừa nhận rằng anh ta đã trộm nhà của nạn nhân.","se":"The defendant admitted that he robbed the victim.","pos":"verb","ety":"Sino-Vietnamese word from 承認.","ipa":"[tʰɨə˨˩ ɲən˧˨ʔ] (Hà-Nội); [tʰɨə˦˩ ɲəŋ˨˩ʔ] (Huế); [tʰɨə˨˩ ɲəŋ˨˩˨] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"承認"},{"w":"vụ án","e":"case","s":"Thẩm phán đã quyết định rằng anh ta có tội trong vụ án này.","se":"The judge ruled that he is guilty in this case.","pos":"","ety":"","ipa":"","z":"案件"},{"w":"chứng minh","e":"to prove","s":"Anh ta đã chứng minh rằng anh ta vô tội.","se":"He proved that he is innocent.","pos":"verb","ety":"Sino-Vietnamese word from 證明.","ipa":"[t͡ɕɨŋ˧˦ mïŋ˧˧] (Hà-Nội); [t͡ɕɨŋ˦˧˥ mɨn˧˧] (Huế); [cɨŋ˦˥ mɨn˧˧] (Hồ-Chí-Minh-City)","z":"證明"},{"w":"tiểu đường","e":"diabetes","s":"Nếu bạn ăn quá nhiều đồ ngọt, bạn sẽ bị tiểu đường.","se":"If you eat too many sweets, you will get diabetes.","pos":"noun","ety":"tiểu (“to urinate”) + đường (“sugar”), perhaps calque of Chinese 糖尿病 (tángniàobìng, literally “sugary urine disease”).","ipa":"[tiəw˧˩ ʔɗɨəŋ˨˩] (Hà-Nội); [tiw˧˨ ʔɗɨəŋ˦˩] (Huế); [tiw˨˩˦ ʔɗɨəŋ˨˩] (Hồ-Chí-Minh-City)","z":"糖尿病"},{"w":"khỏe mạnh","e":"healthy","s":"Nếu tôi ăn nhiều rau hơn, tôi sẽ khỏe mạnh hơn.","se":"If I eat more vegetables, I will be healthier.","pos":"adj","ety":"","ipa":"","z":"健康"},{"w":"tập thể dục","e":"to exercise","s":"Nếu có thể, bạn nên tập thể dục hàng ngày.","se":"If possible, you should exercise every day.","pos":"","ety":"","ipa":"","z":"做運動;健身"},{"w":"tươi trẻ","e":"fresh","s":"Nếu bạn tập yoga hàng ngày, bạn sẽ trông tươi trẻ.","se":"If you do yoga every day, you will look fresh.","pos":"adj","ety":"tươi + trẻ.","ipa":"[tɨəj˧˧ t͡ɕɛ˧˩] (Hà-Nội); [tɨj˧˧ ʈɛ˧˨] (Huế); [tɨj˧˧ ʈɛ˨˩˦] (Hồ-Chí-Minh-City)","z":"有朝氣;清新"},{"w":"vóc dáng đẹp","e":"in good shape","s":"Nếu bạn thường xuyên tới phòng tập thể hình, bạn sẽ có vóc dáng đẹp.","se":"If you go to the gym often, you will be in good shape.","pos":"","ety":"","ipa":"","z":"身材好"},{"w":"cần thiết","e":"necessary","s":"Nếu cần thiết, tôi sẽ tự sửa xe.","se":"If necessary, I will fix the car by myself.","pos":"adj","ety":"Sino-Vietnamese word from 懃 and 切.","ipa":"[kən˨˩ tʰiət̚˧˦] (Hà-Nội); [kəŋ˦˩ tʰiək̚˦˧˥] (Huế); [kəŋ˨˩ tʰiək̚˦˥] (Hồ-Chí-Minh-City)","z":"必要的"},{"w":"đau vai","e":"shoulder pain","s":"Nếu cô ấy không làm việc quá lâu, bây giờ cô ấy đã không bị đau vai.","se":"If she had not worked too long, she would not have shoulder pain now.","pos":"","ety":"","ipa":"","z":"肩膀痛"},{"w":"đánh răng","e":"to brush one's teeth","s":"Nếu tôi đánh răng hàng ngày, bây giờ tôi đã không bị đau răng.","se":"If I had brushed my teeth everyday, I would not have a toothache now.","pos":"verb","ety":"đánh (“to rub to clean or polish”) + răng (“teeth”).","ipa":"[ʔɗajŋ̟˧˦ zaŋ˧˧] (Hà-Nội); [ʔɗɛɲ˦˧˥ ʐaŋ˧˧] (Huế); [ʔɗan˦˥ ɹaŋ˧˧] (Hồ-Chí-Minh-City)","z":"刷牙"},{"w":"tắm","e":"to shower","s":"Nếu tôi không tắm sau khi tập thể dục tối qua, tôi đã không ngủ ngon.","se":"If I didn't shower after exercise at night, I would not sleep well.","pos":"verb","ety":"Cognate with Muong Bi thẳm, Khasi sum, Muak Sa-aak sum³. The Austroasiatic root for which these words descended from contains a varieties of forms that are difficult to interpret and connect, see the entry of Pacoh houm for more.","ipa":"[tam˧˦] (Hà-Nội); [tam˦˧˥] (Huế); [tam˦˥] (Hồ-Chí-Minh-City)","z":"洗澡;淋浴"},{"w":"thuốc giảm đau","e":"pain killer","s":"Nếu tôi uống thuốc giảm đau, tôi đã không cảm thấy đau quá nhiều như hôm qua.","se":"If I had taken pain killers, I would not have felt so much pain yesterday.","pos":"","ety":"","ipa":"","z":"止痛藥"},{"w":"hồi phục","e":"to recover","s":"Nếu tôi uống thuốc ngày hôm qua, bây giờ tôi đã hồi phục rồi.","se":"If I had taken medicine yesterday, I would have recovered by now.","pos":"verb","ety":"Sino-Vietnamese word from 回復.","ipa":"[hoj˨˩ fʊwk͡p̚˧˨ʔ] (Hà-Nội); [hoj˦˩ fʊwk͡p̚˨˩ʔ] (Huế); [hoj˨˩ fʊwk͡p̚˨˩˨] (Hồ-Chí-Minh-City)","z":"康復;復原"},{"w":"ca phẫu thuật","e":"operation","s":"Nếu tôi không được phẫu thuật, tôi đã không hồi phục khỏi cơn đau.","se":"If I hadn't had the operation, I wouldn't have recovered from the pain.","pos":"","ety":"","ipa":"","z":"手術"},{"w":"điều trị","e":"treatment","s":"Nếu tôi có nhiều tiền hơn, tôi đã bắt đầu điều trị.","se":"If I had had more money, I would have started the treatment.","pos":"verb","ety":"Sino-Vietnamese word from 調治.","ipa":"[ʔɗiəw˨˩ t͡ɕi˧˨ʔ] (Hà-Nội); [ʔɗiw˦˩ ʈɪj˨˩ʔ] (Huế); [ʔɗiw˨˩ ʈɪj˨˩˨] (Hồ-Chí-Minh-City)","z":"治療"},{"w":"Sinh nhật","e":"Birthday","s":"Tôi chúc bạn một sinh nhật vui vẻ.","se":"I wish you a happy birthday.","pos":"","ety":"","ipa":"","z":"生日"},{"w":"tổ chức","e":"to celebrate","s":"Chúng ta sẽ tổ chức sinh nhật tôi tại căn hộ của tôi vào tối nay.","se":"We will celebrate my birthday at my apartment tonight.","pos":"verb","ety":"Sino-Vietnamese word from 組織. Compare Japanese 組織 (soshiki, “organization; anatomical tissue”).","ipa":"[to˧˩ t͡ɕɨk̚˧˦] (Hà-Nội); [tow˧˨ t͡ɕɨk̚˦˧˥] (Huế); [tow˨˩˦ cɨk̚˦˥] (Hồ-Chí-Minh-City)","z":"慶祝;舉辦"},{"w":"Tháng mười","e":"october","s":"Sinh nhật của tôi vào ngày 25 tháng mười năm 1972","se":"My birthday was on October twenty-fifth 1972.","pos":"","ety":"","ipa":"","z":"十月"},{"w":"lễ kỷ niệm","e":"anniversary","s":"Chúng tôi chúc bạn một lễ kỷ niệm vui vẻ.","se":"We wish you a happy anniversary.","pos":"","ety":"","ipa":"","z":"週年紀念"},{"w":"tân gia","e":"Housewarming","s":"Chúng tôi dự định tổ chức tiệc tân gia vào mùa hè này.","se":"We plan to have our housewarming celebration this summer.","pos":"noun","ety":"Sino-Vietnamese word from 新家 (“new house”).","ipa":"[tən˧˧ zaː˧˧] (Hà-Nội); [təŋ˧˧ jaː˧˧] (Huế); [təŋ˧˧ jaː˧˧] (Hồ-Chí-Minh-City)","z":"喬遷;新居落成"},{"w":"học bổng","e":"scholarship","s":"Anh ấy hy vọng anh ấy sẽ được nhận học bổng từ Nhật Bản.","se":"He hopes he will get a scholarship from Japan.","pos":"noun","ety":"học + bổng.","ipa":"[hawk͡p̚˧˨ʔ ʔɓəwŋ͡m˧˩] (Hà-Nội); [hawk͡p̚˨˩ʔ ʔɓəwŋ͡m˧˨] (Huế); [hawk͡p̚˨˩˨ ʔɓəwŋ͡m˨˩˦] (Hồ-Chí-Minh-City)","z":"獎學金"},{"w":"trượt","e":"to fail","s":"Tôi hy vọng chúng ta sẽ không trượt kỳ thi.","se":"I hope we do not fail the exam.","pos":"verb","ety":"From Proto-Vietic *b-laːt (“to slip”). Compare Central and Southern Vietnamese trợt. See also Proto-Tai *blaːtᴰ (“to slip and fall”) (whence Thai พลัด (plát)).","ipa":"[t͡ɕɨət̚˧˨ʔ] (Hà-Nội); [ʈɨək̚˨˩ʔ] (Huế); [ʈɨək̚˨˩˨] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"不及格;失敗"},{"w":"suôn sẻ","e":"smooth","s":"Tôi hy vọng buổi phỏng vấn của bạn sẽ suôn sẻ.","se":"I hope your interview goes smoothly.","pos":"adj","ety":"-e reduplication of suôn.","ipa":"[suən˧˧ sɛ˧˩] (Hà-Nội); [ʂuəŋ˧˧ ʂɛ˧˨] (Huế); [suəŋ˧˧ sɛ˧˨] (Huế); [ʂuəŋ˧˧ ʂɛ˨˩˦] (Hồ-Chí-Minh-City); [suəŋ˧˧ sɛ˨˩˦] (Hồ-Chí-Minh-City)","z":"順利"},{"w":"cải thiện","e":"to improve","s":"Tôi hy vọng tôi có thể sớm cải thiện các kỹ năng nói của mình.","se":"I hope I can improve my speaking skills soon.","pos":"verb","ety":"Sino-Vietnamese word from 改善.","ipa":"[kaːj˧˩ tʰiən˧˨ʔ] (Hà-Nội); [kaːj˧˨ tʰiəŋ˨˩ʔ] (Huế); [kaːj˨˩˦ tʰiəŋ˨˩˨] (Hồ-Chí-Minh-City)","z":"改善;進步"},{"w":"ước","e":"to wish","s":"","se":"","pos":"verb","ety":"Sino-Vietnamese w const state = {
  boxes: new Array(WORDS.length).fill(0),
  favs: new Set(),
  last: new Array(WORDS.length).fill(0),        // 每字最後作答時間 (ms)
  wrong: new Array(WORDS.length).fill(0),       // 累計錯誤次數
  wrongStreak: new Array(WORDS.length).fill(0), // 連錯次數,答對歸零
  days: {}                                      // 'YYYY-MM-DD' -> 當日作答數
};
const $ = id => document.getElementById(id);

/* ---------- persistence ---------- */
const STORE_KEY = 'viet989.v1';
function persist(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify({boxes:state.boxes, favs:[...state.favs], last:state.last, wrong:state.wrong, wrongStreak:state.wrongStreak, days:state.days})); }catch(e){}
}
function applyData(d){ // 接受新物件格式或舊版純 boxes 陣列
  if(!d || typeof d!=='object') return false;
  const arr = Array.isArray(d) ? d : d.boxes;
  if(!Array.isArray(arr) || arr.length!==WORDS.length) return false;
  state.boxes = arr.map(x=>Math.max(0,Math.min(5,+x||0)));
  if(!Array.isArray(d)){
    if(Array.isArray(d.favs)) state.favs = new Set(d.favs.filter(i=>Number.isInteger(i)&&i>=0&&i<WORDS.length));
    if(Array.isArray(d.last)&&d.last.length===WORDS.length) state.last = d.last.map(x=>+x||0);
    if(Array.isArray(d.wrong)&&d.wrong.length===WORDS.length) state.wrong = d.wrong.map(x=>Math.max(0,+x||0));
    if(Array.isArray(d.wrongStreak)&&d.wrongStreak.length===WORDS.length) state.wrongStreak = d.wrongStreak.map(x=>Math.max(0,+x||0));
    if(d.days && typeof d.days==='object' && !Array.isArray(d.days)) state.days = d.days;
  }
  return true;
}
function restore(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) applyData(JSON.parse(raw));
  }catch(e){}
}

/* ---------- SRS ---------- */
const DAY = 86400000;
const SRS_DAYS = [0,1,3,7,14,30]; // 未學隨時到期;盒1~4、已熟的複習間隔(天)
function todayKey(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function isDue(i){ return Date.now() - (state.last[i]||0) >= SRS_DAYS[state.boxes[i]||0]*DAY; }
function dueCount(){ let n=0; for(let i=0;i<WORDS.length;i++){ if(state.boxes[i]>0 && isDue(i)) n++; } return n; }
function streakCount(){
  let n=0; const d=new Date();
  if(!state.days[todayKey()]) d.setDate(d.getDate()-1); // 今天還沒練,從昨天往回數
  for(;;){
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(!state.days[k]) break;
    n++; d.setDate(d.getDate()-1);
  }
  return n;
}
function recordAnswer(i, correct){
  state.last[i] = Date.now();
  state.days[todayKey()] = (state.days[todayKey()]||0)+1;
  if(correct){ state.wrongStreak[i]=0; }
  else{
    state.wrong[i]++; state.wrongStreak[i]++;
    if(state.wrongStreak[i]>=2 && !state.favs.has(i)){
      state.favs.add(i);
      updateCardFav();
      toast('連錯 2 次,已自動收藏 ⭐');
    }
  }
  persist();
}
const toast = m => { const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); };

/* ---------- audio ---------- */
const player = new Audio();
player.preload = 'auto';
let audioUnlocked = false;
function audUrl(idx){
  return `audio/w/${String(idx).padStart(4,'0')}.mp3`;
}

function playAud(idx, isAuto){
  if(idx==null || idx<0) return;
  player.pause();
  player.src = audUrl(idx);
  player.currentTime = 0;
  const p = player.play();
  if(p) p.then(()=>{audioUnlocked=true;}).catch(err=>{
    if(isAuto) return;            // autoplay blocked before first tap: fail silently
    if(err && err.name === 'NotAllowedError'){ toast('播放失敗,再點一次試試'); }
    else { say(WORDS[idx].w); }   // missing/unreadable mp3 -> TTS fallback
  });
}

function playSent(idx){
  if(idx==null || idx<0 || !WORDS[idx].s) return;
  player.pause();
  player.src = `audio/sent/${String(idx).padStart(4,'0')}.mp3`;
  player.currentTime = 0;
  const p = player.play();
  if(p) p.then(()=>{audioUnlocked=true;}).catch(()=>say(WORDS[idx].s)); // 缺檔退回瀏覽器 TTS
}

// unlock audio on the very first touch/click anywhere (required by mobile browsers)
function unlockAudio(){
  if(audioUnlocked) return;
  player.muted = true;
  const p = player.play();
  if(p) p.then(()=>{ player.pause(); player.muted=false; audioUnlocked=true; }).catch(()=>{ player.muted=false; });
  document.removeEventListener('touchstart', unlockAudio);
  document.removeEventListener('click', unlockAudio);
}
document.addEventListener('touchstart', unlockAudio, {once:false});
document.addEventListener('click', unlockAudio, {once:false});

/* ---------- TTS for sentences ---------- */
let viVoice=null;
function pickVoices(){ const vs=speechSynthesis.getVoices(); viVoice=vs.find(v=>v.lang.startsWith('vi'))||null; }
if('speechSynthesis' in window){ pickVoices(); speechSynthesis.onvoiceschanged=pickVoices; }
function say(text){
  if(!('speechSynthesis' in window)) return toast('此瀏覽器不支援語音');
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='vi-VN'; if(viVoice)u.voice=viVoice; u.rate=.85;
  speechSynthesis.speak(u);
}

/* ---------- favorites ---------- */
function toggleFav(i){
  if(i==null || i<0) return;
  if(state.favs.has(i)) state.favs.delete(i); else state.favs.add(i);
  persist();
  updateCardFav();
  toast(state.favs.has(i)?'已加入收藏 ⭐':'已取消收藏');
}
function updateCardFav(){
  const on = cur>=0 && state.favs.has(cur);
  for(const id of ['favF','favB']){ const b=$(id); b.textContent = on?'★':'☆'; b.classList.toggle('on',on); }
}
$('favF').onclick=()=>toggleFav(cur);
$('favB').onclick=()=>toggleFav(cur);
