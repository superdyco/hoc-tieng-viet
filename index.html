<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>越語核心 989 — 背單字(中文+真人發音版)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F7F4EC; --ink:#21302A;
  --green:#1E4D3B; --green-deep:#143528;
  --lantern:#E8722A; --gold:#D9A441;
  --card:#FFFFFF; --line:#DCD6C6;
  --ok:#2E7D52; --no:#C04B2E;
  --radius:18px; --shadow:0 10px 30px rgba(30,77,59,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC','Be Vietnam Pro',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
.vi{font-family:'Be Vietnam Pro','Noto Sans TC',sans-serif}

header{background:var(--green);color:#F2EEDF;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
header h1{font-size:17px;font-weight:700;letter-spacing:.04em}
header h1 .vi{color:var(--gold);font-weight:900}
.stats{font-size:12px;opacity:.85}

nav{display:flex;gap:6px;background:var(--green-deep);padding:8px 12px;position:sticky;top:49px;z-index:10}
nav button{flex:1;border:none;border-radius:999px;padding:9px 0;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;background:transparent;color:#CFE0D2;transition:background .15s,color .15s}
nav button.active{background:var(--lantern);color:#fff;font-weight:700}

main{max-width:560px;margin:0 auto;padding:20px 16px 56px}

.boxes{display:flex;gap:8px;margin-bottom:18px}
.box{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 4px;text-align:center}
.box .n{font-size:18px;font-weight:700;color:var(--green)}
.box .l{font-size:10px;color:#8a8676}
.box.b5 .n{color:var(--gold)}
.box.b0 .n{color:#a8a392}

.cardwrap{perspective:1200px;margin-bottom:16px}
.flash{position:relative;width:100%;height:380px;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.2,.7,.3,1);cursor:pointer}
.flash.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;background:var(--card);border-radius:var(--radius);border:1px solid var(--line);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:8px}
.face.back{transform:rotateY(180deg);background:var(--green);color:#F2EEDF;border-color:var(--green);justify-content:flex-start;padding-top:42px;overflow-y:auto}
.face .word{font-size:42px;font-weight:900;text-align:center;line-height:1.15;word-break:break-word}
.face .pos{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:#EFEAD9;color:#8a7a4d;border-radius:6px;padding:3px 9px}
.face .hint{font-size:12px;color:#a8a392}
.face .tag{position:absolute;top:14px;left:16px;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--lantern);text-transform:uppercase}
.face.back .tag{color:#9CC0A8}
.meaning{font-size:32px;font-weight:900;color:var(--gold);text-align:center;line-height:1.2}
.meaning-en{font-size:15px;color:#BFD6C5;text-align:center;margin-top:2px}
.sent{margin-top:10px;background:rgba(255,255,255,.08);border-radius:12px;padding:12px 14px;width:100%;text-align:center}
.sent .sv{font-size:17px;font-weight:700;line-height:1.4}
.sent .sz{font-size:15px;color:#F2EEDF;margin-top:5px;font-weight:500}
.sent .se{font-size:12px;color:#BFD6C5;margin-top:3px}
.sent .ttsbtn{border:none;background:rgba(255,255,255,.15);color:#F2EEDF;border-radius:99px;font-size:12px;padding:4px 12px;margin-top:8px;cursor:pointer;font-family:inherit}
.meta{margin-top:10px;font-size:12px;color:#9CC0A8;text-align:center;line-height:1.5;width:100%}
.meta b{color:#D9C58F}
.audrow{position:absolute;top:8px;right:10px;display:flex;gap:4px}
.audrow button{border:none;background:#EFEAD9;color:var(--green);font-size:15px;font-weight:700;border-radius:99px;padding:10px 16px;cursor:pointer;font-family:inherit;min-width:44px;min-height:44px}
.face.back .audrow button{background:rgba(255,255,255,.15);color:#F2EEDF}
.audrow button:active{transform:scale(.93)}
.audrow button.favbtn,.face.back .audrow button.favbtn{background:none;font-size:17px;padding:4px 4px;color:#B9B29C}
.audrow button.favbtn.on,.face.back .audrow button.favbtn.on{color:var(--gold)}

.answers{display:flex;gap:10px}
.answers button{flex:1;border:none;border-radius:14px;padding:16px 0;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.15)}
.answers .yes{background:var(--ok)}
.answers .no{background:var(--no)}
.answers button:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.15)}
.flipnote{text-align:center;font-size:13px;color:#8a8676;margin-bottom:12px}

.progressbar{height:8px;background:#E8E2D2;border-radius:99px;overflow:hidden;margin-bottom:18px}
.progressbar i{display:block;height:100%;background:linear-gradient(90deg,var(--lantern),var(--gold));border-radius:99px;transition:width .3s}

.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.controls select,.controls button.small{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:8px 12px;font-size:13px;font-family:inherit;cursor:pointer;color:var(--ink)}
.controls button.small:hover{border-color:var(--green)}

.done{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:36px 20px;text-align:center;box-shadow:var(--shadow)}
.done .big{font-size:40px;margin-bottom:8px}
.done p{color:#6b675a;font-size:14px;margin-bottom:16px}
.done button{border:none;background:var(--lantern);color:#fff;border-radius:12px;padding:12px 28px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}

.quizq{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:30px 20px;text-align:center;margin-bottom:14px;position:relative}
.quizq .word{font-size:36px;font-weight:900}
.quizopts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quizopts button{border:1px solid var(--line);background:var(--card);border-radius:12px;padding:16px 10px;font-size:15px;font-family:inherit;cursor:pointer;font-weight:500;transition:border-color .15s}
.quizopts button:hover{border-color:var(--green)}
.quizopts button.right{background:var(--ok);color:#fff;border-color:var(--ok)}
.quizopts button.wrong{background:var(--no);color:#fff;border-color:var(--no)}
.quizscore{text-align:center;font-size:13px;color:#8a8676;margin:12px 0}

.search{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;margin-bottom:12px;background:var(--card)}
.search:focus{outline:2px solid var(--gold)}
.list{display:flex;flex-direction:column;gap:6px}
.row{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.row .v{font-weight:700;font-size:16px;flex:1;cursor:pointer}
.row .e{color:#6b675a;font-size:13px;flex:1.2;text-align:right}
.row .b{font-size:10px;background:#EFEAD9;border-radius:6px;padding:2px 6px;color:#8a8676;white-space:nowrap}
.row .sp{border:none;background:none;font-size:15px;cursor:pointer;color:var(--green)}
.row .fav{border:none;background:none;font-size:16px;cursor:pointer;color:#C9C2AE;padding:0}
.row .fav.on{color:var(--gold)}
.browsebar{display:flex;gap:8px;margin-bottom:12px}
.browsebar .search{flex:1;margin-bottom:0}
.favtoggle{border:1px solid var(--line);background:var(--card);border-radius:12px;padding:0 14px;font-size:18px;cursor:pointer;color:#C9C2AE}
.favtoggle.on{color:var(--gold);border-color:var(--gold)}
.browsebar select{border:1px solid var(--line);background:var(--card);border-radius:12px;padding:0 8px;font-size:13px;font-family:inherit;cursor:pointer;color:var(--ink)}
.row .wbadge{font-size:10px;color:var(--no);background:#F6E3DC;border-radius:6px;padding:2px 6px;white-space:nowrap}
.more{margin:14px auto;display:block;border:1px solid var(--line);background:var(--card);border-radius:10px;padding:10px 24px;font-family:inherit;cursor:pointer}
.catbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.catbar button{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:7px 14px;font-size:13px;font-family:inherit;cursor:pointer;color:var(--ink)}
.catbar button.active{background:var(--lantern);color:#fff;border-color:var(--lantern);font-weight:700}

.io{margin-top:20px;border-top:1px dashed var(--line);padding-top:14px}
.io summary{font-size:13px;color:#8a8676;cursor:pointer}
.io textarea{width:100%;height:70px;margin-top:8px;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:11px;font-family:monospace}
.io .iobtns{display:flex;gap:8px;margin-top:8px}
.io .iobtns button{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:7px 14px;font-size:12px;font-family:inherit;cursor:pointer}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:99px;padding:9px 20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.hide{display:none!important}
@media (prefers-reduced-motion:reduce){.flash{transition:none}}
</style>
</head>
<body>

<header>
  <h1>越語核心 <span class="vi">989</span>・真人發音</h1>
  <div class="stats" id="topstats"></div>
</header>

<nav>
  <button id="tab-study" class="active">學習</button>
  <button id="tab-quiz">測驗</button>
  <button id="tab-browse">瀏覽</button>
  <button id="tab-common">常用</button>
</nav>

<main>
  <section id="view-study">
    <div class="boxes" id="boxes"></div>
    <div class="controls">
      <select id="sessionSize">
        <option value="10">每輪 10 字</option>
        <option value="20" selected>每輪 20 字</option>
        <option value="50">每輪 50 字</option>
      </select>
      <select id="scope">
        <option value="all" selected>全部單字</option>
        <option value="fav">只學收藏 ⭐</option>
      </select>
      <button class="small" id="newSession">開始新一輪</button>
    </div>
    <div class="progressbar"><i id="prog" style="width:0%"></i></div>

    <div id="cardArea">
      <div class="cardwrap">
        <div class="flash" id="flash">
          <div class="face front">
            <span class="tag">TIẾNG VIỆT</span>
            <div class="audrow"><button class="favbtn" id="favF">☆</button><button id="audF">🔊 發音</button></div>
            <div class="word vi" id="frontWord"></div>
            <span class="pos" id="frontPos"></span>
            <div class="hint">點卡片翻面</div>
          </div>
          <div class="face back">
            <span class="tag" id="backTag"></span>
            <div class="audrow"><button class="favbtn" id="favB">☆</button><button id="audB">🔊 發音</button></div>
            <div class="meaning" id="backZh"></div>
              <div class="meaning-en" id="backMeaning"></div>
            <div class="sent" id="sentBlock">
              <div class="sv vi" id="sentVi"></div>
              <div class="sz" id="sentZh"></div>
              <div class="se" id="sentEn"></div>
              <button class="ttsbtn" id="sentTts">🔊 唸例句</button>
            </div>
            <div class="meta" id="metaBlock"></div>
          </div>
        </div>
      </div>
      <p class="flipnote">先想一下意思,再翻面對答案</p>
      <div class="answers">
        <button class="no" id="btnNo">😵 再學</button>
        <button class="yes" id="btnYes">✅ 記得</button>
      </div>
    </div>

    <div id="doneArea" class="done hide">
      <div class="big">🏮</div>
      <p id="doneText"></p>
      <button id="btnAgain">再來一輪</button>
    </div>

    <details class="io">
      <summary>💾 備份／還原進度(關閉頁面前記得備份)</summary>
      <textarea id="ioBox" placeholder="匯出後複製這段文字保存;要還原時貼回來按「還原」"></textarea>
      <div class="iobtns">
        <button id="btnExport">匯出進度</button>
        <button id="btnImport">還原進度</button>
      </div>
    </details>
  </section>

  <section id="view-quiz" class="hide">
    <div class="controls">
      <select id="quizMode">
        <option value="read" selected>看字選義</option>
        <option value="listen">聽音選義 🎧</option>
        <option value="reverse">看中文選越文</option>
      </select>
    </div>
    <div class="quizq">
      <div class="audrow" id="quizAud"><button id="audQ">🔊 重聽</button></div>
      <div class="word vi" id="quizWord"></div>
    </div>
    <div class="quizopts" id="quizOpts"></div>
    <div class="quizscore" id="quizScore"></div>
  </section>

  <section id="view-browse" class="hide">
    <div class="browsebar">
      <input class="search" id="searchBox" placeholder="搜尋越南語、英文、中文…">
      <select id="sortMode">
        <option value="default" selected>預設排序</option>
        <option value="wrong">最常錯優先</option>
      </select>
      <button class="favtoggle" id="favOnly" title="只看收藏">☆</button>
    </div>
    <div class="list" id="wordList"></div>
    <button class="more" id="btnMore">顯示更多</button>
  </section>

  <section id="view-common" class="hide">
    <div class="catbar" id="catBar"></div>
    <div class="list" id="catList"></div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script type="module">
const WORDS = await fetch('./data/words.json').then(r => r.ok ? r.json() : null).catch(() => null);
const CATS  = await fetch('./data/cats.json').then(r => r.ok ? r.json() : null).catch(() => null);
if (!WORDS || !CATS) {
  document.body.innerHTML = '<p style="padding:40px;text-align:center;font-family:sans-serif;line-height:1.7">無法載入單字資料。<br>請用網址（GitHub Pages）開啟，或啟動本機伺服器，<br>不要直接雙擊開啟本檔案。</p>';
  throw new Error('data load failed');
}

const state = {
  boxes: new Array(WORDS.length).fill(0),
  favs: new Set(),
  last: new Array(WORDS.length).fill(0),        // 每字最後作答時間 (ms)
  wrong: new Array(WORDS.length).fill(0),       // 累計錯誤次數
  wrongStreak: new Array(WORDS.length).fill(0), // 連錯次數,答對歸零
  days: {}                                      // 'YYYY-MM-DD' -> 當日作答數
};
const $ = id => document.getElementById(id);

/* ---------- persistence ---------- */
const STORE_KEY = 'viet989.v1';
function persist(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify({boxes:state.boxes, favs:[...state.favs], last:state.last, wrong:state.wrong, wrongStreak:state.wrongStreak, days:state.days})); }catch(e){}
}
function applyData(d){ // 接受新物件格式或舊版純 boxes 陣列
  if(!d || typeof d!=='object') return false;
  const arr = Array.isArray(d) ? d : d.boxes;
  if(!Array.isArray(arr) || arr.length!==WORDS.length) return false;
  state.boxes = arr.map(x=>Math.max(0,Math.min(5,+x||0)));
  if(!Array.isArray(d)){
    if(Array.isArray(d.favs)) state.favs = new Set(d.favs.filter(i=>Number.isInteger(i)&&i>=0&&i<WORDS.length));
    if(Array.isArray(d.last)&&d.last.length===WORDS.length) state.last = d.last.map(x=>+x||0);
    if(Array.isArray(d.wrong)&&d.wrong.length===WORDS.length) state.wrong = d.wrong.map(x=>Math.max(0,+x||0));
    if(Array.isArray(d.wrongStreak)&&d.wrongStreak.length===WORDS.length) state.wrongStreak = d.wrongStreak.map(x=>Math.max(0,+x||0));
    if(d.days && typeof d.days==='object' && !Array.isArray(d.days)) state.days = d.days;
  }
  return true;
}
function restore(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) applyData(JSON.parse(raw));
  }catch(e){}
}

/* ---------- SRS ---------- */
const DAY = 86400000;
const SRS_DAYS = [0,1,3,7,14,30]; // 未學隨時到期;盒1~4、已熟的複習間隔(天)
function todayKey(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function isDue(i){ return Date.now() - (state.last[i]||0) >= SRS_DAYS[state.boxes[i]||0]*DAY; }
function dueCount(){ let n=0; for(let i=0;i<WORDS.length;i++){ if(state.boxes[i]>0 && isDue(i)) n++; } return n; }
function streakCount(){
  let n=0; const d=new Date();
  if(!state.days[todayKey()]) d.setDate(d.getDate()-1); // 今天還沒練,從昨天往回數
  for(;;){
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(!state.days[k]) break;
    n++; d.setDate(d.getDate()-1);
  }
  return n;
}
function recordAnswer(i, correct){
  state.last[i] = Date.now();
  state.days[todayKey()] = (state.days[todayKey()]||0)+1;
  if(correct){ state.wrongStreak[i]=0; }
  else{
    state.wrong[i]++; state.wrongStreak[i]++;
    if(state.wrongStreak[i]>=2 && !state.favs.has(i)){
      state.favs.add(i);
      updateCardFav();
      toast('連錯 2 次,已自動收藏 ⭐');
    }
  }
  persist();
}
const toast = m => { const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); };

/* ---------- audio ---------- */
const player = new Audio();
player.preload = 'auto';
let audioUnlocked = false;
function audUrl(idx){
  return `audio/w/${String(idx).padStart(4,'0')}.mp3`;
}

function playAud(idx, isAuto){
  if(idx==null || idx<0) return;
  player.pause();
  player.src = audUrl(idx);
  player.currentTime = 0;
  const p = player.play();
  if(p) p.then(()=>{audioUnlocked=true;}).catch(err=>{
    if(isAuto) return;            // autoplay blocked before first tap: fail silently
    if(err && err.name === 'NotAllowedError'){ toast('播放失敗,再點一次試試'); }
    else { say(WORDS[idx].w); }   // missing/unreadable mp3 -> TTS fallback
  });
}

function playSent(idx){
  if(idx==null || idx<0 || !WORDS[idx].s) return;
  player.pause();
  player.src = `audio/sent/${String(idx).padStart(4,'0')}.mp3`;
  player.currentTime = 0;
  const p = player.play();
  if(p) p.then(()=>{audioUnlocked=true;}).catch(()=>say(WORDS[idx].s)); // 缺檔退回瀏覽器 TTS
}

// unlock audio on the very first touch/click anywhere (required by mobile browsers)
function unlockAudio(){
  if(audioUnlocked) return;
  player.muted = true;
  const p = player.play();
  if(p) p.then(()=>{ player.pause(); player.muted=false; audioUnlocked=true; }).catch(()=>{ player.muted=false; });
  document.removeEventListener('touchstart', unlockAudio);
  document.removeEventListener('click', unlockAudio);
}
document.addEventListener('touchstart', unlockAudio, {once:false});
document.addEventListener('click', unlockAudio, {once:false});

/* ---------- TTS for sentences ---------- */
let viVoice=null;
function pickVoices(){ const vs=speechSynthesis.getVoices(); viVoice=vs.find(v=>v.lang.startsWith('vi'))||null; }
if('speechSynthesis' in window){ pickVoices(); speechSynthesis.onvoiceschanged=pickVoices; }
function say(text){
  if(!('speechSynthesis' in window)) return toast('此瀏覽器不支援語音');
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='vi-VN'; if(viVoice)u.voice=viVoice; u.rate=.85;
  speechSynthesis.speak(u);
}

/* ---------- favorites ---------- */
function toggleFav(i){
  if(i==null || i<0) return;
  if(state.favs.has(i)) state.favs.delete(i); else state.favs.add(i);
  persist();
  updateCardFav();
  toast(state.favs.has(i)?'已加入收藏 ⭐':'已取消收藏');
}
function updateCardFav(){
  const on = cur>=0 && state.favs.has(cur);
  for(const id of ['favF','favB']){ const b=$(id); b.textContent = on?'★':'☆'; b.classList.toggle('on',on); }
}
$('favF').onclick=()=>toggleFav(cur);
$('favB').onclick=()=>toggleFav(cur);

/* ---------- tabs ---------- */
const tabs={study:'view-study',quiz:'view-quiz',browse:'view-browse',common:'view-common'};
function switchTab(k){
  Object.keys(tabs).forEach(j=>{
    $('tab-'+j).classList.toggle('active',j===k);
    $(tabs[j]).classList.toggle('hide',j!==k);
  });
  if(k==='quiz') nextQuiz();
  if(k==='browse') renderList();
  if(k==='common') renderCommon();
}
Object.keys(tabs).forEach(k=>{ $('tab-'+k).onclick=()=>switchTab(k); });

/* ---------- stats ---------- */
function renderBoxes(){
  const counts=[0,0,0,0,0,0];
  state.boxes.forEach(b=>counts[b]++);
  const labels=['未學','盒 1','盒 2','盒 3','盒 4','已熟'];
  $('boxes').innerHTML=counts.map((c,i)=>`<div class="box ${i===0?'b0':''}${i===5?'b5':''}"><div class="n">${c}</div><div class="l">${labels[i]}</div></div>`).join('');
  const st=streakCount();
  $('topstats').textContent=`已學 ${WORDS.length-counts[0]} / ${WORDS.length} · 待複習 ${dueCount()}`+(st>0?` · 🔥${st}`:'');
}

/* ---------- study ---------- */
let queue=[],cur=-1,flipped=false,sessionTotal=0;
function buildSession(){
  const n=+$('sessionSize').value;
  let idx=[...WORDS.keys()];
  if($('scope').value==='fav'){
    idx=idx.filter(i=>state.favs.has(i));
    if(idx.length===0){ toast('還沒有收藏的單字,先去點 ☆ 收藏吧'); return; }
  }
  idx.sort((a,b)=>{
    const da=isDue(a)?0:1, db=isDue(b)?0:1; // 到期的優先
    if(da!==db)return da-db;
    const ba=state.boxes[a],bb=state.boxes[b];
    if(ba===5&&bb!==5)return 1;
    if(bb===5&&ba!==5)return -1;
    if(ba!==bb)return ba-bb;
    return Math.random()-.5;
  });
  queue=idx.slice(0,n);
  for(let i=queue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[queue[i],queue[j]]=[queue[j],queue[i]];}
  sessionTotal=queue.length;
  $('doneArea').classList.add('hide');
  $('cardArea').classList.remove('hide');
  nextCard();
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function nextCard(){
  if(queue.length===0){
    $('cardArea').classList.add('hide');
    $('doneArea').classList.remove('hide');
    $('doneText').textContent=`這一輪 ${sessionTotal} 字完成!繼續加油 🇻🇳`;
    $('prog').style.width='100%';
    return;
  }
  cur=queue[0]; flipped=false;
  $('flash').classList.remove('flipped');
  updateCardFav();
  const w=WORDS[cur];
  setTimeout(()=>{
    $('frontWord').textContent=w.w;
    $('frontPos').textContent=w.pos||'';
    $('frontPos').style.display=w.pos?'':'none';
    $('backTag').textContent=w.w;
    $('backZh').textContent=w.z;
    $('backMeaning').textContent=w.e;
    if(w.s){ $('sentBlock').style.display=''; $('sentVi').textContent=w.s; $('sentZh').textContent=w.sz||''; $('sentEn').textContent=w.se; }
    else $('sentBlock').style.display='none';
    let meta='';
    if(w.ety) meta+=`<b>詞源</b> ${esc(w.ety)}<br>`;
    if(w.ipa) meta+=`<b>IPA</b> ${esc(w.ipa)}`;
    $('metaBlock').innerHTML=meta;
    $('boxHintDummy');
  }, flipped?220:0);
  $('prog').style.width=`${(1-queue.length/sessionTotal)*100}%`;
  // auto play (skipped silently if browser blocks it)
  setTimeout(()=>playAud(cur, true), 120);
}
$('flash').onclick=e=>{
  if(e.target.tagName==='BUTTON')return;
  flipped=!flipped;
  $('flash').classList.toggle('flipped',flipped);
};
$('audF').onclick=()=>playAud(cur);
$('audB').onclick=()=>playAud(cur);
$('sentTts').onclick=()=>playSent(cur);
$('btnYes').onclick=()=>{state.boxes[cur]=Math.min(5,(state.boxes[cur]||0)+1);recordAnswer(cur,true);queue.shift();renderBoxes();nextCard();};
$('btnNo').onclick=()=>{state.boxes[cur]=Math.max(1,state.boxes[cur]-1)||1;recordAnswer(cur,false);queue.shift();queue.splice(Math.min(3,queue.length),0,cur);renderBoxes();nextCard();};
$('newSession').onclick=buildSession;
$('btnAgain').onclick=buildSession;

/* ---------- quiz ---------- */
let qIdx=-1,qScore=0,qTotal=0,qLock=false;
function nextQuiz(){
  qLock=false;
  const mode=$('quizMode').value;
  const seen=[...WORDS.keys()].filter(i=>state.boxes[i]>0);
  const pool=seen.length>=8?seen:[...WORDS.keys()];
  qIdx=pool[Math.floor(Math.random()*pool.length)];
  const correct=qIdx;
  $('quizAud').classList.toggle('hide', mode==='reverse'); // 反向題作答前藏發音鈕防爆雷
  if(mode==='reverse'){
    $('quizWord').classList.remove('vi');
    $('quizWord').textContent=WORDS[qIdx].z;
  }else{
    $('quizWord').classList.add('vi');
    $('quizWord').textContent = mode==='listen' ? '🎧 ⋯' : WORDS[qIdx].w;
    setTimeout(()=>playAud(qIdx,true),120);
  }
  const opts=new Set([correct]);
  while(opts.size<4){opts.add(Math.floor(Math.random()*WORDS.length));}
  const arr=[...opts].sort(()=>Math.random()-.5);
  $('quizOpts').innerHTML=arr.map((o,i)=>{
    if(mode==='reverse') return `<button data-i="${i}" class="vi" style="font-weight:700">${esc(WORDS[o].w)}</button>`;
    return `<button data-i="${i}">${esc(WORDS[o].z)}<br><small style="opacity:.65;font-size:11px">${esc(WORDS[o].e)}</small></button>`;
  }).join('');
  [...$('quizOpts').children].forEach((b,i)=>{
    b.onclick=()=>{
      if(qLock)return;qLock=true;qTotal++;
      const right=arr[i]===correct;
      if(right){b.classList.add('right');qScore++;state.boxes[qIdx]=Math.min(5,(state.boxes[qIdx]||0)+1);}
      else{
        b.classList.add('wrong');
        [...$('quizOpts').children].forEach((x,j)=>{if(arr[j]===correct)x.classList.add('right');});
        state.boxes[qIdx]=Math.max(1,state.boxes[qIdx]-1)||1;
      }
      recordAnswer(qIdx,right);
      if(mode==='listen') $('quizWord').textContent=WORDS[qIdx].w; // 揭曉
      if(mode==='reverse'){ $('quizAud').classList.remove('hide'); playAud(qIdx,true); }
      renderBoxes();
      $('quizScore').textContent=`答對 ${qScore} / ${qTotal}`;
      setTimeout(nextQuiz,right?700:1400);
    };
  });
  $('quizScore').textContent=qTotal?`答對 ${qScore} / ${qTotal}`:'選出正確答案';
}
$('quizMode').onchange=()=>nextQuiz();
$('audQ').onclick=()=>playAud(qIdx);

/* ---------- browse ---------- */
let shown=50, favOnlyOn=false;
function studyWord(i){
  queue=[i,...queue.filter(x=>x!==i)];
  sessionTotal=Math.max(sessionTotal,queue.length);
  $('doneArea').classList.add('hide');
  $('cardArea').classList.remove('hide');
  switchTab('study');
  nextCard();
}
function renderList(){
  const q=$('searchBox').value.trim().toLowerCase();
  const labels=['—','盒1','盒2','盒3','盒4','已熟'];
  const filtered=[...WORDS.keys()].filter(i=>{
    if(favOnlyOn && !state.favs.has(i))return false;
    if(!q)return true;
    const w=WORDS[i];
    return w.w.toLowerCase().includes(q)||w.e.toLowerCase().includes(q)||w.z.includes(q)||(w.ety&&w.ety.includes(q));
  });
  if($('sortMode').value==='wrong') filtered.sort((a,b)=>(state.wrong[b]||0)-(state.wrong[a]||0));
  $('wordList').innerHTML=filtered.slice(0,shown).map(i=>{
    const w=WORDS[i];
    const fav=state.favs.has(i);
    const wb=state.wrong[i]?`<span class="wbadge">✗${state.wrong[i]}</span>`:'';
    return `<div class="row"><button class="sp" data-i="${i}">🔊</button><span class="v vi" data-i="${i}" title="點擊到卡片學習">${esc(w.w)}</span><span class="e">${esc(w.z)}</span>${wb}<button class="fav ${fav?'on':''}" data-i="${i}">${fav?'★':'☆'}</button><span class="b">${labels[state.boxes[i]]}</span></div>`;
  }).join('');
  $('btnMore').classList.toggle('hide',filtered.length<=shown);
  [...document.querySelectorAll('#wordList .sp')].forEach(b=>b.onclick=()=>playAud(+b.dataset.i));
  [...document.querySelectorAll('#wordList .fav')].forEach(b=>b.onclick=()=>{toggleFav(+b.dataset.i);renderList();});
  [...document.querySelectorAll('#wordList .v')].forEach(s=>s.onclick=()=>studyWord(+s.dataset.i));
}
$('searchBox').oninput=()=>{shown=50;renderList();};
$('sortMode').onchange=()=>{shown=50;renderList();};
$('btnMore').onclick=()=>{shown+=50;renderList();};
$('favOnly').onclick=()=>{
  favOnlyOn=!favOnlyOn;
  $('favOnly').textContent=favOnlyOn?'★':'☆';
  $('favOnly').classList.toggle('on',favOnlyOn);
  shown=50;renderList();
};

/* ---------- common categories ---------- */
let curCat=CATS[0].id;
function playCommon(catId, i){
  const cat=CATS.find(c=>c.id===catId);
  if(!cat || !cat.items[i]) return;
  player.pause();
  player.src=`audio/c/${catId}_${String(i).padStart(3,'0')}.mp3`;
  player.currentTime=0;
  const p=player.play();
  if(p) p.then(()=>{audioUnlocked=true;}).catch(()=>say(cat.items[i].w)); // 缺檔退回瀏覽器 TTS
}
function renderCommon(){
  $('catBar').innerHTML=CATS.map(c=>`<button data-c="${c.id}" class="${c.id===curCat?'active':''}">${c.name}</button>`).join('');
  [...$('catBar').children].forEach(b=>b.onclick=()=>{curCat=b.dataset.c;renderCommon();});
  const cat=CATS.find(c=>c.id===curCat);
  $('catList').innerHTML=cat.items.map((it,i)=>`<div class="row"><button class="sp" data-i="${i}">🔊</button><span class="v vi">${esc(it.w)}</span><span class="e">${esc(it.z)}</span></div>`).join('');
  [...document.querySelectorAll('#catList .sp')].forEach(b=>b.onclick=()=>playCommon(curCat,+b.dataset.i));
}

/* ---------- keyboard shortcuts ---------- */
document.addEventListener('keydown',e=>{
  const t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA'||t==='SELECT')return;
  if(!$('view-study').classList.contains('hide') && !$('cardArea').classList.contains('hide')){
    if(e.code==='Space'){e.preventDefault();$('flash').click();}
    else if(e.key==='ArrowRight'){$('btnYes').click();}
    else if(e.key==='ArrowLeft'){$('btnNo').click();}
    else if(e.key==='f'||e.key==='F'){toggleFav(cur);}
  } else if(!$('view-quiz').classList.contains('hide')){
    if(['1','2','3','4'].includes(e.key)){const b=$('quizOpts').children[+e.key-1];if(b)b.click();}
  }
});

/* ---------- io ---------- */
$('btnExport').onclick=()=>{
  $('ioBox').value=JSON.stringify({boxes:state.boxes,favs:[...state.favs],last:state.last,wrong:state.wrong,wrongStreak:state.wrongStreak,days:state.days});
  $('ioBox').select();
  try{document.execCommand('copy');toast('已複製到剪貼簿');}catch(e){toast('請手動複製文字');}
};
$('btnImport').onclick=()=>{
  try{
    const d=JSON.parse($('ioBox').value);
    if(applyData(d)){persist();renderBoxes();buildSession();toast('進度已還原');}
    else toast('格式不符(長度需為 '+WORDS.length+')');
  }catch(e){toast('無法解析,請確認貼上的內容');}
};

restore();
renderBoxes();
buildSession();
</script>
