<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>越語核心 989 — 背單字(中文+真人發音版)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F7F4EC; --ink:#21302A;
  --green:#1E4D3B; --green-deep:#143528;
  --lantern:#E8722A; --gold:#D9A441;
  --card:#FFFFFF; --line:#DCD6C6;
  --ok:#2E7D52; --no:#C04B2E;
  --radius:18px; --shadow:0 10px 30px rgba(30,77,59,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC','Be Vietnam Pro',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
.vi{font-family:'Be Vietnam Pro','Noto Sans TC',sans-serif}

header{background:var(--green);color:#F2EEDF;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
header h1{font-size:17px;font-weight:700;letter-spacing:.04em}
header h1 .vi{color:var(--gold);font-weight:900}
.stats{font-size:12px;opacity:.85}

nav{display:flex;gap:6px;background:var(--green-deep);padding:8px 12px;position:sticky;top:49px;z-index:10}
nav button{flex:1;border:none;border-radius:999px;padding:9px 0;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;background:transparent;color:#CFE0D2;transition:background .15s,color .15s}
nav button.active{background:var(--lantern);color:#fff;font-weight:700}

main{max-width:560px;margin:0 auto;padding:20px 16px 56px}

.boxes{display:flex;gap:8px;margin-bottom:18px}
.box{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 4px;text-align:center}
.box .n{font-size:18px;font-weight:700;color:var(--green)}
.box .l{font-size:10px;color:#8a8676}
.box.b5 .n{color:var(--gold)}
.box.b0 .n{color:#a8a392}

.cardwrap{perspective:1200px;margin-bottom:16px}
.flash{position:relative;width:100%;height:380px;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.2,.7,.3,1);cursor:pointer}
.flash.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;background:var(--card);border-radius:var(--radius);border:1px solid var(--line);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:8px}
.face.back{transform:rotateY(180deg);background:var(--green);color:#F2EEDF;border-color:var(--green);justify-content:flex-start;padding-top:42px;overflow-y:auto}
.face .word{font-size:42px;font-weight:900;text-align:center;line-height:1.15;word-break:break-word}
.face .pos{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:#EFEAD9;color:#8a7a4d;border-radius:6px;padding:3px 9px}
.face .hint{font-size:12px;color:#a8a392}
.face .tag{position:absolute;top:14px;left:16px;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--lantern);text-transform:uppercase}
.face.back .tag{color:#9CC0A8}
.meaning{font-size:32px;font-weight:900;color:var(--gold);text-align:center;line-height:1.2}
.meaning-en{font-size:15px;color:#BFD6C5;text-align:center;margin-top:2px}
.sent{margin-top:10px;background:rgba(255,255,255,.08);border-radius:12px;padding:12px 14px;width:100%;text-align:center}
.sent .sv{font-size:17px;font-weight:700;line-height:1.4}
.sent .se{font-size:13px;color:#BFD6C5;margin-top:4px}
.sent .ttsbtn{border:none;background:rgba(255,255,255,.15);color:#F2EEDF;border-radius:99px;font-size:12px;padding:4px 12px;margin-top:8px;cursor:pointer;font-family:inherit}
.meta{margin-top:10px;font-size:12px;color:#9CC0A8;text-align:center;line-height:1.5;width:100%}
.meta b{color:#D9C58F}
.audrow{position:absolute;top:8px;right:10px;display:flex;gap:4px}
.audrow button{border:none;background:#EFEAD9;color:var(--green);font-size:12px;font-weight:700;border-radius:99px;padding:6px 10px;cursor:pointer;font-family:inherit}
.face.back .audrow button{background:rgba(255,255,255,.15);color:#F2EEDF}
.audrow button:active{transform:scale(.93)}
.audrow button.favbtn,.face.back .audrow button.favbtn{background:none;font-size:17px;padding:4px 4px;color:#B9B29C}
.audrow button.favbtn.on,.face.back .audrow button.favbtn.on{color:var(--gold)}

.answers{display:flex;gap:10px}
.answers button{flex:1;border:none;border-radius:14px;padding:16px 0;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.15)}
.answers .yes{background:var(--ok)}
.answers .no{background:var(--no)}
.answers button:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.15)}
.flipnote{text-align:center;font-size:13px;color:#8a8676;margin-bottom:12px}

.progressbar{height:8px;background:#E8E2D2;border-radius:99px;overflow:hidden;margin-bottom:18px}
.progressbar i{display:block;height:100%;background:linear-gradient(90deg,var(--lantern),var(--gold));border-radius:99px;transition:width .3s}

.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.controls select,.controls button.small{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:8px 12px;font-size:13px;font-family:inherit;cursor:pointer;color:var(--ink)}
.controls button.small:hover{border-color:var(--green)}

.done{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:36px 20px;text-align:center;box-shadow:var(--shadow)}
.done .big{font-size:40px;margin-bottom:8px}
.done p{color:#6b675a;font-size:14px;margin-bottom:16px}
.done button{border:none;background:var(--lantern);color:#fff;border-radius:12px;padding:12px 28px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}

.quizq{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:30px 20px;text-align:center;margin-bottom:14px;position:relative}
.quizq .word{font-size:36px;font-weight:900}
.quizopts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quizopts button{border:1px solid var(--line);background:var(--card);border-radius:12px;padding:16px 10px;font-size:15px;font-family:inherit;cursor:pointer;font-weight:500;transition:border-color .15s}
.quizopts button:hover{border-color:var(--green)}
.quizopts button.right{background:var(--ok);color:#fff;border-color:var(--ok)}
.quizopts button.wrong{background:var(--no);color:#fff;border-color:var(--no)}
.quizscore{text-align:center;font-size:13px;color:#8a8676;margin:12px 0}

.search{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;margin-bottom:12px;background:var(--card)}
.search:focus{outline:2px solid var(--gold)}
.list{display:flex;flex-direction:column;gap:6px}
.row{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.row .v{font-weight:700;font-size:16px;flex:1;cursor:pointer}
.row .e{color:#6b675a;font-size:13px;flex:1.2;text-align:right}
.row .b{font-size:10px;background:#EFEAD9;border-radius:6px;padding:2px 6px;color:#8a8676;white-space:nowrap}
.row .sp{border:none;background:none;font-size:15px;cursor:pointer;color:var(--green)}
.row .fav{border:none;background:none;font-size:16px;cursor:pointer;color:#C9C2AE;padding:0}
.row .fav.on{color:var(--gold)}
.browsebar{display:flex;gap:8px;margin-bottom:12px}
.browsebar .search{flex:1;margin-bottom:0}
.favtoggle{border:1px solid var(--line);background:var(--card);border-radius:12px;padding:0 14px;font-size:18px;cursor:pointer;color:#C9C2AE}
.favtoggle.on{color:var(--gold);border-color:var(--gold)}
.browsebar select{border:1px solid var(--line);background:var(--card);border-radius:12px;padding:0 8px;font-size:13px;font-family:inherit;cursor:pointer;color:var(--ink)}
.row .wbadge{font-size:10px;color:var(--no);background:#F6E3DC;border-radius:6px;padding:2px 6px;white-space:nowrap}
.more{margin:14px auto;display:block;border:1px solid var(--line);background:var(--card);border-radius:10px;padding:10px 24px;font-family:inherit;cursor:pointer}
.catbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.catbar button{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:7px 14px;font-size:13px;font-family:inherit;cursor:pointer;color:var(--ink)}
.catbar button.active{background:var(--lantern);color:#fff;border-color:var(--lantern);font-weight:700}

.io{margin-top:20px;border-top:1px dashed var(--line);padding-top:14px}
.io summary{font-size:13px;color:#8a8676;cursor:pointer}
.io textarea{width:100%;height:70px;margin-top:8px;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:11px;font-family:monospace}
.io .iobtns{display:flex;gap:8px;margin-top:8px}
.io .iobtns button{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:7px 14px;font-size:12px;font-family:inherit;cursor:pointer}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:99px;padding:9px 20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.hide{display:none!important}
@media (prefers-reduced-motion:reduce){.flash{transition:none}}
</style>
</head>
<body>

<header>
  <h1>越語核心 <span class="vi">989</span>・真人發音</h1>
  <div class="stats" id="topstats"></div>
</header>

<nav>
  <button id="tab-study" class="active">學習</button>
  <button id="tab-quiz">測驗</button>
  <button id="tab-browse">瀏覽</button>
  <button id="tab-common">常用</button>
</nav>

<main>
  <section id="view-study">
    <div class="boxes" id="boxes"></div>
    <div class="controls">
      <select id="sessionSize">
        <option value="10">每輪 10 字</option>
        <option value="20" selected>每輪 20 字</option>
        <option value="50">每輪 50 字</option>
      </select>
      <select id="scope">
        <option value="all" selected>全部單字</option>
        <option value="fav">只學收藏 ⭐</option>
      </select>
      <button class="small" id="newSession">開始新一輪</button>
    </div>
    <div class="progressbar"><i id="prog" style="width:0%"></i></div>

    <div id="cardArea">
      <div class="cardwrap">
        <div class="flash" id="flash">
          <div class="face front">
            <span class="tag">TIẾNG VIỆT</span>
            <div class="audrow"><button class="favbtn" id="favF">☆</button><button id="audF">🔊 發音</button></div>
            <div class="word vi" id="frontWord"></div>
            <span class="pos" id="frontPos"></span>
            <div class="hint">點卡片翻面</div>
          </div>
          <div class="face back">
            <span class="tag" id="backTag"></span>
            <div class="audrow"><button class="favbtn" id="favB">☆</button><button id="audB">🔊 發音</button></div>
            <div class="meaning" id="backZh"></div>
              <div class="meaning-en" id="backMeaning"></div>
            <div class="sent" id="sentBlock">
              <div class="sv vi" id="sentVi"></div>
              <div class="se" id="sentEn"></div>
              <button class="ttsbtn" id="sentTts">🔊 唸例句</button>
            </div>
            <div class="meta" id="metaBlock"></div>
          </div>
        </div>
      </div>
      <p class="flipnote">先想一下意思,再翻面對答案</p>
      <div class="answers">
        <button class="no" id="btnNo">😵 再學</button>
        <button class="yes" id="btnYes">✅ 記得</button>
      </div>
    </div>

    <div id="doneArea" class="done hide">
      <div class="big">🏮</div>
      <p id="doneText"></p>
      <button id="btnAgain">再來一輪</button>
    </div>

    <details class="io">
      <summary>💾 備份／還原進度(關閉頁面前記得備份)</summary>
      <textarea id="ioBox" placeholder="匯出後複製這段文字保存;要還原時貼回來按「還原」"></textarea>
      <div class="iobtns">
        <button id="btnExport">匯出進度</button>
        <button id="btnImport">還原進度</button>
      </div>
    </details>
  </section>

  <section id="view-quiz" class="hide">
    <div class="controls">
      <select id="quizMode">
        <option value="read" selected>看字選義</option>
        <option value="listen">聽音選義 🎧</option>
        <option value="reverse">看中文選越文</option>
      </select>
    </div>
    <div class="quizq">
      <div class="audrow" id="quizAud"><button id="audQ">🔊 重聽</button></div>
      <div class="word vi" id="quizWord"></div>
    </div>
    <div class="quizopts" id="quizOpts"></div>
    <div class="quizscore" id="quizScore"></div>
  </section>

  <section id="view-browse" class="hide">
    <div class="browsebar">
      <input class="search" id="searchBox" placeholder="搜尋越南語、英文、中文…">
      <select id="sortMode">
        <option value="default" selected>預設排序</option>
        <option value="wrong">最常錯優先</option>
      </select>
      <button class="favtoggle" id="favOnly" title="只看收藏">☆</button>
    </div>
    <div class="list" id="wordList"></div>
    <button class="more" id="btnMore">顯示更多</button>
  </section>

  <section id="view-common" class="hide">
    <div class="catbar" id="catBar"></div>
    <div class="list" id="catList"></div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>

etnamese word from 中國, composed of 中 (“center”) and 國 (“country”). Doublet of Tung Của.","ipa":"[t͡ɕʊwŋ͡m˧˧ kuək̚˧˦] (Hà-Nội); [ʈʊwŋ͡m˧˧ kuək̚˦˧˥] (Huế); [ʈʊwŋ͡m˧˧ wək̚˦˥] (Hồ-Chí-Minh-City)","z":"中國"},{"w":"Nhật Bản","e":"Japan","s":"Anh ấy đến từ Nhật Bản.","se":"He is from Japan.","pos":"name","ety":"Sino-Vietnamese word from 日本 (“base of the sun”), from Japanese 日本 (Nippon, Nihon).","ipa":"[ɲət̚˧˨ʔ ʔɓaːn˧˩] (Hà-Nội); [ɲək̚˨˩ʔ ʔɓaːŋ˧˨] (Huế); [ɲək̚˨˩˨ ʔɓaːŋ˨˩˦] (Hồ-Chí-Minh-City)","z":"日本"},{"w":"Tiếng Anh","e":"English","s":"Tôi nói tiếng Anh.","se":"I speak English.","pos":"","ety":"","ipa":"","z":"英語"},{"w":"Tiếng Đức","e":"German","s":"Bạn nói tiếng Đức.","se":"You speak German.","pos":"","ety":"","ipa":"","z":"德語"},{"w":"Tiếng Trung Quốc","e":"Chinese","s":"Anh ấy nói tiếng Trung Quốc.","se":"He speaks Chinese.","pos":"","ety":"","ipa":"","z":"中文"},{"w":"Tiếng Nhật","e":"Japanese","s":"Cô ấy nói Tiếng Nhật.","se":"She speaks Japanese.","pos":"","ety":"","ipa":"","z":"日語"},{"w":"ngủ","e":"to sleep","s":"Anh ấy ngủ.","se":"He sleeps.","pos":"verb","ety":"Borrowed from Kra-Dai, compare Baha ŋu¹¹ (“to sleep”) and Proto-Hlai *hŋuːɦ (“to sleep, to lie down”) (whence ŋow²~kaw²~kʰoː²~kɔː² across modern lects and Jiamao ŋɔ⁴). Some of the conservative Vietic languages (namely, Thavung) use the cognates of the Vietnamese word nằm (“to lie”) with semantic extension to \"to sleep\", along with \"to lie\".","ipa":"[ŋu˧˩] (Hà-Nội); [ŋʊw˧˨] (Huế); [ŋʊw˨˩˦] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"睡覺"},{"w":"mua sắm","e":"to shop","s":"Tôi đi mua sắm.","se":"I go shopping.","pos":"verb","ety":"mua + sắm.","ipa":"[muə˧˧ sam˧˦] (Hà-Nội); [muə˧˧ ʂam˦˧˥] (Huế); [muə˧˧ sam˦˧˥] (Huế); [muə˧˧ ʂam˦˥] (Hồ-Chí-Minh-City); [muə˧˧ sam˦˥] (Hồ-Chí-Minh-City)","z":"購物"},{"w":"xem phim","e":"to watch a movie","s":"Bạn xem phim.","se":"You watch a movie.","pos":"","ety":"","ipa":"","z":"看電影"},{"w":"nói","e":"to say;to tell","s":"Bạn nói. Mặc dù anh ấy bảo cô ấy đừng tới, nhưng cô ấy vẫn tới nhà anh ấy.","se":"You say. Although he told her not to come, she still came to his home.","pos":"verb","ety":"","ipa":"[nɔj˧˦] (Hà-Nội); [nɔj˨˩˦] (Huế); [nɔj˦˥] (Hồ-Chí-Minh-City); ()","z":"說;告訴"},{"w":"chạy","e":"to run","s":"Cô ấy chạy.","se":"She runs.","pos":"verb","ety":"From Proto-Vietic *ɟalʔ, from Proto-Mon-Khmer *ɟarʔ (“quick, to run”). Cognate with Koho jar (“quick, hurry”) and Semai jar (“to run”).","ipa":"[t͡ɕaj˧˨ʔ] (Hà-Nội); [t͡ɕaj˨˩ʔ] (Huế); [ca(ː)j˨˩˨] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"跑"},{"w":"quyển sách","e":"book","s":"Một quyển sách tiếng Trung Quốc","se":"A Chinese book","pos":"","ety":"","ipa":"","z":"書"},{"w":"đồ ăn","e":"food","s":"đồ ăn Nhật Bản","se":"Japanese food","pos":"noun","ety":"đồ + ăn.","ipa":"[ʔɗo˨˩ ʔan˧˧] (Hà-Nội); [ʔɗow˦˩ ʔaŋ˧˧] (Huế); [ʔɗow˨˩ ʔaŋ˧˧] (Hồ-Chí-Minh-City)","z":"食物"},{"w":"cà phê","e":"coffee","s":"Cà phê nóng","se":"Hot coffee","pos":"noun","ety":"Adapted from an earlier form trà phê (“coffee”) (Martini, 1958; Michaud et al., 2015), as attested in scholar Pétrus Ky's Cours d'annamite parlé [A course in spoken Annamese] (1894). This is a phono-semantic matching of French café (“coffee”), matching the first syllable with the existing Sino-Vietnamese word trà (“tea”); literally, this name could be interpreted as: “a kind of tea with the phê attribute” (whatever that attribute may mean). Naming coffee as a type of tea acclimatises the new beverage, introducing it into a set that already included trà tàu (“Chinese tea (black tea)”), trà Huế (“Annamese tea (green tea)”), trà hoa (“camellia tea”), trà rừng (“three-seeded mercury (herbal) tea”), and so on (Martini, 1958; Michaud et al., 2015). An example is found in Cours d'annamite parlé: : anh uống trà-phe hay-là trà-tàu Do you drink coffee [the phe tea] or tea [the Chinese tea]? Later on, the form trà phê underwent re-foreignisation, influenced by French-speaking Vietnamese who pronounce French café as ‹ca phê› (Michaud et al., 2015). A hybrid form of cà phê emerged as a consequence, retaining the original /k/ in the donor language and the tone of trà, and this form eventually became the standard (Nguyễn, 1999). An alternative theory for the unexpected tone on cà was put forth by Emeneau (1951: 4, 158), who tentatively proposed that it was due to association with cà (“eggplant”), in a fashion similar to cà rốt (“carrot”). However, this is now deemed to be very unlikely. Compare phê (“high; intoxicated”), as well as Cantonese 咖啡 (gaa3 fe1, also with a lower tone on the first syllable).","ipa":"[kaː˨˩ fe˧˧] (Hà-Nội); [kaː˦˩ fej˧˧] (Huế); [kaː˨˩ fej˧˧] (Hồ-Chí-Minh-City)","z":"咖啡"},{"w":"tờ báo","e":"newspaper","s":"Một tờ báo tiếng Anh","se":"An English newspaper","pos":"","ety":"","ipa":"","z":"報紙"},{"w":"có","e":"to have","s":"Tôi có một quyển sách tiếng Nhật.","se":"I have a Japanese book.","pos":"verb","ety":"From Proto-Vietic *kɔːʔ (“to have”). Cognate with Muong cỏ.","ipa":"[kɔ˧˦] (Hà-Nội); [kɔ˨˩˦] (Huế); [kɔ˦˥] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"有"},{"w":"học","e":"to learn","s":"Tôi học tiếng Đức.","se":"I learn German.","pos":"verb","ety":"Sino-Vietnamese word from 學.","ipa":"[hawk͡p̚˧˨ʔ] (Hà-Nội); [hawk͡p̚˨˩ʔ] (Huế); [hawk͡p̚˨˩˨] (Hồ-Chí-Minh-City); [hɔk̚˧ˀ˨ʔ] (Hà-Tĩnh); (Hà-Nội); (Hồ-Chí-Minh-City)","z":"學習"},{"w":"ăn","e":"to eat","s":"Tôi ăn đồ ăn Nhật Bản.","se":"I eat Japanese food.","pos":"verb","ety":"From Proto-Vietic *ʔan.","ipa":"[ʔan˧˧] (Hà-Nội); [ʔaŋ˧˧] (Huế); [ʔaŋ˧˧] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"吃"},{"w":"đọc","e":"to read","s":"Anh ấy đọc một quyển sách tiếng Trung Quốc. Cô ấy hiện đang đọc một quyển tạp chí.","se":"He reads a Chinese book. She is reading a magazine at the moment.","pos":"verb","ety":"Non-Sino-Vietnamese reading of Chinese 讀 (“to read”, SV: độc). Doublet of độc.","ipa":"[ʔɗawk͡p̚˧˨ʔ] (Hà-Nội); [ʔɗawk͡p̚˨˩ʔ] (Huế); [ʔɗawk͡p̚˨˩˨] (Hồ-Chí-Minh-City)","z":"讀;閱讀"},{"w":"uống","e":"to drink","s":"Cô ấy uống cà phê nóng.","se":"She drinks hot coffee.","pos":"verb","ety":"From Proto-Vietic *ʔɔːŋʔ. Cognate with Muong ỏng.","ipa":"[ʔuəŋ˧˦] (Hà-Nội); [ʔuəŋ˦˧˥] (Huế); [ʔuəŋ˦˥] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"喝"},{"w":"mua","e":"to buy","s":"Bạn mua một tờ báo tiếng Anh.","se":"You buy an English newspaper.","pos":"verb","ety":"Non-Sino-Vietnamese reading of Chinese 務 (“to seek”, SV: vụ) (Haudricourt, 1954); cognate with Muong mua. The common Vietic word for “to buy” is chác (from Proto-Vietic *caːk), now obsolete and mainly used in compounds. See also tậu, a Tai loanword, and sắm, which has originally meaning of \"to prepare\".","ipa":"[muə˧˧] (Hà-Nội); [muə˧˧] (Huế); [muə˧˧] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"買"},{"w":"cơm","e":"rice","s":"Tôi ăn cơm.","se":"I eat rice.","pos":"noun","ety":"From Proto-Vietic *kəːm (“cooked rice”); cognate with Arem kʌːm. According to Ferlus, a loan from Chinese 泔 (OC *kaːm, “water from washing rice; kitchen slops”) (SV: cam), although the vowels are difficult to match. Semantically, compare Thai ข้าว (kâao, “rice; meal”), Khmer បាយ (baay, “rice; meal”), Chinese 飯／饭 (fàn, “rice; meal”), Korean 밥 (bap, “rice; meal”), Japanese ご飯 (gohan, “rice; meal”).","ipa":"[kəːm˧˧] (Hà-Nội); [kəːm˧˧] (Huế); [kəːm˧˧] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"飯;米飯"},{"w":"súp","e":"soup","s":"Cậu bé ăn súp.","se":"The boy eats soup.","pos":"noun","ety":"A now common corruption of xúp that arose either by the fact that northern Vietnamese dialects have an x-s merger, or that people from southern Vietnam have certain degrees of hyperforeignism when attempting to imitate the spelling of the source word, the French soupe. Hyperforeignism is not unusual in Vietnam, especially in the South where English spellings have been increasingly adopted over transcriptions.","ipa":"","z":"湯"},{"w":"bánh mì","e":"bread","s":"Tôi mua bánh mì.","se":"I buy bread.","pos":"noun","ety":"From bánh (“pastry, cake, bread, dumpling, noodle, wafer, or pudding”) + mì (“wheat”). A folk etymology claims that bánh mì is a corruption of French pain de mie; however, this is obviously false, see the entry for bánh. An 1898 dictionary defines Vietnamese miche as bánh tây, a now-dated term for Western-style bread.","ipa":"[ʔɓajŋ̟˧˦ mi˨˩] (Hà-Nội); [ʔɓɛɲ˦˧˥ mɪj˦˩] (Huế); [ʔɓan˦˥ mɪj˨˩] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"麵包"},{"w":"tạp chí","e":"a magazine","s":"Người phụ nữ đọc một quyển tạp chí.","se":"The woman reads a magazine.","pos":"noun","ety":"Sino-Vietnamese word from 雜誌, composed of 雜 (“mixed; miscellaneous”) and 誌 (“record”), from Japanese 雑誌 (zasshi).","ipa":"[taːp̚˧˨ʔ t͡ɕi˧˦] (Hà-Nội); [taːp̚˨˩ʔ t͡ɕɪj˨˩˦] (Huế); [taːp̚˨˩˨ cɪj˦˥] (Hồ-Chí-Minh-City)","z":"雜誌"},{"w":"nước","e":"water","s":"Anh ấy uống nước.","se":"He drinks water.","pos":"noun","ety":"From Middle Vietnamese nước, from Proto-Vietic *ɗaːk (“water”), from Proto-Mon-Khmer *ɗaak (“water”). Cognates with Nghệ An/Hà Tĩnh dialects nác, Muong đác, Khmer ទឹក (tik), Bahnar đak, Eastern Mnong dak, Central Nicobarese râk/dâk and Santali ᱫᱟᱜ (dak’).","ipa":"[nɨək̚˧˦] (Hà-Nội); [nɨək̚˦˧˥] (Huế); [nɨək̚˦˥] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"水"},{"w":"có giá","e":"to cost","s":"","se":"","pos":"","ety":"","ipa":"","z":"價值;要價"},{"w":"một","e":"one","s":"Bánh mì có giá một đô la.","se":"The bread costs one dollar.","pos":"num","ety":"From Proto-Vietic *moːc, from Proto-Mon-Khmer *muuj ~ *muəj ~ *muuɲ; cognate with Muong mốch, Bahnar mĭnh and mônh, Khmer មួយ (muəy), Mon မွဲ (mòa), Bolyu maːi³¹, Mang mak⁷. Related to mốt (“day after tomorrow”).","ipa":"[mot̚˧˨ʔ] (Hà-Nội); [mok̚˨˩ʔ] (Huế); [mok̚˨˩˨] (Hồ-Chí-Minh-City); (Hà-Nội); (Hồ-Chí-Minh-City)","z":"一"},{"w":"ba","e":"three","s":"Một cốc cà phê có giá ba đô la.","se":"A cup of coffee costs three dollars.","pos":"noun","ety":"Non-Sino-Vietnamese reading of Chinese 爸 (“father”, SV: bả).","ipa":"[ʔɓaː˧˧] (Hà-Nội); [ʔɓaː˧˧] (Huế); [ʔɓaː˧˧] (Hồ-Chí-Minh-City); (Hà-Nội); (Hồ-Chí-Minh-City)","z":"三"},{"w":"năm","e":"five","s":"Một quyển tạp chí có giá năm đô la.","se":"A magazine costs five dollars.","pos":"num","ety":"From Proto-Vietic *ɗam, from Proto-Mon-Khmer *p(ɗ)am. Cognate with Muong đằm, đăm, Khmer ប្រាំ (pram), Bahnar pơđăm, Halang bơdăm.","ipa":"[nam˧˧] (Hà-Nội); [nam˧˧] (Huế); [nam˧˧] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"五"},{"w":"mười","e":"ten","s":"Súp có giá mười đô la.","se":"The soup costs ten dollars.","pos":"num","ety":"From Proto-Vietic *maːl.","ipa":"[mɨəj˨˩] (Hà-Nội); [mɨj˦˩] (Huế); [mɨj˨˩] (Hồ-Chí-Minh-City); (Hà-Nội); (Hà-Nội)","z":"十"},{"w":"quả táo","e":"an apple","s":"Tôi ăn ba quả táo.","se":"I eat three apples.","pos":"","ety":"","ipa":"","z":"蘋果"},{"w":"cái cốc","e":"a glass","s":"","se":"","pos":"","ety":"","ipa":"","z":"玻璃杯"},{"w":"hai","e":"two","s":"Người đàn ông uống hai cốc nước.","se":"The man drinks two cups of water.","pos":"num","ety":"From Proto-Vietic *haːr, from Proto-Mon-Khmer *ɓaar (or some variant presented by Proto-Palaungic *ləʔaːr, Khasi ar, Central Nicobarese [Nancowry] âṅ; Shorto reconstructed Pre-Mon-Khmer *biʔaar). Cognate with Muong hal, Khmer ពីរ (pii), Bahnar 'bar, Pacoh bar, Khasi ar, Mon ၜါ (ba). Insertion of initial *h in Vietic can also be seen in *huːɲ (“to kiss”) (> Vietnamese hôn), *heːt (“finished”) (> Vietnamese hết), *hanʔ (“he, she, it”) (> Vietnamese hắn), *hoːj (“foul-smelling”) (> Vietnamese hôi), *tŋ-ʔaːm (> Vietnamese hàm, Late Vietic), *hɔːŋʔ (“river, brook”), *haːŋʔ (“to open (mouth)”).","ipa":"[haːj˧˧] (Hà-Nội); [haːj˧˧] (Huế); [haːj˧˧] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"二"},{"w":"bốn","e":"four","s":"Chúng tôi mua bốn quyển sách tiếng Anh.","se":"We buy four English books.","pos":"num","ety":"From Proto-Vietic *poːnʔ, from Proto-Mon-Khmer *punʔ ~ *puən() ~ *pan(); cognate with Muong pổn, Khmer បួន (buən), Bahnar puăn, Pacoh poan, Mang puːn², Mon ပန် (pɔn) and Central Nicobarese [Nancowry] fōan.","ipa":"[ʔɓon˧˦] (Hà-Nội); [ʔɓoŋ˦˧˥] (Huế); [ʔɓoŋ˦˥] (Hồ-Chí-Minh-City); (Hà-Nội); (Hồ-Chí-Minh-City)","z":"四"},{"w":"bảy","e":"seven","s":"Họ ăn bảy quả táo.","se":"They eat seven apples.","po ch.","se":"They eat sausages for lunch.","pos":"noun","ety":"From French saucisse. The expected form after borrowing would be *xốt-xít or *xô-xít. It is possible that the present form is from a Southern dialect with final -t > -k. The transformation of the close-mid vowel /o/ to the close vowel /u/ is inexplicable.","ipa":"[sʊwk͡p̚˧˦ sïk̟̚˧˦] (Hà-Nội); [sʊwk͡p̚˦˧˥ sɨt̚˦˧˥] (Huế); [sʊwk͡p̚˦˥ sɨt̚˦˥] (Hồ-Chí-Minh-City)","z":"香腸"},{"w":"cơm rang","e":"fried rice","s":"Chúng tôi ăn tối với cơm rang.","se":"We eat fried rice for dinner.","pos":"noun","ety":"cơm (“rice”) + rang (“to roast in a pan”).","ipa":"[kəːm˧˧ zaːŋ˧˧] (Hà-Nội); [kəːm˧˧ ʐaːŋ˧˧] (Huế); [kəːm˧˧ ɹaːŋ˧˧] (Hồ-Chí-Minh-City)","z":"炒飯"},{"w":"hải sản","e":"seafood","s":"Chúng tôi không có hải sản.","se":"We don't have seafood.","pos":"noun","ety":"Sino-Vietnamese word from 海產, composed of 海 (“sea”) and 產 (“product”).","ipa":"[haːj˧˩ saːn˧˩] (Hà-Nội); [haːj˧˨ ʂaːŋ˧˨] (Huế); [haːj˧˨ saːŋ˧˨] (Huế); [haːj˨˩˦ ʂaːŋ˨˩˦] (Hồ-Chí-Minh-City); [haːj˨˩˦ saːŋ˨˩˦] (Hồ-Chí-Minh-City)","z":"海鮮"},{"w":"thịt","e":"meat","s":"Bạn không ăn bất cứ loại thịt nào.","se":"You don't eat any kind of meat.","pos":"noun","ety":"From Proto-Vietic *-siːt; cognate with Muong thit and Chut [Rục] sit⁸. Compare thức, which has same initial development.","ipa":"[tʰit̚˧˨ʔ] (Hà-Nội); [tʰit̚˨˩ʔ] (Huế); [tʰɨt̚˨˩˨] (Hồ-Chí-Minh-City)","z":"肉"},{"w":"thịt lợn","e":"pork","s":"Anh ấy không thích ăn thịt lợn.","se":"He doesn't like to eat pork.","pos":"","ety":"","ipa":"","z":"豬肉"},{"w":"thịt gà","e":"chicken","s":"Tôi không muốn ăn thịt gà.","se":"I don't want to eat chicken.","pos":"","ety":"","ipa":"","z":"雞肉"},{"w":"cá","e":"fish","s":"Họ không thích ăn cá.","se":"They don't like to eat fish.","pos":"noun","ety":"From Proto-Vietic *ʔa-kaːʔ, from Proto-Mon-Khmer *kaʔ. Cognate with Thavung ก้า, Khmer កា (kaa, “prefix for fish”), Pacoh aca, Bahnar ka, Mang ʔaː¹, Khasi 'kha/dohkha, Mon က (kaˀ), Car Nicobarese kāḵ.","ipa":"[kaː˧˦] (Hà-Nội); [kaː˨˩˦] (Huế); [kaː˦˥] (Hồ-Chí-Minh-City); [kɑː˦˥] ()","z":"魚"},{"w":"đậu phụ","e":"tofu","s":"Đây không phải đậu phụ.","se":"This is not tofu.","pos":"noun","ety":"Non-Sino-Vietnamese reading of Chinese 豆腐 (“tofu”, SV: đậu hủ). Doublet of đậu hủ, tàu hủ, and tào phớ.","ipa":"[ʔɗəw˧˨ʔ fu˧˨ʔ] (Hà-Nội); [ʔɗəw˨˩ʔ fʊw˨˩ʔ] (Huế); [ʔɗəw˨˩˨ fʊw˨˩˨] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"豆腐"},{"w":"ngọt","e":"sweet","s":"Cái này rất ngọt.","se":"This is very sweet.","pos":"adj","ety":"From Proto-Vietic *t-ŋɔːc. Cognate with Muong ngọch, Thavung ง้อด.","ipa":"[ŋɔt̚˧˨ʔ] (Hà-Nội); [ŋɔk̚˨˩ʔ] (Huế); [ŋɔk̚˨˩˨] (Hồ-Chí-Minh-City)","z":"甜"},{"w":"mặn","e":"salty","s":"Súp của anh ấy quá mặn.","se":"His soup is too salty.","pos":"adj","ety":"From Proto-Vietic *-maɲʔ (“salted”).","ipa":"[man˧˨ʔ] (Hà-Nội); [maŋ˨˩ʔ] (Huế); [maŋ˨˩˨] (Hồ-Chí-Minh-City)","z":"鹹"},{"w":"chua","e":"sour","s":"Quả táo này rất chua.","se":"This apple is very sour.","pos":"adj","ety":"From Proto-Vietic *ɟɔːʔ, from Proto-Mon-Khmer *ɟuʔ (“sour”); cognates include Khmer ជូរ (cuu), Khasi jew. This term displays an unexpected tone.","ipa":"[t͡ɕuə˧˧] (Hà-Nội); [t͡ɕuə˧˧] (Huế); [cuə˧˧] (Hồ-Chí-Minh-City)","z":"酸"},{"w":"đắng","e":"bitter","s":"Cà phê của tôi rất đắng.","se":"My coffee is very bitter.","pos":"adj","ety":"From Proto-Vietic *taŋʔ (“bitter”), from Proto-Mon-Khmer *kt₂aŋ (“bitter”); cognates include Bahnar tăng (“bitter”), Pacoh atáng (“bitter”), Khasi kthang (“bitter”), Bolyu tɕaŋ⁵³ and Mon က္တၚ် (kətɛŋ, “bitter”).","ipa":"[ʔɗaŋ˧˦] (Hà-Nội); [ʔɗaŋ˦˧˥] (Huế); [ʔɗaŋ˦˥] (Hồ-Chí-Minh-City)","z":"苦"},{"w":"cay","e":"spicy","s":"Đồ ăn này rất cay.","se":"The food is very spicy.","pos":"adj","ety":"Cognate with Tho [Cuối Chăm] kal¹.","ipa":"[kaj˧˧] (Hà-Nội); [kaj˧˧] (Huế); [ka(ː)j˧˧] (Hồ-Chí-Minh-City)","z":"辣"},{"w":"ngon","e":"delicious","s":"Cái này ngon.","se":"It is delicious.","pos":"adj","ety":"From Proto-Vietic *c-ŋɔːn. Compare Khmer ឆ្ងាញ់ (chngañ).","ipa":"[ŋɔn˧˧] (Hà-Nội); [ŋɔŋ˧˧] (Huế); [ŋɔŋ˧˧] (Hồ-Chí-Minh-City)","z":"好吃;美味"},{"w":"cho vào","e":"to put","s":"Sau đó, cho vào một ít muối.","se":"After that, put in a little salt.","pos":"","ety":"","ipa":"","z":"放入;加入"},{"w":"đường","e":"sugar;road","s":"Cô ấy cho đường vào cà phê của mình. Điểm dừng xe buýt ở trên đường chính.","se":"She puts sugar in her coffee. The bus stop is on the main road.","pos":"noun","ety":"A loanword (SEALang). Compare 唐 (MC dang, “road inside a temple; big road”), whence Proto-Southwestern Tai *daːŋᴬ² (“road; way”), whence further Thai ทาง (taang), Lao ທາງ (thāng), Northern Thai ᨴᩤ᩠ᨦ, Lü ᦑᦱᧂ (taang), Shan တၢင်း (táang); although possibly of ultimate Austroasiatic origin, compare Proto-Mon-Khmer *glɔɔŋ. Shorto proposes a possible South Bahnaric origin, compare Koho pədyaŋ, Central Mnong rdɛ:ŋ, from Proto-Mon-Khmer *rɗiŋ ~ *rɗiəŋ The native Vietnamese term is sá, inherited from Proto-Mon-Khmer *kraʔ, now fossilized and only found in compounds like đường sá (“roads”) and sá cày (“furrow”). See also dialectal form đàng. Compare nác and nước, đang and đương, kim cang and kim cương.","ipa":"[ʔɗɨəŋ˨˩] (Hà-Nội); [ʔɗɨəŋ˦˩] (Huế); [ʔɗɨəŋ˨˩] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"糖;路"},{"w":"muối","e":"salt","s":"Anh ấy cho muối vào trứng rán của mình.","se":"He puts salt on his fried egg.","pos":"noun","ety":"From Middle Vietnamese 𪉴 (múôi), from Proto-Vietic *ɓɔːjʔ (“salt”). Cognate with North Central Vietnamese mói, Muong bỏi/vỏi and Arem bɑːjʔ. Compare also Proto-Katuic *ɓɔɔj (whence Pacoh boi).","ipa":"[muəj˧˦] (Hà-Nội); [muj˨˩˦] (Huế); [muj˦˥] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"鹽"},{"w":"tiêu","e":"pepper","s":"Tôi cho tiêu vào đồ ăn của mình.","se":"I put pepper in my food.","pos":"verb","ety":"Sino-Vietnamese word from 消 (“to consume; to cease”)","ipa":"[tiəw˧˧] (Hà-Nội); [tiw˧˧] (Huế); [tiw˧˧] (Hồ-Chí-Minh-City); ()","z":"胡椒"},{"w":"sốt","e":"sauce;fever","s":"Nước sốt rất mặn. Anh ấy đã bị sốt trong ba ngày. Nếu nhiệt độ cơ thể trên 40 độ thì nghĩa là bạn bị sốt.","se":"The sauce is very salty. He had a fever for three days. If your body temperature is more than 40 degrees, you have a fever.","pos":"adj","ety":"Attested in Phật thuyết đại báo phụ mẫu ân trọng kinh (佛說大報父母恩重經) as 破律 (MC phaH lwit) (modern SV: phá luật) and 𤈠, phonetic 律 (MC lwit) (modern SV: luật).","ipa":"[sot̚˧˦] (Hà-Nội); [ʂok̚˦˧˥] (Huế); [sok̚˦˧˥] (Huế); [ʂok̚˦˥] (Hồ-Chí-Minh-City); [sok̚˦˥] (Hồ-Chí-Minh-City)","z":"醬汁;發燒"},{"w":"nghĩ","e":"to think","s":"Tôi nghĩ đồ ăn rất mặn.","se":"I think the food is very salty.","pos":"verb","ety":"Non-Sino-Vietnamese reading of Chinese 議 (SV: nghị).","ipa":"[ŋi˦ˀ˥] (Hà-Nội); [ŋɪj˧˨] (Huế); [ŋɪj˨˩˦] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"想;思考"},{"w":"rau củ","e":"vegetables","s":"Chúng tôi có súp rau củ.","se":"We have vegetable soup.","pos":"","ety":"","ipa":"","z":"蔬菜"},{"w":"cà rốt","e":"a carrot","s":"Có gà và cà rốt trong súp.","se":"There are carrots and chicken in the soup.","pos":"noun","ety":"Borrowed from French carotte. Influenced by cà (“eggplant”), compare cà phê.","ipa":"[kaː˨˩ ɹot̚˧˦] (Hà-Nội); [kaː˨˩ zot̚˧˦] (Hà-Nội); [kaː˦˩ ɹok̚˦˧˥] (Huế); [kaː˨˩ ɹok̚˦˥] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"紅蘿蔔"},{"w":"khoai tây","e":"a potato","s":"Có khoai tây và thịt lợn trong món ăn.","se":"There are potatoes and pork in the food.","pos":"noun","ety":"khoai (a collective name for yams, sweet potatoes, etc.) + tây (“western”).","ipa":"[xwaːj˧˧ təj˧˧] (Hà-Nội); [kʰwaːj˧˧ təj˧˧] (Huế); [xwaːj˧˧ təj˧˧] (Huế); [kʰwaːj˧˧ təj˧˧] (Hồ-Chí-Minh-City); [xwaːj˧˧ təj˧˧] (Hồ-Chí-Minh-City)","z":"馬鈴薯"},{"w":"cà chua","e":"a tomato","s":"Trong cơm rang có cà chua","se":"There are tomatoes in the fried rice.","pos":"noun","ety":"cà (“any plant in the family Solanaceae”) + chua (“sour”).","ipa":"[kaː˨˩ t͡ɕuə˧˧] (Hà-Nội); [kaː˦˩ t͡ɕuə˧˧] (Huế); [kaː˨˩ cuə˧˧] (Hồ-Chí-Minh-City)","z":"番茄"},{"w":"nấm","e":"a mushroom","s":"Trong nước sốt có nấm.","se":"There are mushrooms in the sauce.","pos":"noun","ety":"From Proto-Vietic *ɗəmʔ. Cognate with Nguôn đấm and Tho [Cuối Chăm] dʌm³.","ipa":"[nəm˧˦] (Hà-Nội); [nəm˦˧˥] (Huế); [nəm˦˥] (Hồ-Chí-Minh-City)","z":"香菇;蘑菇"},{"w":"có thể","e":"can;possible","s":"Tôi có thể làm được. Tôi có thể hát. Nếu có thể, tôi sẽ về nhà.","se":"I can do it. I can sing. If possible, I will go home.","pos":"adv","ety":"có (“to have”) + thể (“body”).","ipa":"[kɔ˧˦ tʰe˧˩] (Hà-Nội); [kɔ˨˩˦ tʰej˧˨] (Huế); [kɔ˦˥ tʰej˨˩˦] (Hồ-Chí-Minh-City)","z":"可以;可能"},{"w":"ớt","e":"chili","s":"Bạn có ăn được ớt không?","se":"Can you eat chili?","pos":"noun","ety":"From Proto-Vietic *ʔəːt. Pigneau de Béhaine's Dictionarium anamitico-latinum (1772 manuscript) glosses ớt as pimentum https://archive.org/details/DictionariumAnamiticoLatinumPigneaux/Dictionarium%20Anamitico-Latinum%20-%201772%2C%20P.J.%20Pigneaux/page/n395/mode/2up, a Neo-Latin derivation from French piment (“‘spice’ → ‘chilli pepper’”). Phạm Đình Hổ's 1827 dictionary Nhật dụng thường đàm (日用常談 \"Common Words Used Daily\") glosses ớt 乙 as 蓽䔲茄 (SV: tất đăng gia; \"tailed pepper, cubeb, piper cubeba\") http://www.nomfoundation.org/common/show.php?detail=1202&uiLang=en, also called tiêu thất in Vietnamese; so that plant was probably ớt’s original referent before the introduction of chilli pepper from the Americas.","ipa":"[ʔəːt̚˧˦] (Hà-Nội); [ʔəːk̚˦˧˥] (Huế); [ʔəːk̚˦˥] (Hồ-Chí-Minh-City)","z":"辣椒"},{"w":"tỏi","e":"garlic","s":"Anh ấy có thể ăn tỏi.","se":"He can eat garlic.","pos":"noun","ety":"Non-Sino-Vietnamese reading of Chinese 蒜 (“garlic”, SV: toán). Compare Nong Zhuang soiq (“garlic”). To account for the glide reflex in both languages, the borrowed Sinitic word was probably a dialectal form where earlier *-r-s shifted to *-jH instead of the typical *-nH (if the word was borrowed independently when the liquid still presented, Vietnamese would have *-j while Nong Zhuang would have *-n). However, it is also possible that there was borrowing involved: if the direction was Vietic > Tai, the Chinese form could be an early form with *-r-s (> *-lʰ > -jC) or a later form with *-jH; if the direction was Tai > Vietic, the borrowed Sinitic form must be *-jH. See also tươi, from Chinese 鮮／鲜, with *-j.","ipa":"[tɔj˧˩] (Hà-Nội); [tɔj˧˨] (Huế); [tɔj˨˩˦] (Hồ-Chí-Minh-City)","z":"大蒜"},{"w":"bạc hà","e":"mint","s":"Tôi không ăn được rau bạc hà.","se":"I cannot eat mint.","pos":"noun","ety":"Sino-Vietnamese word from 薄荷.","ipa":"[ʔɓaːk̚˧˨ʔ haː˨˩] (Hà-Nội); [ʔɓaːk̚˨˩ʔ haː˦˩] (Huế); [ʔɓaːk̚˨˩˨ haː˨˩] (Hồ-Chí-Minh-City)","z":"薄荷"},{"w":"rau ngò","e":"cilantro","s":"Cô ấy không ăn được rau ngò.","se":"She cannot eat cilantro.","pos":"","ety":"","ipa":"","z":"香菜"},{"w":"trái cây","e":"fruit","s":"","se":"","pos":"noun","ety":"From trái (“fruit”) + cây (“plant, tree”).","ipa":"[t͡ɕaːj˧˦ kəj˧˧] (Hà-Nội); [ʈaːj˨˩˦ kəj˧˧] (Huế); [ʈaːj˦˥ kəj˧˧] (Hồ-Chí-Minh-City)","z":"水果"},{"w":"đào","e":"a peach","s":"Tôi muốn mua một cân đào.","se":"I want to buy a kilogram of peaches.","pos":"noun","ety":"Sino-Vietnamese word from 桃 (“peach”). Related to điều (“cashew”).","ipa":"[ʔɗaːw˨˩] (Hà-Nội); [ʔɗaːw˦˩] (Huế); [ʔɗaːw˨˩] (Hồ-Chí-Minh-City)","z":"桃子"},{"w":"lê","e":"a pear","s":"Anh ấy muốn ăn hai quả lê.","se":"He wants to eat two pears.","pos":"noun","ety":"Sino-Vietnamese word from 梨.","ipa":"[le˧˧] (Hà-Nội); [lej˧˧] (Huế); [lej˧˧] (Hồ-Chí-Minh-City)","z":"梨子"},{"w":"dâu tây","e":"a strawberry","s":"Bạn muốn mua hai cân dâu tây.","se":"You want to buy two kilograms of strawberries.","pos":"noun","ety":"dâu (“mulberry”) + tây (“western”).","ipa":"[zəw˧˧ təj˧˧] (Hà-Nội); [jəw˧˧ təj˧˧] (Huế); [jəw˧˧ təj˧˧] (Hồ-Chí-Minh-City)","z":"草莓"},{"w":"dưa hấu","e":"a watermelon","s":"Quả dưa hấu nặng một cân.","se":"The watermelon weighs one kilogram.","pos":"noun","ety":"According to the Vietnamese folktale Sự tích trái dưa hấu (Legend of the Watermelon), the name dưa hấu derives from dưa (“melon”) + a non-Sino-Vietnamese reading of 好 (SV: hảo), but this is most likely just folk etymology.","ipa":"[zɨə˧˧ həw˧˦] (Hà-Nội); [jɨə˧˧ həw˨˩˦] (Huế); [jɨə˧˧ həw˦˥] (Hồ-Chí-Minh-City)","z":"西瓜"},{"w":"cam","e":"an orange","s":"Năm quả cam nặng một cân.","se":"Five oranges weigh one kilogram.","pos":"noun","ety":"Sino-Vietnamese word from 柑 (“orange”).","ipa":"[kaːm˧˧] (Hà-Nội); [kaːm˧˧] (Huế); [kaːm˧˧] (Hồ-Chí-Minh-City)","z":"柳橙"},{"w":"đông lạnh","e":"frozen","s":"Dâu tây đông lạnh không ngon.","se":"Frozen strawberries are not delicious.","pos":"adj","ety":"đông + lạnh.","ipa":"[ʔɗəwŋ͡m˧˧ lajŋ̟˧˨ʔ] (Hà-Nội); [ʔɗəwŋ͡m˧˧ lɛɲ˨˩ʔ] (Huế); [ʔɗəwŋ͡m˧˧ lan˨˩˨] (Hồ-Chí-Minh-City)","z":"冷凍的"},{"w":"tươi","e":"fresh","s":"Dâu tây tươi rất ngon.","se":"Fresh strawberries are very delicious.","pos":"adj","ety":"From Old Chinese 鮮 (OC *s[a]r) (B-S) (SV: tiên).","ipa":"[tɨəj˧˧] (Hà-Nội); [tɨj˧˧] (Huế); [tɨj˧˧] (Hồ-Chí-Minh-City)","z":"新鮮的"},{"w":"khô","e":"dry","s":"Đào khô không ngon lắm.","se":"Dry peaches are not delicious.","pos":"adj","ety":"Sino-Vietnamese word from 枯. Cognate with Tho [Cuối Chăm] kʰɔː¹.","ipa":"[xo˧˧] (Hà-Nội); [kʰow˧˧] (Huế); [xow˧˧] (Huế); [kʰow˧˧] (Hồ-Chí-Minh-City); [xow˧˧] (Hồ-Chí-Minh-City)","z":"乾的"},{"w":"thùng","e":"a box","s":"Cô ấy muốn mua một thùng lê.","se":"She wants to buy a box of pears.","pos":"noun","ety":"Non-Sino-Vietnamese reading of Chinese 桶 (SV: dũng, thũng); compare thúng. Cognate with Khmer ធុង (thung, “cistern”).","ipa":"[tʰʊwŋ͡m˨˩] (Hà-Nội); [tʰʊwŋ͡m˦˩] (Huế); [tʰʊwŋ͡m˨˩] (Hồ-Chí-Minh-City)","z":"箱子"},{"w":"hộp","e":"a can","s":"Anh ấy muốn mua một hộp đào ngâm.","se":"He wants to buy a can of peaches.","pos":"noun","ety":"Non-Sino-Vietnamese reading of Chinese 盒 (“box”, SV: hạp).","ipa":"[hop̚˧˨ʔ] (Hà-Nội); [hop̚˨˩ʔ] (Huế); [hop̚˨˩˨] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"罐頭"},{"w":"nước ép trái cây","e":"fruit juice","s":"Anh ấy không thích uống nước ép trái cây.","se":"He does not like to drink fruit juice.","pos":"","ety":"","ipa":"","z":"果汁"},{"w":"nước ép táo","e":"apple juice","s":"Cô ấy thích uống nước ép táo.","se":"She likes to drink apple juice.","pos":"","ety":"","ipa":"","z":"蘋果汁"},{"w":"nước ngọt","e":"soft drink","s":"Tôi không uống nước ngọt.","se":"I do not drink soft drinks.","pos":"noun","ety":"From nước + ngọt.","ipa":"[nɨək̚˧˦ ŋɔt̚˧˨ʔ] (Hà-Nội); [nɨək̚˦˧˥ ŋɔk̚˨˩ʔ] (Huế); [nɨək̚˦˥ ŋɔk̚˨˩˨] (Hồ-Chí-Minh-City)","z":"汽水;軟性飲料"},{"w":"nhỏ","e":"small","s":"Anh ấy muốn uống một cốc nước ép táo nhỏ Đôi giày này rất nhỏ.","se":"He wants to drink a small glass of apple juice. This pair of shoes is very small.","pos":"adj","ety":"","ipa":"[ɲɔ˧˩] (Hà-Nội); [ɲɔ˧˨] (Huế); [ɲɔ˨˩˦] (Hồ-Chí-Minh-City)","z":"小"},{"w":"lấy","e":"to take;to get","s":"Tôi lấy một cốc nước ép táo nhỏ. Tôi sẽ lấy hành lý.","se":"I'll take a small glass of apple juice. I will get my luggage.","pos":"verb","ety":"From Proto-Vietic *leːʔ / -leːʔ (“to take”), from Proto-Mon-Khmer *liʔ (“to take”). Cognate with Muong Bi lễ, Tho [Cuối Chăm] leː⁴, U lè, Riang leʔ².","ipa":"[ləj˧˦] (Hà-Nội); [ləj˨˩˦] (Huế); [ləj˦˥] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"拿;取得"},{"w":"ấm","e":"pot;kettle","s":"Tôi muốn uống một ấm trà. Đun sôi nước trong ấm.","se":"I want to drink a pot of tea. Boil water in the kettle.","pos":"adj","ety":"From Proto-Vietic *s-ʔəmʔ (“lukewarm”), from Proto-Mon-Khmer *(s)ʔəm ~ *(s)ʔəəm ~ *(s)ʔuum ~ *(s)ʔuəm (“warm”). Cognate with Khmer ស្អំ (sʼɑm, “warm”), Kuy səʔam, Khmu [Cuang] hʔɨm. Possibly related to hâm.","ipa":"[ʔəm˧˦] (Hà-Nội); [ʔəm˦˧˥] (Huế); [ʔəm˦˥] (Hồ-Chí-Minh-City)","z":"壺"},{"w":"nóng","e":"hot","s":"Ấm trà này nóng. Hôm nay trời nóng.","se":"This pot of tea is hot. It's hot today.","pos":"adj","ety":"From Proto-Vietic *p-ɗuŋʔ ~ *p-ruŋʔ (“hot”).","ipa":"[nawŋ͡m˧˦] (Hà-Nội); [nawŋ͡m˦˧˥] (Huế); [nɔŋ˦˧˥] (Huế); [nawŋ͡m˦˥] (Hồ-Chí-Minh-City)","z":"熱"},{"w":"lạnh","e":"cold","s":"Cốc cà phê này đã lạnh rồi.","se":"This cup of coffee is already cold.","pos":"adj","ety":"Non-Sino-Vietnamese reading of Chinese 冷 (“cold”, SV: lãnh). Displaced native giá, which is now present only in compounds, such as giá lạnh and buốt giá.","ipa":"[lajŋ̟˧˨ʔ] (Hà-Nội); [lɛɲ˨˩ʔ] (Huế); [lan˨˩˨] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"冷"},{"w":"sinh tố","e":"a smoothie","s":"Tôi lấy một sinh tố táo.","se":"I'll take an apple smoothie.","pos":"noun","ety":"Sino-Vietnamese word from 生素, composed of 生 (“life”) and 素 (“element”), from Chinese 維生素／维生素 (duy sinh tố, literally “life-sustaining element”).","ipa":"[sïŋ˧˧ to˧˦] (Hà-Nội); [ʂɨn˧˧ tow˨˩˦] (Huế); [sɨn˧˧ tow˨˩˦] (Huế); [ʂɨn˧˧ tow˦˥] (Hồ-Chí-Minh-City); [sɨn˧˧ tow˦˥] (Hồ-Chí-Minh-City)","z":"果昔"},{"w":"đá","e":"ice","s":"Cô ấy sẽ uống nước ép táo với đá.","se":"She'll take apple juice with ice.","pos":"noun","ety":"From Proto-Vietic *l-taːʔ (“rock”); cognate with Arem atæːˀ. Schuessler (2007) claims that this Vietic word and Khmer ដា (daa) might be related to Chinese 石 (OC *dAk) (B-S) (SV: thạch). However, this is unlikely due to both *the mismatch between final *-k and *-ʔ (unless Chinese added \"the familiar final -k\" after foreign *-ʔ, resulting in *-ʔ-k > *-k; for an analogy, Chinese 汝 (OC *naʔ) > Chinese 若 (OC *nak)) *and the fact the Khmer word is likely borrowed from Vietnamese or another Vietic language instead of inheriting from a common source.","ipa":"[ʔɗaː˧˦] (Hà-Nội); [ʔɗaː˨˩˦] (Huế); [ʔɗaː˦˥] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"冰塊"},{"w":"lớn","e":"big","s":"Bạn lấy một cốc bia lớn. Đôi giày này rất lớn.","se":"You'll take a big glass of beer. This pair of shoes is very big.","pos":"adj","ety":"From Middle Vietnamese lớn, mlớn.","ipa":"[ləːn˧˦] (Hà-Nội); [ləːŋ˦˧˥] (Huế); [ləːŋ˦˥] (Hồ-Chí-Minh-City); (Hà-Nội); (Hồ-Chí-Minh-City)","z":"大"},{"w":"vừa","e":"medium;to fit","s":"Anh ấy sẽ dùng ly cà phê size vừa. Đôi giày này vừa vặn.","se":"He'll take a medium-sized cup of coffee. This pair of shoes fits.","pos":"verb","ety":"","ipa":"[vɨə˨˩] (Hà-Nội); [vɨə˦˩] (Huế); [vɨə˨˩] (Hồ-Chí-Minh-City); [jɨə˨˩] (Hồ-Chí-Minh-City)","z":"中等;合身"},{"w":"bia","e":"beer","s":"Bố tôi uống cà phê nhưng không uống bia.","se":"My father drinks coffee but does not drink beer.","p reen tea.","pos":"noun","ety":"trà + xanh.","ipa":"[t͡ɕaː˨˩ sajŋ̟˧˧] (Hà-Nội); [ʈaː˦˩ sɛɲ˧˧] (Huế); [ʈaː˨˩ san˧˧] (Hồ-Chí-Minh-City)","z":"綠茶"},{"w":"sữa","e":"milk","s":"Tôi không thích uống sữa.","se":"I do not like to drink milk.","pos":"noun","ety":"From Proto-Vietic *p-rah. Cognate with Muong khã, Nguôn [Cổ Liêm] rả. Attested in Phật thuyết đại báo phụ mẫu ân trọng kinh (佛說大報父母恩重經) as ⿰吕巴, composed of 巴 (MC pae) + 吕 (MC ljoX) (modern SV: ba lã), ⿰吕巨, composed of 巨 (MC gjoX) + 吕 (MC ljoX) (modern SV: cự lã) and 吕 (MC ljoX) (modern SV: lã).","ipa":"[sɨə˦ˀ˥] (Hà-Nội); [ʂɨə˧˨] (Huế); [sɨə˧˨] (Huế); [ʂɨə˨˩˦] (Hồ-Chí-Minh-City); [sɨə˨˩˦] (Hồ-Chí-Minh-City); (); (Hà-Nội); (Hồ-Chí-Minh-City)","z":"牛奶"},{"w":"đi vào","e":"to come in;to enter","s":"Xin mời vào. Không được phép đi vào địa điểm này.","se":"Please come in. You are not allowed to enter this place.","pos":"verb","ety":"","ipa":"[ʔɗi˧˧ vaːw˨˩] (Hà-Nội); [ʔɗɪj˧˧ vaːw˦˩] (Huế); [ʔɗɪj˧˧ vaːw˨˩] (Hồ-Chí-Minh-City); [ʔɗɪj˧˧ jaːw˨˩] (Hồ-Chí-Minh-City)","z":"進來;進入"},{"w":"ngồi","e":"to sit","s":"Mời ngồi đây. Nếu bạn ngồi trong một thời gian dài, bạn sẽ bị đau lưng.","se":"Please sit here. If you sit for a long time, you will get a backache.","pos":"verb","ety":"From Proto-Vietic *ŋuːj (“to sit”), from Proto-Mon-Khmer *ŋguj (“to sit down”). Cognate with Arem ŋùəj (\"to be at\"), Khmer អង្គុយ (ʼɑɑʼɑngkuy, “to sit”) and Koho nggui.","ipa":"[ŋoj˨˩] (Hà-Nội); [ŋoj˦˩] (Huế); [ŋoj˨˩] (Hồ-Chí-Minh-City)","z":"坐"},{"w":"đặt (gọi)","e":"to order","s":"Mời gọi món.","se":"Please order food.","pos":"","ety":"","ipa":"","z":"點(餐)"},{"w":"đợi","e":"to wait","s":"Vui lòng đợi một lát. Chúng tôi đã đợi giáo viên từ lúc 11 giờ sáng.","se":"Please wait a moment. We have been waiting for the teacher since 11 am.","pos":"verb","ety":"Non-Sino-Vietnamese reading of Chinese 待 (“to wait for”, SV: đãi).","ipa":"[ʔɗəːj˧˨ʔ] (Hà-Nội); [ʔɗəːj˨˩ʔ] (Huế); [ʔɗəːj˨˩˨] (Hồ-Chí-Minh-City)","z":"等;等待"},{"w":"bữa ăn","e":"a meal","s":"","se":"","pos":"noun","ety":"bữa + ăn.","ipa":"[ʔɓɨə˦ˀ˥ ʔan˧˧] (Hà-Nội); [ʔɓɨə˧˨ ʔaŋ˧˧] (Huế); [ʔɓɨə˨˩˦ ʔaŋ˧˧] (Hồ-Chí-Minh-City)","z":"一餐"},{"w":"thực đơn","e":"a menu","s":"","se":"","pos":"noun","ety":"Sino-Vietnamese word from 食單.","ipa":"[tʰɨk̚˧˨ʔ ʔɗəːn˧˧] (Hà-Nội); [tʰɨk̚˨˩ʔ ʔɗəːŋ˧˧] (Huế); [tʰɨk̚˨˩˨ ʔɗəːŋ˧˧] (Hồ-Chí-Minh-City)","z":"菜單"},{"w":"đói","e":"to be hungry","s":"Tôi rất đói.","se":"I am very hungry.","pos":"adj","ety":"Cognate with Muong Bi tỏl.","ipa":"[ʔɗɔj˧˦] (Hà-Nội); [ʔɗɔj˨˩˦] (Huế); [ʔɗɔj˦˥] (Hồ-Chí-Minh-City)","z":"餓"},{"w":"no","e":"to be full","s":"Tôi no.","se":"I am full.","pos":"adj","ety":"From Proto-Vietic *ɗɔː (“satiated”). Cognate with Arem dɑː.","ipa":"[nɔ˧˧] (Hà-Nội); [nɔ˧˧] (Huế); [nɔ˧˧] (Hồ-Chí-Minh-City)","z":"飽"},{"w":"dị ứng","e":"to be allergic","s":"Anh ấy dị ứng với hải sản.","se":"He is allergic to seafood.","pos":"noun","ety":"Sino-Vietnamese word from 異 (“different; strange”) and 應 (“to react; to respond”).","ipa":"[zi˧˨ʔ ʔɨŋ˧˦] (Hà-Nội); [jɪj˨˩ʔ ʔɨŋ˦˧˥] (Huế); [jɪj˨˩˨ ʔɨŋ˦˥] (Hồ-Chí-Minh-City)","z":"過敏"},{"w":"ăn chay","e":"to be vegetarian","s":"Cô ấy ăn chay.","se":"She is a vegetarian.","pos":"","ety":"","ipa":"","z":"吃素"},{"w":"ăn kiêng","e":"to be on a diet","s":"Cô ấy ăn kiêng.","se":"She is on a diet.","pos":"verb","ety":"ăn (“to eat”) + kiêng (“to avoid”).","ipa":"[ʔan˧˧ kiəŋ˧˧] (Hà-Nội); [ʔaŋ˧˧ kiəŋ˧˧] (Huế); [ʔaŋ˧˧ kiəŋ˧˧] (Hồ-Chí-Minh-City)","z":"節食"},{"w":"thêm","e":"more","s":"Tôi muốn gọi thêm đồ ăn.","se":"I would like to order more food.","pos":"adj","ety":"Non-Sino-Vietnamese reading of Chinese 添 (“to add”, SV: thiêm). Compare Thai แถม (tɛ̌ɛm) and Khmer បន្ថែម (bɑɑbɑnthaem)/ថែម (thaem).","ipa":"[tʰem˧˧] (Hà-Nội); [tʰem˧˧] (Huế); [tʰem˧˧] (Hồ-Chí-Minh-City)","z":"更多;再加"},{"w":"món ăn vặt","e":"a snack","s":"Tôi muốn ăn một vài món ăn vặt.","se":"I would like to eat some snacks.","pos":"","ety":"","ipa":"","z":"點心;零食"},{"w":"món tráng miệng","e":"dessert","s":"Tôi muốn tráng miệng bằng trái cây.","se":"I would like to have fruit for dessert.","pos":"","ety":"","ipa":"","z":"甜點"},{"w":"đồ uống","e":"drink","s":"Bạn muốn xem thực đơn đồ uống.","se":"You would like to see the drink menu.","pos":"noun","ety":"đồ + uống.","ipa":"[ʔɗo˨˩ ʔuəŋ˧˦] (Hà-Nội); [ʔɗow˦˩ ʔuəŋ˦˧˥] (Huế); [ʔɗow˨˩ ʔuəŋ˦˥] (Hồ-Chí-Minh-City)","z":"飲料"},{"w":"kem","e":"ice cream","s":"Họ muốn gọi kem.","se":"They would like to order ice cream.","pos":"noun","ety":"Borrowed from French crème.","ipa":"[kɛm˧˧] (Hà-Nội); [kɛm˧˧] (Huế); [kɛm˧˧] (Hồ-Chí-Minh-City)","z":"冰淇淋"},{"w":"trả","e":"to pay","s":"","se":"","pos":"verb","ety":"Compare Chut pla꞉⁴. Attested in Phật thuyết đại báo phụ mẫu ân trọng kinh (佛說大報父母恩重經) as 把 (MC paeX) (modern SV: bả) and 󰑼, phonetic 羅 (MC la) (modern SV: la). Compare trong (which was something like *klɔŋᴬ¹ at the time), which was also written with characters that leave out the medial liquid.","ipa":"[t͡ɕaː˧˩] (Hà-Nội); [ʈaː˧˨] (Huế); [ʈaː˨˩˦] (Hồ-Chí-Minh-City)","z":"付錢"},{"w":"thẻ tín dụng","e":"a credit card","s":"Tôi có thể trả bằng thẻ tín dụng không?","se":"Can I pay with a credit card?","pos":"noun","ety":"thẻ + tín dụng.","ipa":"[tʰɛ˧˩ tin˧˦ zʊwŋ͡m˧˨ʔ] (Hà-Nội); [tʰɛ˧˨ tin˦˧˥ jʊwŋ͡m˨˩ʔ] (Huế); [tʰɛ˨˩˦ tɨn˦˥ jʊwŋ͡m˨˩˨] (Hồ-Chí-Minh-City)","z":"信用卡"},{"w":"đề xuất (gợi ý)","e":"to recommend;to suggest","s":"Bạn có thể gợi ý một món ăn không? Bạn làm ơn có thể đề xuất một ý tưởng mới được không?","se":"Can you recommend a dish? Could you suggest a new idea, please?","pos":"","ety":"","ipa":"","z":"推薦;建議"},{"w":"xin","e":"to have (to get)","s":"Cho tôi xin thực đơn bằng tiếng Anh được không?","se":"Can I have the English menu?","pos":"verb","ety":"Contrary to some proposals (such as Ishihara (2014)), this term is unrelated to 請 (MC tshjengX), which contains both an unmatching rime and an unmatching tone.","ipa":"[sin˧˧] (Hà-Nội); [sin˧˧] (Huế); [sɨn˧˧] (Hồ-Chí-Minh-City)","z":"要;請給(我)"},{"w":"hóa đơn","e":"a bill","s":"Cho tôi xin hóa đơn được không?","se":"Can I have the bill, please?","pos":"noun","ety":"","ipa":"","z":"帳單"},{"w":"biên lai","e":"a receipt","s":"Cho tôi xin biên lai được không?","se":"Can I have the receipt, please?","pos":"noun","ety":"Sino-Vietnamese word from 編來.","ipa":"[ʔɓiən˧˧ laːj˧˧] (Hà-Nội); [ʔɓiəŋ˧˧ laːj˧˧] (Huế); [ʔɓiəŋ˧˧ laːj˧˧] (Hồ-Chí-Minh-City)","z":"收據"},{"w":"dưới","e":"under","s":"Quyển sách ở dưới hộp dâu tây.","se":"The book is under the box of strawberries.","pos":"prep","ety":"From Proto-Vietic *-taːlʔ, from Proto-Mon-Khmer *kt₁aal (“under-surface, under”). Cognate with Old Mon kintāl (modern Mon ဂတာ (həta, “underpart, bottom”)). The Northern Old Vietnamese form is attested in Phật thuyết đại báo phụ mẫu ân trọng kinh (佛說大報父母恩重經) as 𢃄, phonetic 帶 (MC tajH) (modern SV: đái), showing that the shift *-l > j in these dialects had already happened.","ipa":"[zɨəj˧˦] (Hà-Nội); [jɨj˨˩˦] (Huế); [jɨj˦˥] (Hồ-Chí-Minh-City)","z":"下面;在...之下"},{"w":"căn phòng","e":"a room","s":"Quyển tạp chí phụ nữ ở trong phòng.","se":"The women's magazine is in the room.","pos":"","ety":"","ipa":"","z":"房間"},{"w":"cái bàn","e":"a table;table","s":"Một cái bàn trong phòng. Một cái bàn tròn màu đen.","se":"The table is in the room. A round black table","pos":"","ety":"","ipa":"","z":"桌子"},{"w":"trên","e":"on","s":"Những quả táo ở trên bàn.","se":"The apples are on the table.","pos":"adj","ety":"From Middle Vietnamese 𨕭, from Proto-Vietic *k-leːɲ. Related to lên.","ipa":"[t͡ɕen˧˧] (Hà-Nội); [ʈen˧˧] (Huế); [ʈəːn˧˧] (Hồ-Chí-Minh-City)","z":"上面;在...之上"},{"w":"quyển từ điển","e":"a dictionary","s":"Quyển từ điển tiếng Anh ở trên bàn.","se":"The English dictionary is on the table.","pos":"","ety":"","ipa":"","z":"字典"},{"w":"cái ghế","e":"a chair","s":"Anh ấy ngồi trên ghế.","se":"He sits on the chair.","pos":"","ety":"","ipa":"","z":"椅子"},{"w":"giữa","e":"between","s":"Quyển từ điển nằm giữa tờ báo và quyển tạp chí. Nhà hàng nằm giữa chợ và trường học.","se":"The dictionary is between the newspaper and the magazine. The restaurant is between the market and the school.","pos":"prep","ety":"Cognate with Tho [Cuối Chăm] kʰrɐː⁶. The mainstream Vietnamese form underwent the uncommon but attested *C-r- > ‹gi-› shift instead of regular *C-r- > ‹s-›. The North Central forms exhibit the local frequent shift *C-r- > *C-l-. For the correspondence, compare mainstream già vs. North Central tra (“old”), mainstream giòi vs. North Central troi (“maggot”). Northern Old Vietnamese in the earliest Nôm texts in already showed cluster simplification (with its usage of 字 (MC dziH) as phonetic), while the contemporary Old Vietnamese form ancestral to the modern North Central forms certainly still had the consonant cluster at the time.","ipa":"[zɨə˦ˀ˥] (Hà-Nội); [jɨə˧˨] (Huế); [jɨə˨˩˦] (Hồ-Chí-Minh-City)","z":"中間;在...之間"},{"w":"cây bút","e":"a pen","s":"Cái bút nằm giữa cái cốc và quyển từ điển.","se":"The pen is between the glass and the dictionary.","pos":"","ety":"","ipa":"","z":"筆"},{"w":"lớp học","e":"a classroom;class","s":"Có nhiều ghế trong lớp học. Hôm nay chúng tôi không có lớp.","se":"There are chairs in the classroom. We don't have classes today.","pos":"noun","ety":"lớp + học.","ipa":"[ləːp̚˧˦ hawk͡p̚˧˨ʔ] (Hà-Nội); [ləːp̚˦˧˥ hawk͡p̚˨˩ʔ] (Huế); [ləːp̚˦˥ hawk͡p̚˨˩˨] (Hồ-Chí-Minh-City)","z":"教室;課"},{"w":"giáo viên","e":"a teacher","s":"Giáo viên ngồi giữa tôi và bạn học của tôi.","se":"The teacher sits between me and my classmate.","pos":"noun","ety":"Sino-Vietnamese word from 教員 (“teacher”).","ipa":"[zaːw˧˦ viən˧˧] (Hà-Nội); [jaːw˨˩˦ viəŋ˧˧] (Huế); [jaːw˦˥ viəŋ˧˧] (Hồ-Chí-Minh-City); [jaːw˦˥ jiəŋ˧˧] (Hồ-Chí-Minh-City)","z":"老師"},{"w":"bên ngoài","e":"outside","s":"Giáo viên ở bên ngoài lớp học.","se":"The teacher is outside the classroom.","pos":"noun","ety":"bên + ngoài.","ipa":"[ʔɓen˧˧ ŋwaːj˨˩] (Hà-Nội); [ʔɓen˧˧ ŋwaːj˦˩] (Huế); [ʔɓəːn˧˧ ŋwaːj˨˩] (Hồ-Chí-Minh-City)","z":"外面"},{"w":"bên trong","e":"inside","s":"Tất cả sinh viên ở bên trong lớp học.","se":"All students are inside the classroom.","pos":"","ety":"","ipa":"","z":"裡面"},{"w":"ở","e":"at;to stay","s":"Tôi đang ở trường. Chúng tôi muốn ở đây hai đêm.","se":"I am at school. We want to stay here for two nights.","pos":"prep","ety":"From Proto-Vietic *ʔəh (“to stay”); cognate with Muong ớ. Most prepositions in Vietnamese were originally verbs: cho (“to give; for”), đến (“to come; to”), tới (“to arrive; to”), lên (“to go up; onto”), vào (“to enter; in, into”), theo (“to follow; according to”), về (“to return; about”). Similarity to Chinese 於／于 is coincidental, as semantically the Vietnamese word is a grammaticalized verbal and phonetically there is a tonal mismatch.","ipa":"[ʔəː˧˩] (Hà-Nội); [ʔəː˧˨] (Huế); [ʔəː˨˩˦] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"在;停留"},{"w":"trường học","e":"a school","s":"Các sinh viên đang ở trường.","se":"The students are at school.","pos":"noun","ety":"Sino-Vietnamese word from 場學, composed of 場 (“school; venue”) and 學 (“to study”).","ipa":"[t͡ɕɨəŋ˨˩ hawk͡p̚˧˨ʔ] (Hà-Nội); [ʈɨəŋ˦˩ hawk͡p̚˨˩ʔ] (Huế); [ʈɨəŋ˨˩ hawk͡p̚˨˩˨] (Hồ-Chí-Minh-City)","z":"學校"},{"w":"quán ăn tự phục vụ","e":"a cafeteria","s":"Quán ăn tự phục vụ ở trong trường.","se":"The cafeteria is in the school.","pos":"","ety":"","ipa":"","z":"自助餐廳"},{"w":"ở đây","e":"here","s":"Chúng tôi ở đây.","se":"We are here.","pos":"","ety":"","ipa":"","z":"這裡"},{"w":"ở kia","e":"there","s":"Họ ở kia.","se":"They are there.","pos":"","ety":"","ipa":"","z":"那裡"},{"w":"nhà sách","e":"a book store","s":"Bạn đang ở nhà sách.","se":"You are at the book store.","pos":"noun","ety":"nhà (“house”) + sách (“book”).","ipa":"[ɲaː˨˩ sajk̟̚˧˦] (Hà-Nội); [ɲaː˦˩ ʂat̚˦˧˥] (Huế); [ɲaː˦˩ sat̚˦˧˥] (Huế); [ɲaː˨˩ ʂat̚˦˥] (Hồ-Chí-Minh-City); [ɲaː˨˩ sat̚˦˥] (Hồ-Chí-Minh-City)","z":"書店"},{"w":"công viên","e":"a park","s":"Chúng tôi đang ở trong công viên.","se":"We are in the park.","pos":"noun","ety":"Sino-Vietnamese word from 公園, composed of 公 (“public”) and 園 (“garden”).","ipa":"[kəwŋ͡m˧˧ viən˧˧] (Hà-Nội); [kəwŋ͡m˧˧ viəŋ˧˧] (Huế); [kəwŋ͡m˧˧ viəŋ˧˧] (Hồ-Chí-Minh-City); [kəwŋ͡m˧˧ jiəŋ˧˧] (Hồ-Chí-Minh-City)","z":"公園"},{"w":"ở góc","e":"at the corner","s":"Trường học ở ngay góc đường.","se":"The school is on the corner.","pos":"","ety":"","ipa":"","z":"在轉角"},{"w":"đối diện","e":"opposite to","s":"Nhà sách đối diện với trường học.","se":"The book store is opposite the school.","pos":"adj","ety":"Sino-Vietnamese word from 對面, composed of 對 (“opposite”) and 面 (“face”).","ipa":"[ʔɗoj˧˦ ziən˧˨ʔ] (Hà-Nội); [ʔɗoj˨˩˦ jiəŋ˨˩ʔ] (Huế); [ʔɗoj˦˥ jiəŋ˨˩˨] (Hồ-Chí-Minh-City)","z":"對面"},{"w":"gần","e":"near","s":"Trường học ở gần công viên.","se":"The school is near the park.","pos":"adj","ety":"From Proto-Vietic *t-kəɲ. Traditionally regarded as a non-Sino-Vietnamese reading of Chinese 近 (SV: cận). There have been some proposals, including Miyake (2015) and Trần Trí Dõi (2016), that this term is not a loanword. The earliest layer of Sinitic loans in Vietic usually show the shift of *-r > *-n characteristic of the later stages of Old Chinese. However, there is no motivation for the shift of this *-n to *-ɲ (Rục kept Vietic *-n as is after all vowels). In any case, cognate with Muong Bi khênh, Chut [Rục] təkiɲ¹, Arem kɨ̀ɲ.","ipa":"[ɣən˨˩] (Hà-Nội); [ɣəŋ˦˩] (Huế); [ɣəŋ˨˩] (Hồ-Chí-Minh-City)","z":"近"},{"w":"xa","e":"far","s":"Nhà sách ở rất xa công viên.","se":"The book store is very far from the park.","pos":"adj","ety":"Sino-Vietnamese word from 賒. Attested in Phật thuyết đại báo phụ mẫu ân trọng kinh (佛說大報父母恩重經) as 可耶 (MC khaX yae) (modern SV: khả da), 可賒 (MC khaX syae) (modern SV: khả xa) and 可車 (MC khaX tsyhae) (modern SV: khả xa). Displaced native ngái in the major dialects.","ipa":"[saː˧˧] (Hà-Nội); [saː˧˧] (Huế); [saː˧˧] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"遠"},{"w":"nhà vệ sinh","e":"toilet","s":"Nhà vệ sinh cách đây rất xa.","se":"The toilet is far from here.","pos":"noun","ety":"nhà (“house”) + vệ sinh (“sanitary”).","ipa":"[ɲaː˨˩ ve˧˨ʔ sïŋ˧˧] (Hà-Nội); [ɲaː˦˩ vej˨˩ʔ ʂɨn˧˧] (Huế); [ɲaː˦˩ vej˨˩ʔ sɨn˧˧] (Huế); [ɲaː˨˩ vej˨˩˨ ʂɨn˧˧] (Hồ-Chí-Minh-City); [ɲaː˨˩ jej˨˩˨ sɨn˧˧] (Hồ-Chí-Minh-City)","z":"廁所;洗手間"},{"w":"đi","e":"to go","s":"Tôi đi học.","se":"I go to school.","pos":"verb","ety":"From Proto-Vietic *diː ~ tiː (“to go, to walk”); cognate with Muong ti, Chut [Rục] tiː², Thavung tiː² and Tho [Cuối Chăm] tiː². The similarity to 移 (SV: di), is purely coincidental (a false cognate).","ipa":"[ʔɗi˧˧] (Hà-Nội); [ʔɗɪj˧˧] (Huế); [ʔɗɪj˧˧] (Hồ-Chí-Minh-City)","z":"去"},{"w":"sở thú","e":"a zoo","s":"Chúng tôi đi sở thú.","se":"We go to the zoo.","pos":"noun","ety":"sở (“department, place”) + thú (“animal”), literally \"department/place of animals\". Apparently originally the colloquial nickname for the Saigon Zoo and Botanical Gardens, then became the term of \"zoo\" in general.","ipa":"[səː˧˩ tʰu˧˦] (Hà-Nội); [ʂəː˧˨ tʰʊw˨˩˦] (Huế); [səː˧˨ tʰʊw˨˩˦] (Huế); [ʂəː˨˩˦ tʰʊw˦˥] (Hồ-Chí-Minh-City); [səː˨˩˦ tʰʊw˦˥] (Hồ-Chí-Minh-City)","z":"動物園"},{"w":"bãi biển","e":"a beach","s":"Bạn đi tới bãi biển.","se":"You go to the beach.","pos":"noun","ety":"bãi (“flat expanse”) + biển (“sea”).","ipa":"[ʔɓaːj˦ˀ˥ ʔɓiən˧˩] (Hà-Nội); [ʔɓaːj˧˨ ʔɓiəŋ˧˨] (Huế); [ʔɓaːj˨˩˦ ʔɓiəŋ˨˩˦] (Hồ-Chí-Minh-City)","z":"海灘"},{"w":"nhà hàng","e":"a restaurant","s":"Cô ấy đi tới nhà hàng.","se":"She goes to the restaurant.","pos":"noun","ety":"nhà (“house”) + hàng (“goods”).","ipa":"[ɲaː˨˩ haːŋ˨˩] (Hà-Nội); [ɲaː˦˩ haːŋ˦˩] (Huế); [ɲaː˨˩ haːŋ˨˩] (Hồ-Chí-Minh-City)","z":"餐廳"},{"w":"chợ","e":"a market","s":"Họ đi tới chợ.","se":"They go to the market.","pos":"noun","ety":"Non-Sino-Vietnamese reading of Chinese 市 (SV: thị).","ipa":"[t͡ɕəː˧˨ʔ] (Hà-Nội); [t͡ɕəː˨˩ʔ] (Huế); [cəː˨˩˨] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"市場"},{"w":"bảo tàng","e":"a museum","s":"Trẻ em thích đi tới bảo tàng.","se":"Children like to go to the museum.","pos":"noun","ety":"Sino-Vietnamese word from 保藏 (“to preserve”) or 寶藏／宝藏 (“precious deposits”)","ipa":"[ʔɓaːw˧˩ taːŋ˨˩] (Hà-Nội); [ʔɓaːw˧˨ taːŋ˦˩] (Huế); [ʔɓaːw˨˩˦ taːŋ˨˩] (Hồ-Chí-Minh-City)","z":"博物館"},{"w":"thư viện","e":"library","s":"Anh ấy đọc sách ở thư viện.","se":"He reads a book at the library.","pos":"noun","ety":"Sino-Vietnamese word from 書院.","ipa":"[tʰɨ˧˧ viən˧˨ʔ] (Hà-Nội); [tʰɨ˧˧ viəŋ˨˩ʔ] (Huế); [tʰɨ˧˧ viəŋ˨˩˨] (Hồ-Chí-Minh-City); [tʰɨ˧˧ jiəŋ˨˩˨] (Hồ-Chí-Minh-City)","z":"圖書館"},{"w":"bể bơi","e":"swimming pool;a swimming pool","s":"Họ bơi ở bể bơi. Khách sạn này không có bể bơi.","se":"They swim at the swimming pool. This hotel does not have a swimming pool.","pos":"noun","ety":"","ipa":"[ʔɓe˧˩ ʔɓəːj˧˧] (Hà-Nội); [ʔɓej˧˨ ʔɓəːj˧˧] (Huế); [ʔɓej˨˩˦ ʔɓəːj˧˧] (Hồ-Chí-Minh-City)","z":"游泳池"},{"w":"nhà","e":"home","s":"Tôi đi về nhà.","se":"I go back home.","pos":"noun","ety":"From Proto-Vietic *ɲaː (“house”). Cognate with Muong Bi nhà (“house”), Tho [Cuối Chăm] ɲɐː², Phong-Kniang ɲaː (\"house\"), Danau ɲɑ¹, Mang ɲua⁶. The prefix sense is a semantic loan from Chinese 家, for example 科學家／科学家 (“scientist”) - nhà khoa học (“scientist”).","ipa":"[ɲaː˨˩] (Hà-Nội); [ɲaː˦˩] (Huế); [ɲaː˨˩] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"家"},{"w":"siêu thị","e":"a supermarket","s":"Cô ấy mua bánh mì ở siêu thị.","se":"She buys bread at the supermarket.","pos":"noun","ety":"Sino-Vietnamese word from 超市, composed of 超 (“super-”) and 市 (“market”).","ipa":"[siəw˧˧ tʰi˧˨ʔ] (Hà-Nội); [ʂiw˧˧ tʰɪj˨˩ʔ] (Huế); [siw˧˧ tʰɪj˨˩ʔ] (Huế); [ʂiw˧˧ tʰɪj˨˩˨] (Hồ-Chí-Minh-City); [siw˧˧ tʰɪj˨˩˨] (Hồ-Chí-Minh-City)","z":"超市"},{"w":"quán cà phê","e":"a coffee shop","s":"Tôi mua một ly cà phê ở quán cà phê.","se":"I buy a cup of coffee at the coffee shop.","pos":"noun","ety":"quán (“kiosk, restaurant, store, house”) + cà phê (“coffee”).","ipa":"[kwaːn˧˦ kaː˨˩ fe˧˧] (Hà-Nội); [kwaːŋ˦˧˥ kaː˦˩ fej˧˧] (Huế); [waːŋ˦˥ kaː˨˩ fej˧˧] (Hồ-Chí-Minh-City)","z":"咖啡廳"},{"w":"trước","e":"in front of;before","s":"Quán cà phê ở phía trước chợ. Tôi đi học trước 8 giờ sáng.","se":"The coffee shop is in front of the market. I get to school before 8 am.","pos":"prep","ety":"From Middle Vietnamese tlước, from Proto-Vietic *k-laːk. Cognate with Malieng kələak⁸. Related to Proto-Katuic *kaliiʔ (“forehead”) (whence Western Bru kali̤aʔ). Attested in Phật thuyết đại báo phụ mẫu ân trọng kinh (佛說大報父母恩重經) as 略 (MC ljak) (modern SV: lược) and 畧, alternative form of 略 (MC ljak) (modern SV: lược).","ipa":"[t͡ɕɨək̚˧˦] (Hà-Nội); [ʈɨək̚˦˧˥] (Huế); [ʈɨək̚˦˥] (Hồ-Chí-Minh-City); (Hà-Nội); (Hồ-Chí-Minh-City)","z":"前面;之前"},{"w":"sau","e":"behind;after","s":"Bể bơi ở sau trường học. Anh ấy về nhà sau 6 giờ chiều.","se":"The swimming pool is behind the school. He comes home after 6 pm.","pos":"adj","ety":"From Proto-Mon-Khmer *krawʔ. Cognate with Muong khau, Mon တြဴ. Attested in Phật thuyết đại báo phụ mẫu ân trọng kinh (佛說大報父母恩重經) as 牢 (MC law) (modern SV: lao) and 娄, alternative form 婁 (MC luw) (modern SV: lâu).","ipa":"[saw˧˧] (Hà-Nội); [ʂaw˧˧] (Huế); [saw˧˧] (Huế); [ʂa(ː)w˧˧] (Hồ-Chí-Minh-City); [sa(ː)w˧˧] (Hồ-Chí-Minh-City)","z":"後面;之後"},{"w":"bên trái","e":"on the left","s":"Quán cà phê ở bên trái nhà hàng.","se":"The coffee shop is on the left side of the restaurant.","pos":"","ety":"","ipa":"","z":"左邊"},{"w":"bên phải","e":"on the right","s":"Trường học ở bên phải sở thú.","se":"The school is on the right side of the zoo.","pos":"","ety":"","ipa":"","z":"右邊"},{"w":"bắc","e":"north","s":"Nhà tôi ở phía bắc thư viện.","se":"My house is north of the library.","pos":"adj","ety":"Sino-Vietnamese word from 北 (“north”). Compare bấc (as in gió bấc (“northern wind”)).","ipa":"[ʔɓak̚˧˦] (Hà-Nội); [ʔɓak̚˦˧˥] (Huế); [ʔɓak̚˦˥] (Hồ-Chí-Minh-City); (); (); (); (); (Hồ-Chí-Minh-City)","z":"北"},{"w":"nam","e":"south","s":"Quán cà phê ở phía nam chợ.","se":"The coffee shop is on the south side of the market.","pos":"noun","ety":"Sino-Vietnamese word from 南 (“south”). Compare also nôm/Nôm and nồm (as in gió nồm (“south(east) wind”)).","ipa":"[naːm˧˧] (Hà-Nội); [naːm˧˧] (Huế); [naːm˧˧] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"南"},{"w":"đông","e":"east","s":"Chúng tôi đang đi về hướng đông.","se":"We are going east.","pos":"noun","ety":"Sino-Vietnamese word from 冬 (“winter”).","ipa":"[ʔɗəwŋ͡m˧˧] (Hà-Nội); [ʔɗəwŋ͡m˧˧] (Huế); [ʔɗəwŋ͡m˧˧] (Hồ-Chí-Minh-City)","z":"東"},{"w":"tây","e":"west","s":"Chúng tôi đang đi về hướng tây.","se":"We are going west.","pos":"noun","ety":"Sino-Vietnamese word from 西.","ipa":"[təj˧˧] (Hà-Nội); [təj˧˧] (Huế); [təj˧˧] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"西"},{"w":"xe ô tô","e":"a car","s":"Tôi lái xe ô tô tới chợ.","se":"I drive my car to the market.","pos":"","ety":"","ipa":"","z":"汽車"},{"w":"xe máy","e":"a motorcycle","s":"Anh ấy lái xe máy tới sở thú.","se":"He rides a motorcycle to the zoo.","pos":"noun","ety":"xe (“wheeled vehicle”) + máy (“machine”).","ipa":"[sɛ˧˧ maj˧˦] (Hà-Nội); [sɛ˧˧ maj˨˩˦] (Huế); [sɛ˧˧ ma(ː)j˦˥] (Hồ-Chí-Minh-City)","z":"機車;摩托車"},{"w":"xe đạp","e":"a bicycle","s":"Tôi đi xe đạp tới trường học.","se":"I ride a bicycle to school.","pos":"noun","ety":"xe (“wheeled vehicle”) + đạp (“to pedal”).","ipa":"[sɛ˧˧ ʔɗaːp̚˧˨ʔ] (Hà-Nội); [sɛ˧˧ ʔɗaːp̚˨˩ʔ] (Huế); [sɛ˧˧ ʔɗaːp̚˨˩˨] (Hồ-Chí-Minh-City)","z":"腳踏車"},{"w":"xe buýt","e":"a bus","s":"Bạn đi chợ bằng xe buýt.","se":"You go to the market by bus.","pos":"noun","ety":"From xe (“wheeled vehicle”) + French bus (“bus”).","ipa":"[sɛ˧˧ ʔɓwit̚˧˦] (Hà-Nội); [sɛ˧˧ ʔɓwɨt̚˦˧˥] (Huế); [sɛ˧˧ ʔɓwɨt̚˦˥] (Hồ-Chí-Minh-City)","z":"公車"},{"w":"taxi","e":"a taxi","s":"Cô ấy tới siêu thị bằng taxi.","se":"She goes to the supermarket by taxi.","pos":"","ety":"","ipa":"","z":"計程車"},{"w":"tàu điện ngầm","e":"a subway","s":"Chúng tôi tới trường học bằng tàu điện ngầm.","se":"We go to school by subway.","pos":"noun","ety":"tàu điện + ngầm.","ipa":"[taw˨˩ ʔɗiən˧˨ʔ ŋəm˨˩] (Hà-Nội); [taw˦˩ ʔɗiəŋ˨˩ʔ ŋəm˦˩] (Huế); [ta(ː)w˨˩ ʔɗiəŋ˨˩˨ ŋəm˨˩] (Hồ-Chí-Minh-City)","z":"地鐵;捷運"},{"w":"đi bộ","e":"to walk","s":"Tôi đi bộ tới trường học.","se":"I walk to school.","pos":"verb","ety":"đi + bộ","ipa":"[ʔɗi˧˧ ʔɓo˧˨ʔ] (Hà-Nội); [ʔɗɪj˧˧ ʔɓow˨˩ʔ] (Huế); [ʔɗɪj˧˧ ʔɓow˨˩˨] (Hồ-Chí-Minh-City)","z":"走路;步行"},{"w":"lên xe buýt","e":"to get on tion is fifty meters away from here.","pos":"adv","ety":"cách + đây.","ipa":"[kajk̟̚˧˦ ʔɗəj˧˧] (Hà-Nội); [kat̚˦˧˥ ʔɗəj˧˧] (Huế); [kat̚˦˥ ʔɗəj˧˧] (Hồ-Chí-Minh-City)","z":"距離...遠"},{"w":"đi qua","e":"to cross","s":"Tôi đi qua đường.","se":"I cross the road.","pos":"","ety":"","ipa":"","z":"穿越;經過"},{"w":"cầu","e":"bridge","s":"Anh ấy đi qua cầu.","se":"He crosses the bridge.","pos":"noun","ety":"Sino-Vietnamese word from 球 (“ball; sphere”).","ipa":"[kəw˨˩] (Hà-Nội); [kəw˦˩] (Huế); [kəw˨˩] (Hồ-Chí-Minh-City)","z":"橋"},{"w":"rẽ trái","e":"to turn left","s":"Vui lòng rẽ trái.","se":"Please turn left.","pos":"","ety":"","ipa":"","z":"左轉"},{"w":"rẽ phải","e":"to turn right","s":"Vui lòng rẽ phải ở góc đường.","se":"Please turn right at the corner.","pos":"","ety":"","ipa":"","z":"右轉"},{"w":"đi thẳng","e":"to go straight","s":"Vui lòng đi thẳng tới góc đường.","se":"Please go straight at the corner.","pos":"","ety":"","ipa":"","z":"直走"},{"w":"dừng lại","e":"to stop","s":"Vui lòng dừng ở đây.","se":"Please stop here.","pos":"verb","ety":"dừng + lại.","ipa":"[zɨŋ˨˩ laːj˧˨ʔ] (Hà-Nội); [jɨŋ˦˩ laːj˨˩ʔ] (Huế); [jɨŋ˨˩ laːj˨˩˨] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"停;停下來"},{"w":"đèn giao thông","e":"a traffic light","s":"Vui lòng rẽ trái ở đèn giao thông.","se":"Please turn left at the traffic light.","pos":"","ety":"","ipa":"","z":"紅綠燈"},{"w":"chậm","e":"slow;slowly","s":"Vui lòng chạy chậm thôi. Bạn làm ơn có thể giải thích lại các chi tiết và nói chậm hơn được không?","se":"Please drive slowly. Could you explain the details again and speak more slowly, please?","pos":"adj","ety":"","ipa":"[t͡ɕəm˧˨ʔ] (Hà-Nội); [t͡ɕəm˨˩ʔ] (Huế); [cəm˨˩˨] (Hồ-Chí-Minh-City)","z":"慢;慢慢地"},{"w":"làm việc","e":"to work","s":"Cô ấy làm việc ở bảo tàng.","se":"She works at the museum.","pos":"verb","ety":"","ipa":"[laːm˨˩ viək̚˧˨ʔ] (Hà-Nội); [laːm˦˩ viək̚˨˩ʔ] (Huế); [laːm˨˩ viək̚˨˩˨] (Hồ-Chí-Minh-City); [laːm˨˩ jiək̚˨˩˨] (Hồ-Chí-Minh-City)","z":"工作"},{"w":"luật sư","e":"Lawyer","s":"Bố tôi là một  is a businessman.","pos":"noun","ety":"Sino-Vietnamese word from 營 (“to do business”) and 人 (“person”).","ipa":"[zwajŋ̟˧˧ ɲən˧˧] (Hà-Nội); [jwɛɲ˧˧ ɲəŋ˧˧] (Huế); [j⁽ʷ⁾an˧˧ ɲəŋ˧˧] (Hồ-Chí-Minh-City)","z":"商人;企業家"},{"w":"nhân viên văn phòng","e":"Office worker","s":"Cô ấy là nhân viên văn phòng ở một công ty lớn.","se":"She works as an office worker in a big company.","pos":"","ety":"","ipa":"","z":"上班族"},{"w":"thư ký","e":"Secretary","s":"Tôi là thư ký ở một công ty.","se":"I work as a secretary at a company.","pos":"noun","ety":"","ipa":"","z":"秘書"},{"w":"quản lý","e":"Manager","s":"Anh ấy là quản lý ở một công ty.","se":"He works as a manager in a company.","pos":"verb","ety":"","ipa":"","z":"經理;管理"},{"w":"họ hàng","e":"Relatives","s":"Họ hàng của cô ấy làm việc ở Nhật Bản.","se":"Her relatives work in Japan.","pos":"noun","ety":"họ + hàng","ipa":"[hɔ˧˨ʔ haːŋ˨˩] (Hà-Nội); [hɔ˨˩ʔ haːŋ˦˩] (Huế); [hɔ˨˩˨ haːŋ˨˩] (Hồ-Chí-Minh-City)","z":"親戚"},{"w":"ông bà","e":"Grandparents","s":"Ông bà tôi thích đọc sách.","se":"My grandparents like to read books.","pos":"noun","ety":"ông + bà; literally \"grandfathers and grandmothers\".","ipa":"[ʔəwŋ͡m˧˧ ʔɓaː˨˩] (Hà-Nội); [ʔəwŋ͡m˧˧ ʔɓaː˦˩] (Huế); [ʔəwŋ͡m˧˧ ʔɓaː˨˩] (Hồ-Chí-Minh-City)","z":"祖父母"},{"w":"cháu","e":"Grandchildren","s":"Những đứa cháu của ông ấy học tại một trường đại học ở Trung Quốc.","se":"His grandchildren study at a university in China.","pos":"noun","ety":"From Middle Vietnamese cháu, from Proto-Vietic *cuːʔ, from Proto-Mon-Khmer *cuuʔ. Cognate with Muong [Bi] chảu (“son-in-law”), Khmer ចៅ (caw), Bahnar sŏu/sâu, Pacoh achau, Khasi 'siew.","ipa":"[t͡ɕaw˧˦] (Hà-Nội); [t͡ɕaw˨˩˦] (Huế); [ca(ː)w˦˥] (Hồ-Chí-Minh-City)","z":"孫子女"},{"w":"anh chị em họ","e":"Cousin","s":"Hai cậu bé kia là anh em họ.","se":"Those two boys are cousins.","pos":"","ety":"","ipa":"","z":"堂(表)兄弟姊妹"},{"w":"chồng","e":"Husband","s":"Chồng cô ấy là một kỹ sư cho một công ty nổi tiếng.","se":"Her husband is an engineer for a famous company.","pos":"noun","ety":"From Northern Middle Vietnamese chào᷄, from Proto-Vietic *p-ʄoːŋ, *ɟoːŋ. Compare North Central nhôông, Mlabri ɟioŋ (\"father\"), Khmu joŋ (\"man\"). This word originally just meant \"man, male\", as with North Central gấy/cấy (“wife”), originally just meant \"woman, female\".","ipa":"[t͡ɕəwŋ͡m˨˩] (Hà-Nội); [t͡ɕəwŋ͡m˦˩] (Huế); [cəwŋ͡m˨˩] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"丈夫;老公"},{"w":"vợ","e":"Wife","s":"Vợ anh ấy là một nữ doanh nhân.","se":"His wife is a businesswoman.","pos":"noun","ety":"From Proto-Vietic *-bəːʔ; from Old Chinese 婦 (OC *mə.bəʔ) (B-S) (SV: phụ). Shorto considers \"vợ\" a native word, from Proto-Mon-Khmer *(ʔ)boʔ (“mother”). This is not likely, considering the lack of cognates in both the more conservative Vietic languages and the neighbouring Austroasiatic branches. This is now the main word for \"wife\" in most Vietnamese dialects, although the North Central dialects chiefly use cấy or gấy, a word related to gái (“girls, women”) and cái (“female”).","ipa":"[vəː˧˨ʔ] (Hà-Nội); [vəː˨˩ʔ] (Huế); [vəː˨˩˨] (Hồ-Chí-Minh-City); [jəː˨˩˨] (Hồ-Chí-Minh-City); (Hà-Nội); (Hồ-Chí-Minh-City)","z":"妻子;老婆"},{"w":"cháu trai","e":"Nephew","s":"Cháu trai tôi muốn trở thành một người lính.","se":"My nephew wants to be a soldier.","pos":"","ety":"","ipa":"","z":"姪子;外甥"},{"w":"cháu gái","e":"Niece","s":"Cháu gái bạn muốn trở thành một nữ diễn viên.","se":"Your niece wants to be an actress.","pos":"","ety":"","ipa":"","z":"姪女;外甥女"},{"w":"tốt bụng","e":"to be kind","s":"Cô ấy rất tốt bụng.","se":"She is very kind.","pos":"adj","ety":"tốt (“good”) + bụng (“belly, stomach”).","ipa":"[tot̚˧˦ ʔɓʊwŋ͡m˧˨ʔ] (Hà-Nội); [tok̚˦˧˥ ʔɓʊwŋ͡m˨˩ʔ] (Huế); [tok̚˦˥ ʔɓʊwŋ͡m˨˩˨] (Hồ-Chí-Minh-City)","z":"善良;好心"},{"w":"cô (dì,bác gái)","e":"Aunt","s":"Dì của tôi rất tốt với tôi.","se":"My aunt is very kind to me.","pos":"","ety":"","ipa":"","z":"姑姑;阿姨;伯母"},{"w":"nghiêm khắc","e":"to be strict","s":"Giáo viên đó rất nghiêm khắc.","se":"That teacher is very strict.","pos":"adj","ety":"Sino-Vietnamese word from 嚴刻.","ipa":"[ŋiəm˧˧ xak̚˧˦] (Hà-Nội); [ŋiəm˧˧ kʰak̚˦˧˥] (Huế); [ŋiəm˧˧ xak̚˦˧˥] (Huế); [ŋim˧˧ kʰak̚˦˥] (Hồ-Chí-Minh-City); [ŋim˧˧ xak̚˦˥] (Hồ-Chí-Minh-City)","z":"嚴格"},{"w":"chú (bác,cậu)","e":"uncle","s":"Cậu của anh ấy nghiêm khắc nhưng tốt bụng.","se":"His uncle is strict but kind.","pos":"","ety":"","ipa":"","z":"叔叔;伯伯;舅舅"},{"w":"điềm tĩnh","e":"to be calm","s":"Chồng của cô ấy rất điềm tĩnh.","se":"Her husband is very calm.","pos":"adj","ety":"Sino-Vietnamese word from 恬靜.","ipa":"[ʔɗiəm˨˩ tïŋ˦ˀ˥] (Hà-Nội); [ʔɗiəm˦˩ tɨn˧˨] (Huế); [ʔɗim˨˩ tɨn˨˩˦] (Hồ-Chí-Minh-City)","z":"沉著;冷靜"},{"w":"thân thiện","e":"to be friendly","s":"Cô ấy rất thân thiện với mọi người.","se":"She is friendly to everyone.","pos":"adj","ety":"Sino-Vietnamese word from 親善.","ipa":"[tʰən˧˧ tʰiən˧˨ʔ] (Hà-Nội); [tʰəŋ˧˧ tʰiəŋ˨˩ʔ] (Huế); [tʰəŋ˧˧ tʰiəŋ˨˩˨] (Hồ-Chí-Minh-City)","z":"友善"},{"w":"cảm thấy","e":"to feel","s":"Tôi cảm thấy...","se":"I feel…","pos":"verb","ety":"cảm + thấy.","ipa":"[kaːm˧˩ tʰəj˧˦] (Hà-Nội); [kaːm˧˨ tʰəj˨˩˦] (Huế); [kaːm˨˩˦ tʰəj˦˥] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"感覺;覺得"},{"w":"hạnh phúc","e":"to be happy;happy;happiness","s":"Tôi cảm thấy hạnh phúc. Anh khiến em hạnh phúc. Tôi chúc bạn hạnh phúc.","se":"I feel happy. You make me happy. I wish you happiness.","pos":"adj","ety":"Sino-Vietnamese word from 幸福 (“happiness”).","ipa":"[hajŋ̟˧˨ʔ fʊwk͡p̚˧˦] (Hà-Nội); [hɛɲ˨˩ʔ fʊwk͡p̚˦˧˥] (Huế); [han˨˩˨ fʊwk͡p̚˦˥] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"幸福;快樂"},{"w":"buồn","e":"to be sad;sad","s":"Cô ấy cảm thấy buồn. Chúng tôi nghĩ bài hát rất buồn.","se":"She feels sad. We thought the song was so sad.","pos":"adj","ety":"Non-Sino-Vietnamese reading of Chinese 煩 (“fed up; annoyed”, SV: phiền). Doublet of phiền.","ipa":"[ʔɓuən˨˩] (Hà-Nội); [ʔɓuəŋ˦˩] (Huế); [ʔɓuəŋ˨˩] (Hồ-Chí-Minh-City); ()","z":"難過;傷心"},{"w":"hối tiếc","e":"to be sorry","s":"Bạn cảm thấy hối tiếc.","se":"You feel sorry.","pos":"verb","ety":"","ipa":"[hoj˧˦ tiək̚˧˦] (H is black and white.","pos":"","ety":"","ipa":"","z":"足球(球)"},{"w":"hình cầu","e":"sphere","s":"Một quả bóng đá có hình cầu.","se":"A soccer ball has a spherical shape.","pos":"noun","ety":"hình (“shape”) + Chinese 球 (qiú, “sphere”).","ipa":"[hïŋ˨˩ kəw˨˩] (Hà-Nội); [hɨn˦˩ kəw˦˩] (Huế); [hɨn˨˩ kəw˨˩] (Hồ-Chí-Minh-City)","z":"球體"},{"w":"xanh lá cây","e":"green","s":"Một quả bóng màu xanh lá cây","se":"A green ball","pos":"adj","ety":"xanh (“green or blue”) + lá cây (“leaf”).","ipa":"[sajŋ̟˧˧ laː˧˦ kəj˧˧] (Hà-Nội); [sɛɲ˧˧ laː˨˩˦ kəj˧˧] (Huế); [san˧˧ laː˦˥ kəj˧˧] (Hồ-Chí-Minh-City); (Hà-Nội)","z":"綠色"},{"w":"hình lập phương","e":"cube","s":"Cái hộp có hình lập phương.","se":"The box has a cubic shape.","pos":"noun","ety":"hình (“shape”) + lập phương (“cube”).","ipa":"[hïŋ˨˩ ləp̚˧˨ʔ fɨəŋ˧˧] (Hà-Nội); [hɨn˦˩ ləp̚˨˩ʔ fɨəŋ˧˧] (Huế); [hɨn˨˩ ləp̚˨˩˨ fɨəŋ˧˧] (Hồ-Chí-Minh-City)","z":"立方體"},{"w":"thấp","e":"short;low","s":"Người đàn ông kia cao nhưng thấp hơn người phụ nữ kia. Nhiệt độ khá thấp.","se":"That man is tall but shorter than that woman. The temperature is rather low.","pos":"adj","ety":"Sino-Vietnamese word from 隰 (“low wetland”).","ipa":"[tʰəp̚˧˦] (Hà-Nội); [tʰəp̚˦˧˥] (Huế); [tʰəp̚˦˥] (Hồ-Chí-Minh-City)","z":"矮;低"},{"w":"con mèo","e":"cat","s":"Một con mèo đen","se":"A black cat","pos":"","ety":"","ipa":"","z":"貓"},{"w":"béo","e":"fat","s":"Một con mèo béo","se":"A fat cat","pos":"adj","ety":"","ipa":"[ʔɓɛw˧˦] (Hà-Nội); [ʔɓɛw˨˩˦] (Huế); [ʔɓɛw˦˥] (Hồ-Chí-Minh-City)","z":"胖"},{"w":"gầy","e":"thin","s":"Cô gái gầy và cao hơn chàng trai.","se":"The girl is thinner and taller than the boy.","pos":"adj","ety":"Attested in Phật thuyết đại báo phụ mẫu ân trọng kinh (佛說大報父母恩重經) as 阿計 (MC 'a kejH) (modern SV: a kế), 計 (MC kejH) (modern SV: kế) and 𤷍, phonetic 其 (MC gi|ki) (modern SV: kì).","ipa":"[ɣəj˨˩] (Hà-Nội); [ɣəj˦˩] (Huế); [ɣəj˨˩] (Hồ-Chí-Minh-City)","z":"瘦"},{"w":"thân hình vừa vặn","e":"fit","s":"Người phụ nữ có thân hình vừa vặn.","se":"The woman is fit.","pos":"","ety":"","ipa":"","z":"身材勻稱"},{"w":"bằng phẳng","e":"smooth","s":"Con đường bằng phẳng","se":"Smooth road","pos":"adj","ety":"bằng + phẳng.","ipa":"[ʔɓaŋ˨˩ faŋ˧˩] (Hà-Nội); [ʔɓaŋ˦˩ faŋ˧˨] (Huế); [ʔɓaŋ˨˩ faŋ˨˩˦] (Hồ-Chí-Minh-City)","z":"平滑"},{"w":"gồ ghề","e":"rough","s":"Con đường gồ ghề","se":"Rough road","pos":"adj","ety":"Compare gồ.","ipa":"[ɣo˨˩ ɣe˨˩] (Hà-Nội); [ɣow˦˩ ɣej˦˩] (Huế); [ɣow˨˩ ɣej˨˩] (Hồ-Chí-Minh-City)","z":"粗糙"},{"w":"mềm","e":"soft","s":"Một cái bánh mềm","se":"A soft cake","pos":"adj","ety":"Also a semantic loan from English soft in soft copy.","ipa":"[mem˨˩] (Hà-Nội); [mem˦˩] (Huế); [mem˨˩] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"軟"},{"w":"cứng","e":"hard","s":"Một cái bánh quy cứng","se":"A hard cookie","pos":"adj","ety":"From Proto-Vietic *kəŋʔ. Compare Khmer កឹង (kəng) and Pacoh câng. Possibly related to nứng (“horny”), through an infixed form. Similarities to Chinese 勁 (OC *keŋ-s) (SV: kình, kính), 強 (OC *N-kaŋ, *m-kaŋʔ) (SV: cường, cưỡng), 剛 (OC *kˤaŋ) (SV: cương), 堅 (OC *kˤi[ŋ]) (SV: kiên) are probably coincidental. The Austroasiatic words might also be borrowed from another source that gave rise to one of the Sinitic words. Also a semantic loan from English hard in hardware and hard copy.","ipa":"[kɨŋ˧˦] (Hà-Nội); [kɨŋ˦˧˥] (Huế); [kɨŋ˦˥] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"硬"},{"w":"màu đỏ","e":"red","s":"Một con mèo đen ăn cái bánh mềm màu đỏ.","se":"A black cat eats the red soft cake.","pos":"","ety":"","ipa":"","z":"紅色"},{"w":"quần áo","e":"clothes","s":"","se":"","pos":"noun","ety":"quần (裙) + áo.","ipa":"[kwən˨˩ ʔaːw˧˦] (Hà-Nội); [kwəŋ˦˩ ʔaːw˨˩˦] (Huế); [wəŋ˨˩ ʔaːw˦˥] (Hồ-Chí-Minh-City)","z":"衣服"},{"w":"áo sơ mi","e":"shirt","s":"Tôi muốn có một cái áo sơ mi.","se":"I would like to have a shirt.","pos":"","ety":"","ipa":"","z":"襯衫"},{"w":"mặc","e":"to put on","s":"Tôi mặc một cái áo sơ mi.","se":"I put on a shirt.","pos":"verb","ety":"From Proto-Vietic *mak, cognate with Arem mɐ̀k.","ipa":"[mak̚˧˨ʔ] (Hà-Nội); [mak̚˨˩ʔ] (Huế s":"noun","ety":"From Proto-Vietic *k-raːŋʔ. Cognate with Tho [Cuối Chăm] kʰraːŋ³. The developement of the initial (*C-r > ‹th›) is irregular in most varieties of Vietnamese, but regular in certain North(east)ern dialects. The expected reflex of the initial *k-r would be *‹s› in the \"mainstream\" dialects.","ipa":"[tʰaːŋ˧˦] (Hà-Nội); [tʰaːŋ˦˧˥] (Huế); [tʰaːŋ˦˥] (Hồ-Chí-Minh-City)","z":"月;月份"},{"w":"hàng ngày","e":"every day","s":"Tôi đi bộ tới trường hàng ngày.","se":"I walk to school every day.","pos":"adv","ety":"hàng + ngày, note that this doesn't exactly have the same meaning as \"hằng ngày\".","ipa":"[haːŋ˨˩ ŋaj˨˩] (Hà-Nội); [haːŋ˦˩ ŋaj˦˩] (Huế); [haːŋ˨˩ ŋa(ː)j˨˩] (Hồ-Chí-Minh-City)","z":"每天"},{"w":"Thứ năm","e":"Thursday","s":"Vào các ngày thứ năm, tôi thường học tiếng Trung Quốc.","se":"On Thursdays, I usually learn Chinese.","pos":"","ety":"","ipa":"","z":"星期四"},{"w":"Chủ nhật","e":"Sunday","s":"Vào Chủ nhật, tôi thường đến quán cà phê.","se":"On Sundays, I usually go to the coffee shop.","pos":"noun","ety":"","ipa":"","z":"星期日"},{"w":"buổi chiều","e":"afternoon","s":"Anh ấy thường chơi bóng đá vào chiều Chủ nhật.","se":"He usually plays football on Sunday afternoon.","pos":"noun","ety":"buổi + chiều.","ipa":"[ʔɓuəj˧˩ t͡ɕiəw˨˩] (Hà-Nội); [ʔɓuj˧˨ t͡ɕiw˦˩] (Huế); [ʔɓuj˨˩˦ ciw˨˩] (Hồ-Chí-Minh-City)","z":"下午"},{"w":"buổi sáng","e":"morning","s":"Cô ấy thường uống cà phê vào buổi sáng.","se":"She usually drinks coffee in the morning.","pos":"noun","ety":"buổi + sáng.","ipa":"[ʔɓuəj˧˩ saːŋ˧˦] (Hà-Nội); [ʔɓuj˧˨ ʂaːŋ˦˧˥] (Huế); [ʔɓuj˧˨ saːŋ˦˧˥] (Huế); [ʔɓuj˨˩˦ ʂaːŋ˦˥] (Hồ-Chí-Minh-City); [ʔɓuj˨˩˦ saːŋ˦˥] (Hồ-Chí-Minh-City); (Hồ-Chí-Minh-City)","z":"早上"},{"w":"đi chơi","e":"to hang out;to go out","s":"Vào chiều chủ nhật, tôi thường đi chơi với bạn bè. Bạn có muốn đi chơi với tôi không?","se":"On Sunday afternoon, I usually hang out with my friends. Would you like to go out with me?","pos":"verb","ety":"đi (“to go”) + chơi (“to play”).","ipa":"[ʔɗi˧˧ t͡ɕəːj˧˧] (Hà-Nộ
