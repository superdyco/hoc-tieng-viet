/* ---------- stats ---------- */
function renderBoxes(){
  const counts=[0,0,0,0,0,0];
  state.boxes.forEach(b=>counts[b]++);
  const labels=['未學','盒 1','盒 2','盒 3','盒 4','已熟'];
  $('boxes').innerHTML=counts.map((c,i)=>`<div class="box ${i===0?'b0':''}${i===5?'b5':''}"><div class="n">${c}</div><div class="l">${labels[i]}</div></div>`).join('');
  const st=streakCount();
  $('topstats').textContent=`已學 ${WORDS.length-counts[0]} / ${WORDS.length} · 待複習 ${dueCount()}`+(st>0?` · 🔥${st}`:'');
}

/* ---------- study ---------- */
let queue=[],cur=-1,flipped=false,sessionTotal=0;
function buildSession(){
  const n=+$('sessionSize').value;
  let idx=[...WORDS.keys()];
  if($('scope').value==='fav'){
    idx=idx.filter(i=>state.favs.has(i));
    if(idx.length===0){ toast('還沒有收藏的單字,先去點 ☆ 收藏吧'); return; }
  }
  idx.sort((a,b)=>{
    const da=isDue(a)?0:1, db=isDue(b)?0:1; // 到期的優先
    if(da!==db)return da-db;
    const ba=state.boxes[a],bb=state.boxes[b];
    if(ba===5&&bb!==5)return 1;
    if(bb===5&&ba!==5)return -1;
    if(ba!==bb)return ba-bb;
    return Math.random()-.5;
  });
  queue=idx.slice(0,n);
  for(let i=queue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[queue[i],queue[j]]=[queue[j],queue[i]];}
  sessionTotal=queue.length;
  $('doneArea').classList.add('hide');
  $('cardArea').classList.remove('hide');
  nextCard();
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function nextCard(){
  if(queue.length===0){
    $('cardArea').classList.add('hide');
    $('doneArea').classList.remove('hide');
    $('doneText').textContent=`這一輪 ${sessionTotal} 字完成!繼續加油 🇻🇳`;
    $('prog').style.width='100%';
    return;
  }
  cur=queue[0]; flipped=false;
  $('flash').classList.remove('flipped');
  updateCardFav();
  const w=WORDS[cur];
  setTimeout(()=>{
    $('frontWord').textContent=w.w;
    $('frontPos').textContent=w.pos||'';
    $('frontPos').style.display=w.pos?'':'none';
    $('backTag').textContent=w.w;
    $('backZh').textContent=w.z;
    $('backMeaning').textContent=w.e;
    if(w.s){ $('sentBlock').style.display=''; $('sentVi').textContent=w.s; $('sentEn').textContent=w.se; }
    else $('sentBlock').style.display='none';
    let meta='';
    if(w.ety) meta+=`<b>詞源</b> ${esc(w.ety)}<br>`;
    if(w.ipa) meta+=`<b>IPA</b> ${esc(w.ipa)}`;
    $('metaBlock').innerHTML=meta;
    $('boxHintDummy');
  }, flipped?220:0);
  $('prog').style.width=`${(1-queue.length/sessionTotal)*100}%`;
  // auto play (skipped silently if browser blocks it)
  setTimeout(()=>playAud(cur, true), 120);
}
$('flash').onclick=e=>{
  if(e.target.tagName==='BUTTON')return;
  flipped=!flipped;
  $('flash').classList.toggle('flipped',flipped);
};
$('audF').onclick=()=>playAud(cur);
$('audB').onclick=()=>playAud(cur);
$('sentTts').onclick=()=>playSent(cur);
$('btnYes').onclick=()=>{state.boxes[cur]=Math.min(5,(state.boxes[cur]||0)+1);recordAnswer(cur,true);queue.shift();renderBoxes();nextCard();};
$('btnNo').onclick=()=>{state.boxes[cur]=Math.max(1,state.boxes[cur]-1)||1;recordAnswer(cur,false);queue.shift();queue.splice(Math.min(3,queue.length),0,cur);renderBoxes();nextCard();};
$('newSession').onclick=buildSession;
$('btnAgain').onclick=buildSession;

/* ---------- quiz ---------- */
let qIdx=-1,qScore=0,qTotal=0,qLock=false;
function nextQuiz(){
  qLock=false;
  const mode=$('quizMode').value;
  const seen=[...WORDS.keys()].filter(i=>state.boxes[i]>0);
  const pool=seen.length>=8?seen:[...WORDS.keys()];
  qIdx=pool[Math.floor(Math.random()*pool.length)];
  const correct=qIdx;
  $('quizAud').classList.toggle('hide', mode==='reverse'); // 反向題作答前藏發音鈕防爆雷
  if(mode==='reverse'){
    $('quizWord').classList.remove('vi');
    $('quizWord').textContent=WORDS[qIdx].z;
  }else{
    $('quizWord').classList.add('vi');
    $('quizWord').textContent = mode==='listen' ? '🎧 ⋯' : WORDS[qIdx].w;
    setTimeout(()=>playAud(qIdx,true),120);
  }
  const opts=new Set([correct]);
  while(opts.size<4){opts.add(Math.floor(Math.random()*WORDS.length));}
  const arr=[...opts].sort(()=>Math.random()-.5);
  $('quizOpts').innerHTML=arr.map((o,i)=>{
    if(mode==='reverse') return `<button data-i="${i}" class="vi" style="font-weight:700">${esc(WORDS[o].w)}</button>`;
    return `<button data-i="${i}">${esc(WORDS[o].z)}<br><small style="opacity:.65;font-size:11px">${esc(WORDS[o].e)}</small></button>`;
  }).join('');
  [...$('quizOpts').children].forEach((b,i)=>{
    b.onclick=()=>{
      if(qLock)return;qLock=true;qTotal++;
      const right=arr[i]===correct;
      if(right){b.classList.add('right');qScore++;state.boxes[qIdx]=Math.min(5,(state.boxes[qIdx]||0)+1);}
      else{
        b.classList.add('wrong');
        [...$('quizOpts').children].forEach((x,j)=>{if(arr[j]===correct)x.classList.add('right');});
        state.boxes[qIdx]=Math.max(1,state.boxes[qIdx]-1)||1;
      }
      recordAnswer(qIdx,right);
      if(mode==='listen') $('quizWord').textContent=WORDS[qIdx].w; // 揭曉
      if(mode==='reverse'){ $('quizAud').classList.remove('hide'); playAud(qIdx,true); }
      renderBoxes();
      $('quizScore').textContent=`答對 ${qScore} / ${qTotal}`;
      setTimeout(nextQuiz,right?700:1400);
    };
  });
  $('quizScore').textContent=qTotal?`答對 ${qScore} / ${qTotal}`:'選出正確答案';
}
$('quizMode').onchange=()=>nextQuiz();
$('audQ').onclick=()=>playAud(qIdx);

/* ---------- browse ---------- */
let shown=50, favOnlyOn=false;
function studyWord(i){
  queue=[i,...queue.filter(x=>x!==i)];
  sessionTotal=Math.max(sessionTotal,queue.length);
  $('doneArea').classList.add('hide');
  $('cardArea').classList.remove('hide');
  switchTab('study');
  nextCard();
}
function renderList(){
  const q=$('searchBox').value.trim().toLowerCase();
  const labels=['—','盒1','盒2','盒3','盒4','已熟'];
  const filtered=[...WORDS.keys()].filter(i=>{
    if(favOnlyOn && !state.favs.has(i))return false;
    if(!q)return true;
    const w=WORDS[i];
    return w.w.toLowerCase().includes(q)||w.e.toLowerCase().includes(q)||w.z.includes(q)||(w.ety&&w.ety.includes(q));
  });
  if($('sortMode').value==='wrong') filtered.sort((a,b)=>(state.wrong[b]||0)-(state.wrong[a]||0));
  $('wordList').innerHTML=filtered.slice(0,shown).map(i=>{
    const w=WORDS[i];
    const fav=state.favs.has(i);
    const wb=state.wrong[i]?`<span class="wbadge">✗${state.wrong[i]}</span>`:'';
    return `<div class="row"><button class="sp" data-i="${i}">🔊</button><span class="v vi" data-i="${i}" title="點擊到卡片學習">${esc(w.w)}</span><span class="e">${esc(w.z)}</span>${wb}<button class="fav ${fav?'on':''}" data-i="${i}">${fav?'★':'☆'}</button><span class="b">${labels[state.boxes[i]]}</span></div>`;
  }).join('');
  $('btnMore').classList.toggle('hide',filtered.length<=shown);
  [...document.querySelectorAll('#wordList .sp')].forEach(b=>b.onclick=()=>playAud(+b.dataset.i));
  [...document.querySelectorAll('#wordList .fav')].forEach(b=>b.onclick=()=>{toggleFav(+b.dataset.i);renderList();});
  [...document.querySelectorAll('#wordList .v')].forEach(s=>s.onclick=()=>studyWord(+s.dataset.i));
}
$('searchBox').oninput=()=>{shown=50;renderList();};
$('sortMode').onchange=()=>{shown=50;renderList();};
$('btnMore').onclick=()=>{shown+=50;renderList();};
$('favOnly').onclick=()=>{
  favOnlyOn=!favOnlyOn;
  $('favOnly').textContent=favOnlyOn?'★':'☆';
  $('favOnly').classList.toggle('on',favOnlyOn);
  shown=50;renderList();
};

/* ---------- common categories ---------- */
let curCat=CATS[0].id;
function playCommon(catId, i){
  const cat=CATS.find(c=>c.id===catId);
  if(!cat || !cat.items[i]) return;
  player.pause();
  player.src=`audio/c/${catId}_${String(i).padStart(3,'0')}.mp3`;
  player.currentTime=0;
  const p=player.play();
  if(p) p.then(()=>{audioUnlocked=true;}).catch(()=>say(cat.items[i].w)); // 缺檔退回瀏覽器 TTS
}
function renderCommon(){
  $('catBar').innerHTML=CATS.map(c=>`<button data-c="${c.id}" class="${c.id===curCat?'active':''}">${c.name}</button>`).join('');
  [...$('catBar').children].forEach(b=>b.onclick=()=>{curCat=b.dataset.c;renderCommon();});
  const cat=CATS.find(c=>c.id===curCat);
  $('catList').innerHTML=cat.items.map((it,i)=>`<div class="row"><button class="sp" data-i="${i}">🔊</button><span class="v vi">${esc(it.w)}</span><span class="e">${esc(it.z)}</span></div>`).join('');
  [...document.querySelectorAll('#catList .sp')].forEach(b=>b.onclick=()=>playCommon(curCat,+b.dataset.i));
}

/* ---------- keyboard shortcuts ---------- */
document.addEventListener('keydown',e=>{
  const t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA'||t==='SELECT')return;
  if(!$('view-study').classList.contains('hide') && !$('cardArea').classList.contains('hide')){
    if(e.code==='Space'){e.preventDefault();$('flash').click();}
    else if(e.key==='ArrowRight'){$('btnYes').click();}
    else if(e.key==='ArrowLeft'){$('btnNo').click();}
    else if(e.key==='f'||e.key==='F'){toggleFav(cur);}
  } else if(!$('view-quiz').classList.contains('hide')){
    if(['1','2','3','4'].includes(e.key)){const b=$('quizOpts').children[+e.key-1];if(b)b.click();}
  }
});

/* ---------- io ---------- */
$('btnExport').onclick=()=>{
  $('ioBox').value=JSON.stringify({boxes:state.boxes,favs:[...state.favs],last:state.last,wrong:state.wrong,wrongStreak:state.wrongStreak,days:state.days});
  $('ioBox').select();
  try{document.execCommand('copy');toast('已複製到剪貼簿');}catch(e){toast('請手動複製文字');}
};
$('btnImport').onclick=()=>{
  try{
    const d=JSON.parse($('ioBox').value);
    if(applyData(d)){persist();renderBoxes();buildSession();toast('進度已還原');}
    else toast('格式不符(長度需為 '+WORDS.length+')');
  }catch(e){toast('無法解析,請確認貼上的內容');}
};

restore();
renderBoxes();
buildSession();
</script>
